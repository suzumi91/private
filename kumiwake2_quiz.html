<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>組分け②テスト対策クイズ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f4f8; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; padding: 16px; }
h1 { text-align: center; color: #1a365d; font-size: 1.4em; margin: 12px 0; }

/* メニュー画面 */
.menu { display: grid; gap: 12px; }
.subject-label { font-size: 1.1em; font-weight: bold; color: #2d3748; margin: 8px 0 4px; padding-left: 4px; border-left: 4px solid #4299e1; }
.subject-label.rika { border-left-color: #48bb78; }
.unit-btn { padding: 14px 16px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; text-align: left; transition: transform 0.1s; }
.unit-btn:hover { transform: scale(1.02); }
.unit-btn:active { transform: scale(0.98); }
.unit-btn.shakai { background: #ebf8ff; color: #2b6cb0; border: 2px solid #bee3f8; }
.unit-btn.rika { background: #f0fff4; color: #276749; border: 2px solid #c6f6d5; }
.unit-btn .unit-num { font-size: 0.8em; opacity: 0.7; }
.all-btn { padding: 14px; border: none; border-radius: 10px; font-size: 1.05em; cursor: pointer; background: #4a5568; color: white; font-weight: bold; margin-top: 8px; }

/* クイズ画面 */
.quiz-screen { display: none; }
.progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.9em; color: #718096; }
.progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4299e1, #48bb78); border-radius: 3px; transition: width 0.3s; }
.unit-tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75em; margin-bottom: 10px; }
.unit-tag.shakai { background: #bee3f8; color: #2b6cb0; }
.unit-tag.rika { background: #c6f6d5; color: #276749; }
.question-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
.question-text { font-size: 1.05em; line-height: 1.7; margin-bottom: 16px; color: #1a202c; }
.choices { display: grid; gap: 10px; }
.choice-btn { padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 10px; background: white; font-size: 0.95em; cursor: pointer; text-align: left; transition: all 0.2s; line-height: 1.5; }
.choice-btn:hover { border-color: #a0aec0; background: #f7fafc; }
.choice-btn.correct { border-color: #48bb78; background: #f0fff4; color: #276749; }
.choice-btn.wrong { border-color: #fc8181; background: #fff5f5; color: #9b2c2c; }
.choice-btn.show-correct { border-color: #48bb78; background: #f0fff4; }
.choice-btn:disabled { cursor: default; }
.explanation { display: none; margin-top: 14px; padding: 14px; background: #fffff0; border: 1px solid #fefcbf; border-radius: 10px; font-size: 0.9em; line-height: 1.7; color: #744210; }
.next-btn { display: none; width: 100%; padding: 14px; border: none; border-radius: 10px; background: #4299e1; color: white; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 12px; }
.next-btn:hover { background: #3182ce; }

/* 結果画面 */
.result-screen { display: none; text-align: center; }
.result-card { background: white; border-radius: 14px; padding: 30px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
.score-big { font-size: 3em; font-weight: bold; color: #2d3748; }
.score-label { font-size: 1em; color: #718096; margin-bottom: 16px; }
.result-msg { font-size: 1.1em; margin: 16px 0; }
.wrong-list { text-align: left; margin: 16px 0; }
.wrong-item { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 0.9em; line-height: 1.6; }
.wrong-item .q { font-weight: bold; color: #c53030; }
.wrong-item .a { color: #276749; margin-top: 4px; }
.retry-btn, .back-btn { padding: 14px 24px; border: none; border-radius: 10px; font-size: 1em; cursor: pointer; margin: 6px; }
.retry-btn { background: #4299e1; color: white; }
.back-btn { background: #e2e8f0; color: #4a5568; }
</style>
</head>

// クイズアプリ ロジック
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongAnswers = [];
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(unitKey) {
  let qs;
  if (unitKey === 'all') {
    qs = shuffle(Object.values(QUESTIONS).flat()).slice(0, 20);
  } else {
    qs = shuffle(QUESTIONS[unitKey] || []);
  }
  currentQuestions = qs;
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  answered = false;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;
  document.getElementById('qNum').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('scoreDisplay').textContent = `⭕ ${score}`;
  document.getElementById('progressFill').style.width = `${((currentIndex) / total) * 100}%`;

  const tag = document.getElementById('unitTag');
  tag.textContent = q.unit;
  tag.className = 'unit-tag ' + (q.subject === '理科' ? 'rika' : 'shakai');

  document.getElementById('questionText').textContent = q.question;
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  // 選択肢をシャッフル（正解インデックスも追跡）
  const indices = q.choices.map((_, i) => i);
  const shuffled = shuffle(indices);

  shuffled.forEach(origIdx => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = q.choices[origIdx];
    btn.onclick = () => selectAnswer(btn, origIdx, q);
    choicesDiv.appendChild(btn);
  });
}

function selectAnswer(btn, selectedIdx, q) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);

  if (selectedIdx === q.answer) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    // 正解を表示
    buttons.forEach(b => {
      if (b.textContent === q.choices[q.answer]) {
        b.classList.add('show-correct');
      }
    });
    wrongAnswers.push(q);
  }

  document.getElementById('scoreDisplay').textContent = `⭕ ${score}`;

  const exp = document.getElementById('explanation');
  exp.textContent = '💡 ' + q.explanation;
  exp.style.display = 'block';

  document.getElementById('nextBtn').style.display = 'block';
  document.getElementById('nextBtn').textContent =
    currentIndex < currentQuestions.length - 1 ? '次の問題 →' : '結果を見る 🎉';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < currentQuestions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('finalScore').textContent = `${score} / ${total}（${pct}%）`;

  let msg = '';
  if (pct === 100) msg = '🎉 パーフェクト！すごい！';
  else if (pct >= 80) msg = '👏 よくできました！あと少し！';
  else if (pct >= 60) msg = '📚 まあまあ！復習して完璧にしよう！';
  else msg = '💪 もう一度しっかり復習しよう！';
  document.getElementById('resultMsg').textContent = msg;

  const wrongDiv = document.getElementById('wrongList');
  wrongDiv.innerHTML = '';
  if (wrongAnswers.length > 0) {
    wrongAnswers.forEach(q => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<div class="q">❌ ${q.question}</div><div class="a">→ 正解: ${q.choices[q.answer]}</div>`;
      wrongDiv.appendChild(div);
    });
    document.getElementById('retryBtn').style.display = 'inline-block';
  } else {
    document.getElementById('retryBtn').style.display = 'none';
  }
}

function retryWrong() {
  currentQuestions = shuffle(wrongAnswers);
  currentIndex = 0;
  score = 0;
  wrongAnswers = [];
  answered = false;
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function backToMenu() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('menu').style.display = 'grid';
}

</script>
