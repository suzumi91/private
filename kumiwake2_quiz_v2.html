<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>組分け② テスト対策クイズ v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#fff0f5,#f0f0ff,#f0fff0);min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:12px}
h1{text-align:center;font-size:1.8em;margin:10px 0;color:#d63384}
.subtitle{text-align:center;font-size:1.1em;color:#999;margin-bottom:12px}
.menu{display:grid;gap:10px}
.subject-label{font-size:1.3em;font-weight:bold;margin:8px 0 2px;padding-left:8px;border-left:4px solid #ff69b4}
.subject-label.rika{border-left-color:#9b59b6}
.unit-btn{padding:14px 16px;border:2px solid #ffc0cb;border-radius:14px;background:#fff;font-size:1.2em;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px}
.unit-btn:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(255,105,180,.2)}
.unit-btn:active{transform:scale(.98)}
.unit-btn.rika{border-color:#d8b4fe}
.unit-btn .icon{font-size:1.6em}
.unit-btn .info{flex:1}
.unit-btn .uname{font-weight:bold;color:#333}
.unit-btn .stats{font-size:1em;color:#999;margin-top:2px}
.all-btn{padding:14px;border:none;border-radius:14px;font-size:1.3em;cursor:pointer;background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff;font-weight:bold;margin-top:6px}
.diff-filter{display:flex;gap:6px;justify-content:center;margin:10px 0}
.diff-btn{padding:8px 16px;border-radius:20px;border:2px solid #eee;background:#fff;font-size:1.1em;cursor:pointer;transition:all .15s}
.diff-btn.active{border-color:#ff69b4;background:#fff0f5;color:#d63384;font-weight:bold}
.diff-btn.d1{color:#4caf50}.diff-btn.d1.active{border-color:#4caf50;background:#e8f5e9}
.diff-btn.d2{color:#ff9800}.diff-btn.d2.active{border-color:#ff9800;background:#fff3e0}
.diff-btn.d3{color:#f44336}.diff-btn.d3.active{border-color:#f44336;background:#ffebee}
.quiz-screen{display:none}
.progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:1.1em;color:#999}
.progress-bar{height:6px;background:#f0e0f0;border-radius:3px;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff69b4,#9b59b6);border-radius:3px;transition:width .3s}
.unit-tag{display:inline-block;padding:3px 12px;border-radius:12px;font-size:1em;margin-bottom:8px}
.unit-tag.shakai{background:#fce4ec;color:#c2185b}
.unit-tag.rika{background:#f3e5f5;color:#7b1fa2}
.diff-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.95em;margin-left:6px}
.diff-tag.d1{background:#e8f5e9;color:#2e7d32}
.diff-tag.d2{background:#fff3e0;color:#e65100}
.diff-tag.d3{background:#ffebee;color:#c62828}
.qcard{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(255,105,180,.12);margin-bottom:14px;border:1px solid #fce4ec}
.qtext{font-size:1.3em;line-height:1.7;margin-bottom:14px;color:#333}
.choices{display:grid;gap:8px}
.choice-btn{padding:14px 16px;border:2px solid #f0e0f0;border-radius:12px;background:#fff;font-size:1.2em;cursor:pointer;text-align:left;transition:all .15s;line-height:1.5}
.choice-btn:hover{border-color:#ff69b4;background:#fff5f8}
.choice-btn.correct{border-color:#4caf50;background:#e8f5e9;color:#1b5e20}
.choice-btn.wrong{border-color:#f44336;background:#ffebee;color:#b71c1c}
.choice-btn.show-correct{border-color:#4caf50;background:#e8f5e9}
.choice-btn:disabled{cursor:default}
.feedback{display:none;margin-top:12px;padding:14px;border-radius:12px;font-size:1.2em;line-height:1.6;text-align:center}
.feedback.correct-fb{background:#e8f5e9;border:1px solid #c8e6c9;color:#2e7d32}
.feedback.wrong-fb{background:#fff3e0;border:1px solid #ffe0b2;color:#e65100}
.explanation{display:none;margin-top:10px;padding:14px;background:#fffff0;border:1px solid #fff9c4;border-radius:10px;font-size:1.15em;line-height:1.7;color:#795548}
.next-btn{display:none;width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff;font-size:1.3em;font-weight:bold;cursor:pointer;margin-top:10px}
.result-screen{display:none;text-align:center}
.result-card{background:#fff;border-radius:16px;padding:28px 18px;box-shadow:0 2px 12px rgba(255,105,180,.12);margin-bottom:14px;border:1px solid #fce4ec}
.score-big{font-size:3.4em;font-weight:bold;color:#d63384}
.score-label{font-size:1.2em;color:#999;margin-bottom:12px}
.result-msg{font-size:1.4em;margin:12px 0}
.stars{font-size:2.6em;margin:8px 0}
.wrong-list{text-align:left;margin:12px 0}
.wrong-item{background:#fff5f5;border:1px solid #ffcdd2;border-radius:10px;padding:12px;margin-bottom:8px;font-size:1.1em;line-height:1.5}
.wrong-item .wq{font-weight:bold;color:#c62828}
.wrong-item .wa{color:#2e7d32;margin-top:3px}
.retry-btn,.back-btn,.review-btn{padding:14px 22px;border:none;border-radius:12px;font-size:1.2em;cursor:pointer;margin:4px}
.retry-btn{background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff}
.review-btn{background:linear-gradient(135deg,#ff9800,#ff5722);color:#fff}
.back-btn{background:#f0e0f0;color:#9b59b6}
.history-btn{position:fixed;top:10px;right:10px;background:#fff;border:2px solid #fce4ec;border-radius:50%;width:44px;height:44px;font-size:1.4em;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.history-screen{display:none}
.hist-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #f0e0f0}
.hist-unit{font-weight:bold;color:#d63384;font-size:1.2em}
.hist-scores{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.hist-score{padding:4px 10px;border-radius:8px;font-size:1em}
.hist-score.good{background:#e8f5e9;color:#2e7d32}
.hist-score.ok{background:#fff3e0;color:#e65100}
.hist-score.bad{background:#ffebee;color:#c62828}
.clear-btn{padding:12px 22px;border:none;border-radius:12px;background:#ffcdd2;color:#c62828;font-size:1.15em;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<button class="history-btn" onclick="showHistory()" title="成績">📊</button>
<h1>🌸 組分け② テスト対策クイズ 🌸</h1>
<p class="subtitle">380問から380問ランダム出題！</p>
<div id="menu" class="menu"></div>
<div id="quizScreen" class="quiz-screen">
  <div class="progress"><span id="qNum"></span><span id="scoreDisp"></span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="qcard">
    <span class="unit-tag" id="unitTag"></span><span class="diff-tag" id="diffTag"></span>
    <div class="qtext" id="qText"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">次の問題 →</button>
  </div>
</div>
<div id="resultScreen" class="result-screen">
  <div class="result-card">
    <div class="stars" id="stars"></div>
    <div class="score-big" id="finalScore"></div>
    <div class="score-label">正解率</div>
    <div class="result-msg" id="resultMsg"></div>
  </div>
  <div class="wrong-list" id="wrongList"></div>
  <button class="retry-btn" onclick="retryWrong()" id="retryBtn" style="display:none">🔄 間違えた問題をもう一度</button>
  <button class="review-btn" onclick="reviewWrong()" id="reviewBtn" style="display:none">📖 間違えた問題を復習</button>
  <button class="back-btn" onclick="backToMenu()">🏠 メニューに戻る</button>
</div>
<div id="historyScreen" class="history-screen">
  <h2 style="text-align:center;color:#d63384;margin:10px 0">📊 成績きろく</h2>
  <div id="histList"></div>
  <div style="text-align:center">
    <button class="back-btn" onclick="backToMenu()">🏠 メニューに戻る</button>
    <button class="clear-btn" onclick="clearHistory()">🗑️ きろくをリセット</button>
  </div>
</div>
</div>
<script>
const Q={"shakai5": [{"q": "遠洋漁業の漁獲量が1970年代から急激に減少した理由として最も適切なものはどれですか？","c": ["魚の消費量が減ったから","各国が200カイリの排他的経済水域を設定したから","漁船が老朽化したから","海水温が上昇したから"],"a": 1,"e": "1970年代に各国が排他的経済水域（EEZ）を設定し、外国の近海で自由に漁ができなくなりました。日本の遠洋漁業はピーク時（1973年）の約400万トンから大きく減少。沿岸から200海里（約370km）以内は、その国が水産資源を管理する権利を持ちます。","d": 2},{"q": "北九州市に官営製鉄所がつくられた理由として正しいものはどれですか？","c": ["石灰石の産地が近かったから","中国から鉄鉱石を輸入しやすかったから","筑豊炭田の石炭が利用できたから","太平洋ベルトの中心だったから"],"a": 2,"e": "1901年に八幡（現・北九州市）に官営製鉄所がつくられました。理由は①筑豊炭田の石炭が近くで手に入る、②中国から鉄鉱石を輸入しやすい港がある、の2つ。これが北九州工業地帯の始まりです。現在は鉄鋼業の比重は下がっています。","d": 3},{"q": "瀬戸内海沿いに石油化学コンビナートが多い理由として正しいものはどれですか？","c": ["石油が採れるから","波がおだやかで大型タンカーが入りやすいから","人口が少なく公害が問題にならないから","鉄道輸送に便利だから"],"a": 1,"e": "瀬戸内海は内海で波がおだやかなため、原油を運ぶ大型タンカーが安全に入港できます。また、使われなくなった塩田の跡地に工場を建てられたことも大きな理由です。瀬戸内工業地域は5つの県にまたがっています。","d": 2},{"q": "広島県でかきの養殖がさかんな理由として最も適切なものはどれですか？","c": ["暖流と寒流がぶつかるから","瀬戸内海の波がおだやかで栄養が豊富だから","大陸棚が広がっているから","干潟が多いから"],"a": 1,"e": "広島県はかきの養殖が日本一。瀬戸内海は波がおだやかで養殖いかだが安定し、太田川などから栄養分が流れ込むためプランクトンが豊富です。ほかに、三重県志摩半島の真珠、佐賀県有明海ののりも覚えておきましょう。","d": 2},{"q": "日本が原油の8割以上を中東から輸入している理由として正しいものはどれですか？","c": ["中東が最も近い産油地域だから","中東の原油は品質が最も高いから","中東に世界の石油埋蔵量の多くが集中しているから","中東からの輸送費が最も安いから"],"a": 2,"e": "中東地域（サウジアラビア、UAE、カタールなど）には世界の石油埋蔵量の約半分が集中しています。日本の原油輸入先1位はサウジアラビア。中東への依存度が高いため、政情不安が日本のエネルギーに直接影響します。","d": 2},{"q": "「森は海の恋人」運動で、漁業者が川の上流に植林する理由は何ですか？","c": ["木材を売って収入を得るため","森の栄養分が川を通じて海に届き、プランクトンが増えるから","洪水を防ぐため","観光客を呼ぶため"],"a": 1,"e": "宮城県気仙沼湾のかき養殖業者・畠山重篤さんが始めた運動です。森の落ち葉が分解されてできる栄養分（鉄分など）が川を通じて海に届き、植物プランクトンを増やします。これがかきなどの養殖に必要な餌になります。森と海はつながっているという考え方です。","d": 3},{"q": "中京工業地帯が日本一の工業生産額をあげている最大の理由は何ですか？","c": ["石油化学工業がさかんだから","自動車工業を中心とした機械工業の生産額が大きいから","鉄鋼業が発達しているから","食品工業の割合が高いから"],"a": 1,"e": "中京工業地帯は豊田市のトヨタ自動車を中心に、機械工業（特に輸送用機械）の割合が非常に高いのが特徴です。1990年代半ばに京浜工業地帯を抜いて日本一になりました。機械工業は日本全体の工業生産額の約45％をしめています。","d": 2},{"q": "日本の漁業で働く人が減り続けている理由として最も適切なものはどれですか？","c": ["魚の値段が上がりすぎたから","高齢化が進み、若い人が漁業につかないから","外国人労働者が増えたから","養殖業に転職する人が多いから"],"a": 1,"e": "漁業従事者は現在約12万人で、ピーク時の約3分の1に減少。平均年齢も60歳を超え、高齢化と後継者不足が深刻です。若い人が都市部に出て漁業につかないことが主な原因。水産物の消費量も減少傾向にあります。","d": 2},{"q": "日本の水産業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 沿岸漁業は大型船で数か月かけて遠くの海で行う漁業である\nⅡ 養殖業は魚や貝を人の手で育てて出荷する漁業である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。大型船で遠くの海に行くのは「遠洋漁業」です。沿岸漁業は小型船で日帰りで行います。漁業の種類：沿岸漁業（日帰り・小型船）→沖合漁業（数日・中型船）→遠洋漁業（数か月・大型船）の順に規模が大きくなります。Ⅱは正しい。","d": 2},{"q": "太平洋ベルトについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 関東から九州にかけての太平洋側に工業地帯・地域が連なっている\nⅡ 日本の工場の約99％がこの地域に集中している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。太平洋ベルトには京浜・中京・阪神・北九州の四大工業地帯が含まれます。Ⅱは誤り。「約99％」は中小工場が全工場数にしめる割合であり、太平洋ベルトへの集中率ではありません。ひっかけ問題でよく出るので注意。","d": 3},{"q": "エネルギーについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 原子力発電は発電時に二酸化炭素を出さない\nⅡ 1960年の日本では火力発電が発電量の中心だった","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。原子力発電は発電時にCO2を出しませんが、放射性廃棄物の処理が課題です。Ⅱは誤り。1960年は水力発電が中心でした。その後、高度経済成長期に「エネルギー革命」が起き、石炭→石油→火力発電中心に変わりました。","d": 3},{"q": "日本の工業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 機械工業は日本の工業生産額の約45％をしめている\nⅡ 中小工場は工場数の約99％だが、生産額は約50％にとどまる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。中小工場の数字は頻出：工場数の約99％、働く人の約70％、生産額の約50％。大工場は数は少ないが1工場あたりの生産額が大きいということです。機械工業が約45％で最大、次いで化学工業、金属工業の順。","d": 3},{"q": "自動車工業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 組立工場では関連工場から必要なときに必要な量の部品が届く\nⅡ 部品はすべて組立工場の中でつくられている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。これを「ジャストインタイム方式（かんばん方式）」といい、トヨタが開発しました。在庫を最小限にして効率を上げるしくみです。Ⅱは誤り。自動車は約3万点の部品からなり、多くの関連工場（下請け工場）が部品をつくっています。","d": 2},{"q": "漁場について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 暖流と寒流がぶつかるところは良い漁場になる\nⅡ 大陸棚はプランクトンが少なく漁場には向かない","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。暖流と寒流がぶつかる場所を「潮目（しおめ）」といい、プランクトンが多く好漁場になります。三陸沖（黒潮と親潮の潮目）が代表例。Ⅱは誤り。大陸棚は水深約200mまでの浅い海底で、日光が届きプランクトンが豊富。東シナ海の大陸棚が有名です。","d": 2},{"q": "日本の水産業について述べた文として正しくないものはどれですか？","c": ["銚子港は日本一の漁獲量をほこる","広島県はかきの養殖が日本一である","佐賀県は有明海に面し、真珠の養殖がさかんである","焼津港はかつお類の水揚げが多い"],"a": 2,"e": "佐賀県の有明海でさかんなのは「のり」の養殖です。真珠の養殖は三重県の志摩半島が有名。養殖の組み合わせ：広島県＝かき、三重県＝真珠、佐賀県＝のり、北海道＝さけ（ふ化放流）。漁港：銚子港（千葉）＝漁獲量1位、焼津港（静岡）＝かつお類。","d": 2},{"q": "日本のエネルギーについて述べた文として正しくないものはどれですか？","c": ["石炭の最大の輸入先はオーストラリアである","原油の8割以上を中東から輸入している","液化天然ガスの略称はLPGである","石灰石は日本で100％自給できる"],"a": 2,"e": "液化天然ガスの略称はLNG（Liquefied Natural Gas）です。LPGは液化石油ガス（Liquefied Petroleum Gas）の略で別物。資源の輸入先：原油＝サウジアラビア（中東）、石炭＝オーストラリア、鉄鉱石＝オーストラリア、天然ガス＝オーストラリア・マレーシア。","d": 2},{"q": "工業地帯・工業地域について述べた文として正しくないものはどれですか？","c": ["中京工業地帯は現在日本一の工業生産額である","京浜工業地帯は1990年代半ばまで日本一だった","北九州工業地帯は筑豊炭田の石炭を利用して発展した","阪神工業地帯は自動車工業を中心に発展した"],"a": 3,"e": "自動車工業を中心に発展したのは中京工業地帯です。阪神工業地帯の特徴は中小工場が多いこと。各工業地帯の特徴：京浜＝印刷・出版、中京＝自動車（機械）、阪神＝中小工場、北九州＝鉄鋼（現在は衰退）。","d": 3},{"q": "再生可能エネルギーについて述べた文として正しくないものはどれですか？","c": ["太陽光発電は天候に左右される","風力発電は風の強い場所に設置される","地熱発電は蒸気を利用して発電する","原子力発電はウランを使う再生可能エネルギーである"],"a": 3,"e": "原子力発電はウランという有限な資源を使うため、再生可能エネルギーではありません。再生可能エネルギー＝太陽光・風力・地熱・水力・バイオマスなど、自然の力で繰り返し利用できるもの。原子力は「非化石エネルギー」ではあるが「再生可能」ではない点に注意。","d": 2},{"q": "地場産業について述べた文として正しくないものはどれですか？","c": ["鯖江市はめがねわくの生産で有名である","燕市は洋食器の生産で有名である","今治市は自動車部品の生産で有名である","関市は刃物の生産で有名である"],"a": 2,"e": "今治市（愛媛県）はタオルの生産で有名です。地場産業の代表例：鯖江市（福井県）＝めがねわく（全国の90％以上）、燕市（新潟県）＝洋食器、関市（岐阜県）＝刃物、今治市（愛媛県）＝タオル、輪島市（石川県）＝漆器。","d": 2},{"q": "日本の工場について、中小工場がしめる割合を大きい順に並べるとどうなりますか？","c": ["工場数(99%)→働く人(70%)→生産額(50%)","生産額(50%)→働く人(70%)→工場数(99%)","働く人(70%)→工場数(99%)→生産額(50%)","工場数(99%)→生産額(50%)→働く人(70%)"],"a": 0,"e": "中小工場（従業員300人未満）の割合：工場数＝約99％、働く人＝約70％、生産額＝約50％。つまり数は圧倒的に多いが、1工場あたりの生産額は大工場に比べて小さい。この3つの数字はテストで頻出なので、99→70→50の順で覚えましょう。","d": 3},{"q": "漁業の種類別漁獲量の変化について、1980年代に最も漁獲量が多かった漁業と、2020年代に最も漁獲量が多い漁業の組み合わせとして正しいものはどれですか？","c": ["遠洋漁業→沿岸漁業","沖合漁業→沖合漁業","沖合漁業→養殖業","遠洋漁業→沖合漁業"],"a": 1,"e": "1980年代も現在も沖合漁業が最も多いですが、全体の漁獲量は約1200万トン→約400万トンに減少。遠洋漁業は1970年代の200カイリ水域設定で激減。養殖業は比較的安定しています。グラフの読み取り問題では、各漁業の増減の傾向を押さえましょう。","d": 3},{"q": "石油製品のうち、用途と製品の組み合わせとして正しいものはどれですか？","c": ["自動車の燃料→灯油","ストーブの燃料→ガソリン","プラスチックの原料→ナフサ","船の燃料→軽油"],"a": 2,"e": "原油を精製すると様々な製品ができます。ガソリン＝自動車の燃料、灯油＝ストーブの燃料、軽油＝トラック・バスの燃料、重油＝船・工場の燃料、ナフサ＝プラスチックなど化学製品の原料。原油からの精製順も覚えておくと良いです。","d": 2},{"q": "日本の発電方法の変化について正しいものはどれですか？","c": ["1960年は火力中心→現在も火力中心","1960年は水力中心→現在は火力中心","1960年は原子力中心→現在は火力中心","1960年は火力中心→現在は原子力中心"],"a": 1,"e": "1960年は水力発電が中心（ダムが多く建設された時代）。高度経済成長期に大量の電力が必要になり、火力発電が中心に。2011年の原発事故後は原子力の割合が激減し、火力への依存がさらに高まりました。現在は再生可能エネルギーの割合が徐々に増加中。","d": 2},{"q": "1990年代半ばまで工業生産額1位だった工業地帯と、現在1位の工業地帯の組み合わせとして正しいものはどれですか？","c": ["阪神→中京","京浜→中京","京浜→阪神","北九州→京浜"],"a": 1,"e": "京浜工業地帯（東京・神奈川）は長年日本一でしたが、1990年代半ばに中京工業地帯（愛知・三重）に抜かれました。中京は自動車産業の成長で躍進。北九州工業地帯は石炭産業の衰退で四大工業地帯から外されることもあります。","d": 2},{"q": "ある工場では原油を精製してナフサを取り出し、それを原料にして製品をつくっています。この工場でつくられる製品として最も適切なものはどれですか？","c": ["ガソリン","セメント","プラスチック","鉄鋼"],"a": 2,"e": "原油→精製→ナフサ→プラスチックという流れです。ナフサは石油化学工業の基礎原料で、プラスチック・合成繊維・合成ゴムなどの化学製品がつくられます。ガソリンも原油から精製されますが、ナフサとは別の成分。石油化学コンビナートでは、これらの工場がパイプで結ばれて効率的に生産しています。","d": 2},{"q": "ある県では、使われなくなった塩田のあと地に工場が建てられ、外国から船で運ばれてきた原料を加工しています。この県がある地域として最も適切なものはどれですか？","c": ["太平洋ベルトの関東地方","日本海側の東北地方","瀬戸内海沿岸","北海道の太平洋側"],"a": 2,"e": "ヒントは「塩田跡地」と「船での原料輸入」。瀬戸内海沿岸では、かつて塩田だった広い平地に石油化学コンビナートが建設されました。瀬戸内海は波がおだやかで大型タンカーが入りやすく、原料の海上輸送に適しています。岡山県倉敷市の水島コンビナートが代表例です。","d": 3},{"q": "高知県の漁師がかつおの一本づりをしています。この漁業の種類と、かつおが乗ってくる海流の組み合わせとして正しいものはどれですか？","c": ["沿岸漁業・黒潮","遠洋漁業・黒潮","沿岸漁業・親潮","沖合漁業・対馬海流"],"a": 0,"e": "かつおの一本づりは日帰りの小型船で行う沿岸漁業です。かつおは暖流の黒潮（日本海流）に乗って春〜夏に北上し、秋に南下します。北上するかつおを「初がつお」、南下するかつおを「戻りがつお」といいます。高知県は黒潮が近くを流れるため、かつお漁がさかんです。","d": 2},{"q": "ある都市はもと「挙母市」とよばれていましたが、ある企業の発展とともに名前が変わりました。この都市がある工業地帯と、その工業地帯の特徴の組み合わせとして正しいものはどれですか？","c": ["京浜工業地帯・印刷業がさかん","中京工業地帯・機械工業の割合が高い","阪神工業地帯・中小工場が多い","北関東工業地域・IC工場が多い"],"a": 1,"e": "挙母市（ころもし）→豊田市。トヨタ自動車の本社がある「企業城下町」です。中京工業地帯は機械工業（特に輸送用機械＝自動車）の割合が約70％と非常に高いのが特徴。企業城下町の例：豊田市＝トヨタ、日立市＝日立製作所、延岡市＝旭化成。","d": 3},{"q": "2011年の原子力発電所事故のあと、日本の発電方法はどのように変化しましたか？","c": ["原子力の割合が増え、火力が減った","原子力の割合が減り、火力と再生可能エネルギーが増えた","水力の割合が大きく増えた","変化はなかった"],"a": 1,"e": "2011年の福島第一原発事故後、全国の原発が順次停止。原子力の割合は事故前の約30％→ほぼ0％に激減しました。不足分を補うため火力発電（特にLNG）が急増し、CO2排出量も増加。同時に太陽光を中心とした再生可能エネルギーの導入が加速しました。","d": 2},{"q": "日本の漁業生産量は1980年代をピークに減少しています。その原因として正しいものを2つ含む組み合わせはどれですか？\nア 200カイリ水域の設定で遠洋漁業が制限された\nイ 日本人の魚の消費量が増えすぎた\nウ とりすぎによる水産資源の減少\nエ 養殖業が禁止された","c": ["アとイ","アとウ","イとエ","ウとエ"],"a": 1,"e": "正解はアとウ。①1970年代の200カイリ水域設定で遠洋漁業が大幅に制限、②とりすぎ（乱獲）で水産資源が減少。イは誤り（消費量はむしろ減少傾向）、エは誤り（養殖業は推進されている）。日本の漁業生産量はピーク時の約1200万トン→現在約400万トンに減少しています。","d": 3},{"q": "コンビナートとモーダルシフトに共通する目的として最も適切なものはどれですか？","c": ["雇用を増やすこと","輸送や生産の効率を高めること","環境を保護すること","外国との貿易を増やすこと"],"a": 1,"e": "コンビナート＝工場をパイプで結んで原料・製品を効率的にやりとりする仕組み。モーダルシフト＝トラック輸送から鉄道・船舶に切り替えて効率化する取り組み。どちらも「効率化」が共通目的です。モーダルシフトにはCO2削減の効果もありますが、主目的は効率化と人手不足対策です。","d": 3},{"q": "「加工貿易」と「産業の空洞化」の関係について正しく述べたものはどれですか？","c": ["加工貿易が増えると産業の空洞化が進む","工場が海外に移転すると国内の加工貿易の力が弱まる","産業の空洞化が進むと原料の輸入が増える","加工貿易と産業の空洞化は関係がない"],"a": 1,"e": "加工貿易＝原料を輸入→国内で加工→製品を輸出。産業の空洞化＝円高や人件費の高さから工場が海外に移転する現象。工場が海外に出ると、国内で加工する力が弱まり、加工貿易の基盤が失われます。1985年のプラザ合意後の急激な円高が空洞化を加速させました。","d": 3},{"q": "地熱発電と原子力発電に共通する発電のしくみは何ですか？","c": ["風の力で発電する","水の落差で発電する","蒸気でタービンを回して発電する","太陽の光で発電する"],"a": 2,"e": "地熱発電＝地下のマグマで熱せられた蒸気を利用。原子力発電＝ウランの核分裂の熱で水を蒸気にする。どちらも「蒸気でタービンを回す」点が共通。火力発電も同じ仕組みです。発電方法の分類：タービン式（火力・原子力・地熱）、直接変換式（太陽光）、回転式（風力・水力）。","d": 2},{"q": "排他的経済水域（200カイリ水域）の設定は、日本の漁業と資源の両方に影響を与えました。日本にとってプラスの影響はどれですか？","c": ["遠洋漁業の漁獲量が増えた","日本の近海の水産資源を守れるようになった","外国の漁船が自由に日本近海で漁ができるようになった","養殖業が不要になった"],"a": 1,"e": "200カイリ水域（約370km）の設定で、日本は自国の近海の水産資源を管理・保護できるようになりました。一方で、他国の近海での漁が制限され遠洋漁業は打撃を受けました。日本の排他的経済水域は世界第6位の広さ。海底のレアアースやメタンハイドレートなどの資源開発も期待されています。","d": 3},{"q": "高度経済成長期（1955〜1973年）に起きた変化として正しいものを2つ含む組み合わせはどれですか？\nア エネルギーの中心が石炭から石油に変わった\nイ 太平洋ベルトに工場が集中した\nウ 漁業の中心が養殖業に変わった\nエ 工業生産額が減少した","c": ["アとイ","アとウ","イとエ","ウとエ"],"a": 0,"e": "正解はアとイ。ア＝「エネルギー革命」と呼ばれ、石炭から石油への転換が進みました。イ＝太平洋ベルトに四大工業地帯が形成。ウは誤り（養殖業は増えたが中心にはなっていない）、エは誤り（工業生産額は急増した）。この時期にGNPが世界第2位になりました。","d": 3},{"q": "レアアースやメタンハイドレートなどの海底資源が注目されている理由として最も適切なものはどれですか？","c": ["日本の領海が広がったから","外国からの資源輸入に頼る日本にとって自国の資源確保が重要だから","海底資源は採掘コストが安いから","すでに大量に生産されているから"],"a": 1,"e": "日本はエネルギー資源の自給率がわずか約12％で、石油・天然ガス・石炭のほとんどを輸入に頼っています。南鳥島周辺のレアアース泥や、日本海側のメタンハイドレートなど、自国の排他的経済水域内の海底資源開発が期待されています。レアアースはスマートフォンや電気自動車に不可欠な希少金属です。","d": 3},{"q": "日本で最も漁獲量が多い漁港はどこですか？","c": ["焼津港","銚子港","釧路港","枕崎港"],"a": 1,"e": "銚子港（千葉県）は日本一の漁獲量を誇ります。利根川の河口に位置し、黒潮と親潮がぶつかる好漁場に近いことが理由です。主な漁港：銚子港（千葉）＝漁獲量1位、焼津港（静岡）＝かつお・まぐろ、釧路港（北海道）＝さんま、枕崎港（鹿児島）＝かつお節。","d": 1},{"q": "石油精製工場と石油化学工場がパイプで結ばれたしくみを何といいますか？","c": ["コンビナート","コンテナ","コンソーシアム","コングロマリット"],"a": 0,"e": "コンビナートはロシア語で「結合」の意味。石油精製→石油化学→プラスチック工場などがパイプラインで結ばれ、原料や製品を効率的にやりとりします。代表例：千葉県京葉工業地域、岡山県水島、三重県四日市。コンテナは輸送用の箱、コンソーシアムは企業連合の意味です。","d": 1},{"q": "2011年に事故が発生した原子力発電所がある県はどこですか？","c": ["新潟県","福島県","茨城県","静岡県"],"a": 1,"e": "2011年3月11日の東日本大震災による津波で、福島県の福島第一原子力発電所で事故が発生。大量の放射性物質が放出され、周辺住民が避難を余儀なくされました。この事故をきっかけに日本のエネルギー政策は大きく転換し、原発の安全基準が厳格化されました。","d": 1},{"q": "1955年〜1973年の日本経済が大きく発展した時期を何といいますか？","c": ["バブル経済","高度経済成長","明治維新","産業革命"],"a": 1,"e": "高度経済成長期（1955〜1973年）は日本のGNPが年平均10％以上成長した時期。三種の神器（白黒テレビ・洗濯機・冷蔵庫）や3C（カラーテレビ・クーラー・自動車）が普及。1968年にGNPが世界第2位に。1973年の石油危機（オイルショック）で終わりを迎えました。","d": 1},{"q": "セメントの原料となる、日本で100％自給できる資源は何ですか？","c": ["鉄鉱石","石灰石","石炭","原油"],"a": 1,"e": "石灰石は日本で唯一100％自給できる鉱産資源です。セメントの主原料で、山口県秋吉台や福岡県北九州市などが主な産地。日本の資源自給率：石灰石＝100％、天然ガス＝約3％、石炭＝約1％、原油＝ほぼ0％。鉄鉱石もほぼ全量を輸入しています。","d": 1},{"q": "福井県鯖江市で生産量日本一の製品は何ですか？","c": ["タオル","洋食器","めがねわく","刃物"],"a": 2,"e": "鯖江市（福井県）はめがねわくの生産が全国の90％以上をしめます。明治時代に農閑期の副業として始まりました。地場産業の代表例：鯖江市＝めがねわく、燕市（新潟県）＝洋食器、今治市（愛媛県）＝タオル、関市（岐阜県）＝刃物、輪島市（石川県）＝漆器。","d": 1}],"shakai6": [{"q": "四大公害病の裁判ですべて住民側が勝訴した理由として最も適切なものはどれですか？","c": ["企業が自主的に非を認めたから","企業の排出物質と健康被害の因果関係が科学的に証明されたから","国が企業に賠償を命じたから","住民の数が多かったから"],"a": 1,"e": "四大公害裁判（1967〜1973年提訴）ではすべて住民側が勝訴。決め手は疫学調査などで「企業の排出物質→環境汚染→健康被害」の因果関係が科学的に立証されたこと。この裁判をきっかけに1967年公害対策基本法、1971年環境庁が設置されました。","d": 2},{"q": "高度経済成長期に公害が深刻化した理由として最も適切なものはどれですか？","c": ["人口が減少したから","経済成長を優先し環境対策が後回しにされたから","外国から有害物質が輸入されたから","農業が衰退したから"],"a": 1,"e": "1955〜1973年の高度経済成長期は「経済成長優先」の時代。工場の排水・排煙の規制が不十分なまま重化学工業が急速に発展し、四大公害病が発生しました。1967年に公害対策基本法が制定され、ようやく本格的な対策が始まりました。","d": 2},{"q": "日本で少子化が進んでいる理由として最も適切なものはどれですか？","c": ["医療技術が発達したから","晩婚化・未婚化や子育て費用の増加など複数の要因があるから","外国への移住が増えたから","出生届の制度が変わったから"],"a": 1,"e": "少子化の原因は複合的です。①晩婚化・未婚化の進行、②子育て・教育費用の負担増、③女性の社会進出と仕事・育児の両立の難しさ、④価値観の多様化。合計特殊出生率は1.20前後（2023年）で、人口維持に必要な2.07を大きく下回っています。","d": 2},{"q": "過疎地域で高齢化率が高くなる理由として最も適切なものはどれですか？","c": ["高齢者が過疎地域に移住するから","若者が都市部に流出し高齢者の割合が相対的に高まるから","過疎地域は医療が充実しているから","高齢者は寒い地域を好むから"],"a": 1,"e": "過疎地域では若者が進学や就職で都市部に流出するため、残った住民に占める高齢者の割合が高くなります。これを「社会減」といいます。高齢化率が50％を超えると「限界集落」と呼ばれ、集落の維持が困難になります。","d": 2},{"q": "水俣病が熊本県水俣市で発生した理由として最も適切なものはどれですか？","c": ["水俣市は人口が多かったから","化学工場が有機水銀を含む排水を水俣湾に流したから","水俣湾の海水温が高かったから","水俣市の水道水が汚染されたから"],"a": 1,"e": "チッソ（化学工場）がアセトアルデヒド製造の過程で発生した有機水銀（メチル水銀）を水俣湾に排出。魚介類に蓄積（生物濃縮）し、それを食べた住民に神経障害が発生しました。1956年に公式確認。同じ原因で新潟水俣病（阿賀野川流域）も発生しています。","d": 2},{"q": "東京などの大都市でヒートアイランド現象が起きる理由として最も適切なものはどれですか？","c": ["人口が少ないから","アスファルトやコンクリートが熱を蓄えエアコンの排熱も加わるから","緑地が増えているから","海に近いから"],"a": 1,"e": "ヒートアイランド現象の原因：①アスファルト・コンクリートが日中の熱を蓄える、②エアコン・自動車の排熱、③緑地や水面の減少で蒸発冷却が減る。都市の気温が周辺より高くなり、等温線が島のように見えることから名付けられました。","d": 2},{"q": "公害対策基本法が環境基本法に変わった理由として最も適切なものはどれですか？","c": ["公害がすべてなくなったから","地球温暖化など地球規模の環境問題に対応する必要が出てきたから","企業の反対があったから","外国からの圧力があったから"],"a": 1,"e": "公害対策基本法（1967年）は国内の公害への対策が中心でした。しかし1990年代には地球温暖化・オゾン層破壊・酸性雨など地球規模の環境問題が深刻化。より広い視野で環境を守るため、1993年に環境基本法が制定されました。","d": 3},{"q": "四大公害病について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ 水俣病とイタイイタイ病はどちらも水質汚濁が原因である\\nⅡ 四日市ぜんそくは大気汚染が原因である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。水俣病＝有機水銀（水質汚濁）、イタイイタイ病＝カドミウム（水質汚濁）、四日市ぜんそく＝二酸化イオウ（大気汚染）。四大公害病の分類：水質汚濁系＝水俣病・新潟水俣病・イタイイタイ病、大気汚染系＝四日市ぜんそく。","d": 2},{"q": "日本の人口について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ 日本の人口は2008年ごろをピークに減少に転じた\\nⅡ 少子高齢化とは子どもの数が増え高齢者が減ることである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。日本の人口は約1億2808万人（2008年）をピークに減少中。Ⅱは誤り。少子高齢化は「子どもの割合が減り、高齢者の割合が増える」こと。65歳以上の割合（高齢化率）は約29％で世界最高水準です。","d": 2},{"q": "3Rについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ リデュースとはごみを減らすことである\\nⅡ リサイクルとはくりかえし使うことである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。リデュース（Reduce）＝ごみを減らす。Ⅱは誤り。くりかえし使うのはリユース（Reuse）です。リサイクル（Recycle）＝資源として再利用すること。優先順位はリデュース→リユース→リサイクルの順。","d": 2},{"q": "地球温暖化について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ 温室効果ガスの排出量が世界で最も多い国は中国である\\nⅡ 地球温暖化が進むと海面が下がる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。CO2排出量は中国が世界1位（約30％）、2位アメリカ、3位インド。Ⅱは誤り。温暖化で氷河や南極の氷が溶け、海面は「上昇」します。ツバルなどの低い島国は水没の危機にあります。","d": 2},{"q": "過疎と過密について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ 過疎地域では病院や学校の統廃合が問題になっている\\nⅡ 過密地域では交通渋滞や住宅不足が問題になっている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。過疎の問題：人口減少→病院・学校・商店の閉鎖→バス路線の廃止→さらに人口流出の悪循環。過密の問題：交通渋滞・住宅不足・ごみ問題・ヒートアイランド現象。日本は「過疎と過密の二極化」が進んでいます。","d": 2},{"q": "足尾銅山鉱毒事件について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\\nⅠ 田中正造が天皇に直訴して公害反対運動を行った\\nⅡ 被害を受けたのは利根川流域の住民である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。田中正造は衆議院議員として足尾銅山の鉱毒問題を国会で追及し、1901年に明治天皇に直訴しました。Ⅱは誤り。被害を受けたのは渡良瀬川流域（栃木県〜群馬県）の住民です。日本の公害反対運動の原点とされています。","d": 2},{"q": "四大公害病について述べた文として正しくないものはどれですか？","c": ["水俣病は有機水銀が原因である","イタイイタイ病は神通川流域で発生した","四日市ぜんそくはカドミウムが原因である","新潟水俣病は阿賀野川流域で発生した"],"a": 2,"e": "四日市ぜんそくの原因は二酸化イオウ（SO2）で、カドミウムではありません。カドミウムはイタイイタイ病の原因物質。四大公害病：水俣病＝有機水銀・熊本県、新潟水俣病＝有機水銀・新潟県、イタイイタイ病＝カドミウム・富山県、四日市ぜんそく＝SO2・三重県。","d": 2},{"q": "地球環境問題について述べた文として正しくないものはどれですか？","c": ["酸性雨は硫黄酸化物や窒素酸化物が原因である","オゾン層を破壊する原因物質はフロンガスである","熱帯林の減少は砂漠化の原因の一つである","地球温暖化の原因は主にオゾン層の破壊である"],"a": 3,"e": "地球温暖化の原因は温室効果ガス（主にCO2）の増加であり、オゾン層の破壊ではありません。オゾン層破壊は紫外線の増加を引き起こす別の問題。地球環境問題は①温暖化、②オゾン層破壊、③酸性雨、④熱帯林減少、⑤砂漠化の5つを区別して覚えましょう。","d": 3},{"q": "日本の人口問題について述べた文として正しくないものはどれですか？","c": ["合計特殊出生率は2.0を下回っている","高齢化率は約29％で世界最高水準である","日本の人口は2050年には1億人を下回ると予測されている","少子化の原因は主に医療技術の低下である"],"a": 3,"e": "少子化の原因は医療技術の低下ではなく、晩婚化・未婚化・子育て費用の増加などです。むしろ医療技術は向上しており、平均寿命は延びています（男性約81歳、女性約87歳）。医療の発達は「高齢化」の要因であり、「少子化」の原因ではありません。","d": 2},{"q": "環境を守る取り組みについて述べた文として正しくないものはどれですか？","c": ["SDGsは17の目標を掲げている","デポジット制度は容器代を上乗せして販売し返却時に払い戻すしくみである","フードバンクは食品を安く販売する店のことである","リターナブルびんは洗ってくりかえし使えるびんである"],"a": 2,"e": "フードバンクは食品を「安く販売する店」ではなく、企業から寄付された余剰食品を必要な人に「無料で届ける」活動です。食品ロス（まだ食べられるのに捨てられる食品）を減らす取り組みの一つ。日本の食品ロスは年間約523万トン（2021年）。","d": 2},{"q": "公害の種類について述べた文として正しくないものはどれですか？","c": ["現在最も件数が多い公害は騒音である","光化学スモッグは光化学オキシダントが原因である","ダイオキシンはプラスチックを高温で燃やすと発生する","マイクロプラスチックは海洋汚染の原因になっている"],"a": 2,"e": "ダイオキシンはプラスチックなどを「低温で」燃やしたときに発生します。高温（800℃以上）で完全燃焼させれば発生しにくくなります。「人類がつくり出した最悪の毒物」ともいわれ、ごみ焼却施設の高温化が対策として進められました。","d": 3},{"q": "日本の人口ピラミッドの形が「つぼ型」になっている理由として正しいものはどれですか？","c": ["出生率が高く死亡率も高いから","出生率が低下し高齢者の割合が増えているから","若者の人口が急増しているから","人口が一定で変化がないから"],"a": 1,"e": "人口ピラミッドの型：富士山型（多産多死・発展途上国）→つりがね型（少産少死・先進国）→つぼ型（少子高齢化が進んだ国）。日本は典型的なつぼ型で、下（若年層）が細く上（高齢層）が太い形。1950年代は富士山型でした。","d": 3},{"q": "CO2排出量について、総排出量が多い順に並べたものとして正しいものはどれですか？","c": ["中国→アメリカ→インド","アメリカ→中国→インド","インド→中国→アメリカ","中国→インド→アメリカ"],"a": 0,"e": "CO2総排出量の順位：1位中国（約30％）→2位アメリカ（約14％）→3位インド（約7％）。ただし1人あたりの排出量ではアメリカが中国の約2倍。先進国には歴史的な排出責任があり、途上国との間で負担の公平性が議論されています。","d": 2},{"q": "日本の高齢化率の変化として正しいものはどれですか？","c": ["1970年に7％を超え「高齢化社会」になった","1970年に14％を超え「高齢社会」になった","1994年に7％を超え「高齢化社会」になった","2000年に21％を超え「超高齢社会」になった"],"a": 0,"e": "日本の高齢化の歩み：1970年に7％超→「高齢化社会」、1994年に14％超→「高齢社会」、2007年に21％超→「超高齢社会」。わずか37年で高齢化社会→超高齢社会に到達。フランスは同じ変化に115年かかっており、日本の高齢化スピードは世界最速です。","d": 3},{"q": "エルニーニョ現象とラニーニャ現象の日本への影響の組み合わせとして正しいものはどれですか？","c": ["エルニーニョ＝猛暑・厳冬、ラニーニャ＝冷夏・暖冬","エルニーニョ＝冷夏・暖冬、ラニーニャ＝猛暑・厳冬","エルニーニョ＝冷夏・厳冬、ラニーニャ＝猛暑・暖冬","エルニーニョ＝猛暑・暖冬、ラニーニャ＝冷夏・厳冬"],"a": 1,"e": "エルニーニョ（ペルー沖の海水温上昇）→日本は冷夏・暖冬になりやすい。ラニーニャ（ペルー沖の海水温低下）→日本は猛暑・厳冬になりやすい。名前の由来：エルニーニョ＝スペイン語で「男の子」、ラニーニャ＝「女の子」。","d": 3},{"q": "日本の三大都市圏に住む人口の割合として最も近いものはどれですか？","c": ["約30％","約50％","約70％","約90％"],"a": 1,"e": "三大都市圏（東京・大阪・名古屋）には日本の総人口の約50％が集中しています。特に東京圏（東京・神奈川・埼玉・千葉）だけで約3700万人、全人口の約30％。一極集中が進む東京と、人口減少が進む地方の格差が大きな課題です。","d": 2},{"q": "ある地域では若者が都市部に流出し、残った住民の半数以上が65歳以上です。バスの路線も廃止され病院まで車で1時間かかります。この問題を表す言葉はどれですか？","c": ["過密問題","ドーナツ化現象","限界集落","ヒートアイランド現象"],"a": 2,"e": "高齢化率が50％を超え集落の維持が困難になった状態を「限界集落」といいます。問題の連鎖：若者流出→高齢化→商店・病院の閉鎖→公共交通の廃止→さらに人口流出。ドーナツ化現象は都市の中心部の人口が減り郊外が増える現象で別物です。","d": 2},{"q": "工場から排出された有害物質が川に流れ込み、魚に蓄積され、その魚を食べた人に健康被害が出ました。この現象を何といいますか？","c": ["温室効果","酸性雨","生物濃縮","砂漠化"],"a": 2,"e": "生物濃縮とは有害物質が食物連鎖の上位にいくほど体内に高濃度で蓄積される現象です。水俣病がその典型例：工場排水の有機水銀→プランクトン→小魚→大魚→人間と濃縮が進みました。DDTによる鳥類への影響も生物濃縮の例として有名です。","d": 3},{"q": "1997年に京都で先進国のCO2削減目標が決められ、2015年にすべての国が参加する取り決めができました。この2つの組み合わせとして正しいものはどれですか？","c": ["京都議定書→パリ協定","京都議定書→SDGs","パリ協定→京都議定書","SDGs→パリ協定"],"a": 0,"e": "京都議定書（1997年）＝先進国のみにCO2削減義務。パリ協定（2015年）＝すべての国が参加し、気温上昇を2℃未満に抑える目標。京都議定書は途上国に義務がなく不公平との批判があり、パリ協定で全員参加型に進化しました。","d": 3},{"q": "ある市では琵琶湖の水質を守るためにリンを含む合成洗剤の販売を条例で禁止しました。この市がある県はどこですか？","c": ["京都府","滋賀県","大阪府","奈良県"],"a": 1,"e": "滋賀県は琵琶湖の水質汚染対策として1979年に「琵琶湖条例」を制定し、リンを含む合成洗剤の販売・使用を禁止しました。琵琶湖は日本最大の湖で近畿地方約1450万人の水がめ。住民の「石けん運動」が条例制定のきっかけです。","d": 2},{"q": "高齢者1人を支える現役世代が1960年代の約11人から2020年代は約2人に減っています。最も深刻な影響はどれですか？","c": ["学校の数が増える","年金や医療費など社会保障費の負担が増える","道路の建設が進む","食料自給率が上がる"],"a": 1,"e": "高齢者を支える現役世代の比率：1965年＝約11人で1人→2020年＝約2人で1人→2050年予測＝約1.4人で1人。現役世代の負担が急増し、年金・医療・介護の社会保障費が国の財政を圧迫。2023年度の社会保障費は約134兆円で国の歳出の約3分の1。","d": 3},{"q": "2015年に国連で採択された17の目標を掲げる国際目標の略称と採択年の組み合わせとして正しいものはどれですか？","c": ["MDGs・2000年","SDGs・2015年","SDGs・2020年","MDGs・2015年"],"a": 1,"e": "SDGs（持続可能な開発目標）は2015年の国連サミットで採択。17の目標と169のターゲットからなり2030年までの達成をめざします。前身のMDGs（ミレニアム開発目標）は2000年採択で主に途上国の課題が対象。SDGsは先進国を含むすべての国が対象です。","d": 2},{"q": "「過疎」と「過密」は正反対の問題ですが、共通する根本原因として最も適切なものはどれですか？","c": ["自然災害の増加","都市部への人口集中（一極集中）","外国人労働者の増加","インターネットの普及"],"a": 1,"e": "過疎（地方の人口減少）と過密（都市の人口過剰）は表裏一体の問題で、根本原因は「都市部への人口集中」です。特に東京一極集中が深刻。対策として地方創生政策が進められ、テレワークの普及で地方移住も注目されています。","d": 3},{"q": "「循環型社会」と「持続可能な社会」に共通する考え方として最も適切なものはどれですか？","c": ["経済成長を最優先にする","限りある資源を大切にし将来の世代にも残す","ごみをすべて焼却する","先進国だけが取り組む"],"a": 1,"e": "循環型社会＝3Rで資源を循環させる社会。持続可能な社会＝環境・経済・社会のバランスを保ち将来の世代も豊かに暮らせる社会。どちらも「限りある資源を大切にする」という考え方が共通。2000年に循環型社会形成推進基本法が制定されました。","d": 3},{"q": "公害対策と環境保全の歴史を古い順に並べたものとして正しいものはどれですか？","c": ["環境基本法→公害対策基本法→環境庁設置","足尾銅山鉱毒事件→公害対策基本法→環境基本法","公害対策基本法→足尾銅山鉱毒事件→環境庁設置","環境庁設置→公害対策基本法→環境基本法"],"a": 1,"e": "正しい順序：足尾銅山鉱毒事件（1890年代）→公害対策基本法（1967年）→環境庁設置（1971年）→環境基本法（1993年）→環境省に格上げ（2001年）。日本の環境政策は公害被害→法整備→国際的な環境問題への対応と段階的に発展してきました。","d": 3},{"q": "「フードバンク」「食品ロス削減」「フリーマーケット」に共通するSDGsの考え方として最も適切なものはどれですか？","c": ["つくる責任つかう責任","質の高い教育をみんなに","産業と技術革新の基盤をつくろう","平和と公正をすべての人に"],"a": 0,"e": "フードバンク・食品ロス削減・フリーマーケットはすべてSDGs目標12「つくる責任つかう責任」に関連します。大量生産・大量消費・大量廃棄の社会から、持続可能な消費と生産のパターンへの転換をめざしています。","d": 3},{"q": "環境ホルモンとマイクロプラスチックに共通する問題点として最も適切なものはどれですか？","c": ["大気汚染を引き起こす","生物の体内に蓄積して健康に影響を与える","オゾン層を破壊する","酸性雨の原因になる"],"a": 1,"e": "環境ホルモン（ダイオキシン・PCBなど）＝体内のホルモンに似た働きをし生殖機能などに影響。マイクロプラスチック（5mm以下のプラスチック片）＝海洋生物が誤って食べ食物連鎖で人間にも影響する可能性。どちらも「生物の体内に蓄積する」点が共通の問題です。","d": 3},{"q": "四大公害病のうち、富山県の神通川流域で発生した病気は何ですか？","c": ["水俣病","四日市ぜんそく","イタイイタイ病","新潟水俣病"],"a": 2,"e": "イタイイタイ病は富山県神通川流域で発生。原因物質はカドミウム。鉱山の排水に含まれるカドミウムが川に流れ、米や飲料水を通じて体内に入り骨がもろくなる病気。「イタイイタイ」は患者が痛みを訴えたことに由来します。","d": 1},{"q": "2001年に環境庁が格上げされてできた省は何ですか？","c": ["厚生労働省","環境省","国土交通省","経済産業省"],"a": 1,"e": "環境庁（1971年設置）は2001年の中央省庁再編で環境省に格上げされました。「庁」から「省」への格上げは環境問題の重要性が高まったことを示しています。環境省は地球温暖化対策、廃棄物処理、自然保護などを担当。","d": 1},{"q": "SDGsの目標は全部でいくつありますか？","c": ["10","13","17","20"],"a": 2,"e": "SDGsは17の目標と169のターゲットからなります。代表的な目標：1.貧困をなくそう、2.飢餓をゼロに、7.エネルギーをみんなにそしてクリーンに、12.つくる責任つかう責任、13.気候変動に具体的な対策を。","d": 1},{"q": "オゾン層を破壊する原因物質は何ですか？","c": ["二酸化炭素","フロンガス","二酸化イオウ","メタン"],"a": 1,"e": "フロンガス（フロン類）がオゾン層を破壊します。かつて冷蔵庫やエアコンの冷媒、スプレーの噴射剤に使われていました。1987年のモントリオール議定書でフロンの生産・使用が規制され、オゾンホールは回復傾向にあります。","d": 1},{"q": "ごみを減らす3Rのうち、最も優先すべきものはどれですか？","c": ["リサイクル","リユース","リデュース","リペア"],"a": 2,"e": "3Rの優先順位：①リデュース（Reduce＝そもそもごみを出さない）→②リユース（Reuse＝くりかえし使う）→③リサイクル（Recycle＝資源として再利用）。まず「出さない」ことが最も効果的。マイバッグ持参やレジ袋有料化もリデュースの取り組みです。","d": 1}],"shakai7": [{"q": "モーダルシフトが進められている理由として最も適切なものはどれですか？","c": ["鉄道の運賃が安いから","トラック運転手の不足やCO2削減のため","船の速度が上がったから","航空機の利用が減ったから"],"a": 1,"e": "モーダルシフトはトラック輸送から鉄道・船舶への転換です。理由は①トラック運転手の高齢化・人手不足、②CO2排出量の削減（トラックは鉄道の約13倍のCO2を排出）。2024年問題（運転手の時間外労働規制）でさらに加速しています。","d": 2},{"q": "東海道新幹線が東京〜新大阪間に建設された理由として最も適切なものはどれですか？","c": ["景色がきれいだから","太平洋ベルトに沿って人口と産業が集中していたから","建設費が最も安かったから","在来線がなかったから"],"a": 1,"e": "東海道新幹線（1964年開業）は東京〜名古屋〜大阪という太平洋ベルト上の三大都市圏を結びます。この地域に日本の人口・産業の大部分が集中しており、輸送需要が最も高かったため最初に建設されました。東京オリンピックに合わせて開業。","d": 2},{"q": "リニア中央新幹線が建設されている理由として最も適切なものはどれですか？","c": ["東海道新幹線の老朽化と大規模災害時の代替ルート確保のため","飛行機より安いから","東北地方との接続のため","貨物輸送のため"],"a": 0,"e": "リニア中央新幹線の建設理由は①東海道新幹線の老朽化（開業60年超）による大規模改修の必要性、②南海トラフ地震など大規模災害時の代替ルート確保、③東京〜名古屋間を約40分に短縮。時速505kmの超電導リニアモーターカーを使用します。","d": 3},{"q": "宅配便の取扱個数が急増している理由として最も適切なものはどれですか？","c": ["郵便物が減ったから","インターネット通販の普及で個人向け配送が増えたから","企業間の取引が増えたから","コンビニが増えたから"],"a": 1,"e": "宅配便の取扱個数は年間約50億個（2023年）。最大の要因はインターネット通販（EC）の急成長です。特にコロナ禍以降、ネット通販利用が加速。一方で再配達問題（約15％が不在で再配達）やドライバー不足が社会問題になっています。","d": 2},{"q": "ミニ新幹線（山形・秋田新幹線）が採用された理由として最も適切なものはどれですか？","c": ["速度が速いから","在来線の線路を活用して建設費をおさえるため","景色を楽しむため","貨物も運べるから"],"a": 1,"e": "ミニ新幹線は在来線の線路幅を広げて新幹線車両を走らせる方式です。フル規格新幹線より建設費が大幅に安い（約10分の1）のが最大の利点。山形新幹線（1992年）は福島駅、秋田新幹線（1997年）は盛岡駅で東北新幹線から分かれます。","d": 2},{"q": "デジタル・デバイド（情報格差）が問題になっている理由として最も適切なものはどれですか？","c": ["テレビの視聴率が下がったから","ICTを使える人と使えない人で受けられるサービスに差が生じるから","新聞の発行部数が減ったから","電話料金が高いから"],"a": 1,"e": "デジタル・デバイドとは、パソコンやインターネットを使いこなせる人と使えない人の間に生じる格差です。行政手続き・買い物・情報収集などがデジタル化する中、高齢者や過疎地域の住民が不利になる問題。政府はデジタル庁を設置（2021年）して対策を進めています。","d": 2},{"q": "ETCが高速道路に導入された理由として最も適切なものはどれですか？","c": ["料金を値上げするため","料金所の渋滞を解消し、排気ガスを減らすため","運転手の安全のため","高速道路の建設費を回収するため"],"a": 1,"e": "ETC（Electronic Toll Collection System＝自動料金収受システム）の導入理由は①料金所での停車・発進による渋滞の解消、②アイドリングによる排気ガス・CO2の削減、③料金収受の効率化。現在のETC利用率は約94％に達しています。","d": 2},{"q": "前島密が郵便制度を整えた理由として最も適切なものはどれですか？","c": ["外国との手紙のやりとりのため","飛脚に代わる安くて確実な通信手段を全国に広めるため","電話がなかったから","新聞を届けるため"],"a": 1,"e": "明治時代、それまでの飛脚制度は高額で届くまでに時間がかかりました。前島密は1871年に近代的な郵便制度を創設。全国均一料金で誰でも手紙を送れるようにしました。「郵便の父」と呼ばれ、1円切手の肖像にもなっています。","d": 2},{"q": "新幹線について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 東海道新幹線は1964年の東京オリンピックに合わせて開業した\nⅡ 北海道新幹線は現在、札幌まで開業している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。東海道新幹線は1964年10月1日に東京〜新大阪間で開業。Ⅱは誤り。北海道新幹線は2016年に新函館北斗駅まで開業しましたが、札幌延伸は2030年代の予定。東北新幹線（新青森）→北海道新幹線（新函館北斗）とつながっています。","d": 2},{"q": "情報通信について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ メディアリテラシーとは情報を正しく読み取り判断する力のことである\nⅡ フェイクニュースとは新聞社が発信するニュースのことである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。メディアリテラシーは多くの情報の中から正しいものを見分け、適切に活用する力。SNSの普及で特に重要になっています。Ⅱは誤り。フェイクニュースは事実ではないうその情報のこと。SNSで拡散されやすく、社会問題になっています。","d": 2},{"q": "日本の交通について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 現在の貨物輸送・旅客輸送ともに自動車が中心である\nⅡ 昔の貨物輸送の中心は航空機だった","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。自動車は「ドア・ツー・ドア」で届けられる利便性から貨物・旅客ともに中心。Ⅱは誤り。昔の貨物輸送の中心は船でした。大量の荷物を安く運べるため。航空機は速いが運賃が高く、貨物輸送の中心にはなっていません。","d": 2},{"q": "通信の歴史について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ ラジオ放送は大正時代の1925年に始まった\nⅡ テレビ放送は明治時代に始まった","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。日本のラジオ放送は1925年（大正14年）に開始。Ⅱは誤り。テレビ放送は1953年（昭和28年）に開始。通信の歴史：飛脚（江戸）→郵便（明治・1871年）→電話（明治）→ラジオ（大正・1925年）→テレビ（昭和・1953年）→インターネット（平成）。","d": 2},{"q": "高速道路について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 日本で最初の高速道路は東名高速道路である\nⅡ ETCは料金所で停車せずに通行料金を支払えるシステムである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。日本最初の高速道路は名神高速道路（1963年開通、名古屋〜神戸）です。東名高速道路（東京〜名古屋）は1969年に全線開通。Ⅱは正しい。ETC（Electronic Toll Collection）は自動料金収受システムで、利用率は約94％。","d": 2},{"q": "インターネットについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 個人情報保護法は個人情報の取り扱いルールを定めた法律である\nⅡ ICTとは「情報通信技術」の略称である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。個人情報保護法（2003年制定）は企業や団体が個人情報を適切に管理するルールを定めています。ICT＝Information and Communication Technology（情報通信技術）。ITとの違いは「Communication（通信）」が含まれる点です。","d": 2},{"q": "新幹線について述べた文として正しくないものはどれですか？","c": ["東海道新幹線の終点は博多駅である","山形新幹線は福島駅で東北新幹線から分かれる","秋田新幹線は盛岡駅で東北新幹線から分かれる","北陸新幹線は2024年に敦賀まで延伸した"],"a": 0,"e": "東海道新幹線の終点は新大阪駅です。博多駅は山陽新幹線の終点。東海道新幹線（東京〜新大阪）＋山陽新幹線（新大阪〜博多）で東京〜博多を約5時間で結びます。山形新幹線は福島駅、秋田新幹線は盛岡駅で分岐。北陸新幹線は2024年に敦賀まで延伸しました。","d": 2},{"q": "日本の交通について述べた文として正しくないものはどれですか？","c": ["コンテナは荷物の積みかえを効率化する箱型の容器である","モーダルシフトはトラックから鉄道・船への転換である","自動車は二酸化炭素の排出量が最も少ない輸送手段である","宅配便はドアからドアまで届けてくれるサービスである"],"a": 2,"e": "自動車はCO2排出量が最も「多い」輸送手段です。1トンの荷物を1km運ぶときのCO2排出量：自動車＞航空機＞船＞鉄道の順。鉄道が最も少ない。だからこそモーダルシフト（トラック→鉄道・船）が環境対策として推進されています。","d": 2},{"q": "情報社会の問題について述べた文として正しくないものはどれですか？","c": ["フェイクニュースはSNSで拡散されやすい","個人情報保護法で個人情報の取り扱いが規制されている","デジタル・デバイドとはインターネットの速度が遅いことである","コンピュータ・ウイルスは機密情報を盗む手段の一つである"],"a": 2,"e": "デジタル・デバイドは「インターネットの速度が遅いこと」ではなく、ICTを使える人と使えない人の間に生じる「情報格差」のことです。高齢者・障がい者・過疎地域の住民などがデジタル化の恩恵を受けにくい問題を指します。","d": 2},{"q": "高速道路について述べた文として正しくないものはどれですか？","c": ["名神高速道路は日本最初の高速道路である","東名高速道路は東京と名古屋を結ぶ","関越自動車道は関東と新潟を結ぶ","東北自動車道は東京と大阪を結ぶ"],"a": 3,"e": "東北自動車道は東京（川口JCT）と青森を結ぶ高速道路です。東京と大阪を結ぶのは東名高速道路＋名神高速道路。主な高速道路：東名（東京〜名古屋）、名神（名古屋〜神戸）、関越（関東〜新潟）、東北（東京〜青森）。","d": 2},{"q": "通信の歴史について述べた文として正しくないものはどれですか？","c": ["江戸時代の通信手段は飛脚だった","前島密は郵便制度の父と呼ばれる","ラジオ放送は昭和時代に始まった","テレビ放送は1953年に始まった"],"a": 2,"e": "ラジオ放送は昭和時代ではなく大正時代（1925年＝大正14年）に始まりました。テレビ放送は1953年（昭和28年）に開始。時代の区切り：大正（1912〜1926年）→昭和（1926〜1989年）。ラジオ＝大正、テレビ＝昭和と覚えましょう。","d": 3},{"q": "輸送手段ごとのCO2排出量を多い順に並べたものとして正しいものはどれですか？","c": ["自動車→航空機→船→鉄道","航空機→自動車→鉄道→船","鉄道→船→自動車→航空機","船→鉄道→航空機→自動車"],"a": 0,"e": "1トンの荷物を1km運ぶときのCO2排出量：自動車（トラック）が最も多く、次いで航空機、船、鉄道の順。鉄道は自動車の約13分の1のCO2排出量。だからモーダルシフト（トラック→鉄道・船）が環境対策として有効なのです。","d": 3},{"q": "通信手段の発達を古い順に並べたものとして正しいものはどれですか？","c": ["飛脚→郵便→電話→ラジオ→テレビ→インターネット","郵便→飛脚→ラジオ→テレビ→電話→インターネット","飛脚→電話→郵便→テレビ→ラジオ→インターネット","飛脚→郵便→ラジオ→電話→テレビ→インターネット"],"a": 0,"e": "正しい順序：飛脚（江戸時代）→郵便（1871年・明治）→電話（明治時代）→ラジオ（1925年・大正）→テレビ（1953年・昭和）→インターネット（1990年代・平成）。前島密が郵便制度を整え、「郵便の父」と呼ばれています。","d": 2},{"q": "新幹線の車両の愛称と路線の組み合わせとして正しいものはどれですか？","c": ["のぞみ＝東北新幹線、はやぶさ＝東海道新幹線","つばめ＝九州新幹線、こまち＝秋田新幹線","つばさ＝秋田新幹線、こまち＝山形新幹線","はやぶさ＝北陸新幹線、かがやき＝東北新幹線"],"a": 1,"e": "正しい組み合わせ：のぞみ＝東海道・山陽新幹線、はやぶさ＝東北新幹線、つばさ＝山形新幹線、こまち＝秋田新幹線、つばめ＝九州新幹線、かがやき＝北陸新幹線。東北新幹線の「はやぶさ」「こまち」は時速320kmで最速です。","d": 2},{"q": "日本で最も利用者が多い国内航空路線と、その理由の組み合わせとして正しいものはどれですか？","c": ["東京〜大阪：距離が短いから","東京〜札幌：新幹線では時間がかかりすぎるから","東京〜福岡：観光客が多いから","東京〜沖縄：海外旅行の代わりだから"],"a": 1,"e": "東京（羽田）〜札幌（新千歳）が国内最多利用路線。理由は距離が約820kmあり、新幹線では約4時間半かかるのに対し、飛行機なら約1時間半。東京〜大阪は新幹線で約2時間半なので飛行機より新幹線が便利。一般に距離700km以上で航空機が有利とされます。","d": 3},{"q": "東名高速道路と名神高速道路を合わせると、どの都市間を結ぶことになりますか？","c": ["東京〜大阪","東京〜神戸","東京〜名古屋","名古屋〜大阪"],"a": 1,"e": "東名高速道路（東京〜名古屋・小牧）＋名神高速道路（名古屋・小牧〜神戸）＝東京〜神戸を結びます。名神高速道路は1963年開通の日本初の高速道路。「東名」は東京＋名古屋、「名神」は名古屋＋神戸の頭文字です。","d": 2},{"q": "ある地方では、新幹線の開業後に東京からの観光客が増え、地元の旅館やお土産店がにぎわうようになりました。しかし同時に、若者が東京に出やすくなり人口流出も進みました。この現象を何といいますか？","c": ["ドーナツ化現象","ストロー効果","モーダルシフト","ヒートアイランド現象"],"a": 1,"e": "ストロー効果とは、高速交通網の整備により大都市が地方の人口や経済力を「ストローで吸い上げる」ように吸収してしまう現象です。新幹線開業で便利になる反面、地方の若者が大都市に流出しやすくなるデメリットもあります。北陸新幹線開業後の金沢でも議論されました。","d": 3},{"q": "江戸時代に飛脚が手紙を届けていましたが、明治時代に前島密が郵便制度を整えました。郵便制度が飛脚より優れていた点として最も適切なものはどれですか？","c": ["届くのが速かったから","全国均一料金で誰でも利用できるようになったから","手紙以外の荷物も運べたから","外国にも届けられたから"],"a": 1,"e": "飛脚は料金が高く、一般庶民には利用しにくいものでした。前島密は1871年に近代郵便制度を創設し、全国均一料金で誰でも手紙を送れるようにしました。これにより通信が民主化され、情報の流通が飛躍的に向上。前島密は1円切手の肖像にもなっています。","d": 2},{"q": "ある家庭では、インターネットで買い物をし、電子マネーで支払い、宅配便で届けてもらっています。この一連の流れで使われていない技術はどれですか？","c": ["ICT（情報通信技術）","光ファイバー","コンテナ輸送","電子決済"],"a": 2,"e": "コンテナ輸送は大型船やトラックで大量の荷物を運ぶ物流の仕組みで、個人宅への宅配便とは異なります。ネット通販の流れ：ICT（インターネット）で注文→電子マネー（電子決済）で支払い→光ファイバー（通信回線）でデータ送信→宅配便で配達。","d": 2},{"q": "2024年問題でトラック運転手の労働時間が制限されることになりました。この問題への対策として最も適切なものはどれですか？","c": ["トラックの速度制限を上げる","モーダルシフトや宅配ボックスの活用を進める","高速道路の料金を無料にする","運転手の定年を延長する"],"a": 1,"e": "2024年問題とは、働き方改革でトラック運転手の時間外労働が年960時間に制限されること。対策：①モーダルシフト（鉄道・船への転換）、②宅配ボックス・置き配で再配達を減らす、③中継輸送（運転手を途中で交代）、④自動運転技術の開発。物流の効率化が急務です。","d": 3},{"q": "緊急地震速報が届いてから実際に揺れが来るまでの時間が短い理由として正しいものはどれですか？","c": ["電波の速度が遅いから","地震波（S波）より電波の方が速いが、震源が近いと差が小さいから","携帯電話の処理に時間がかかるから","地震の予測が難しいから"],"a": 1,"e": "緊急地震速報は、最初に届くP波（速いが弱い揺れ）を検知し、電波で警報を発信します。電波は光の速さ（秒速30万km）で届きますが、S波（遅いが強い揺れ）も秒速3〜4kmで進むため、震源が近いと速報と揺れの時間差はわずか数秒。震源から遠いほど余裕があります。","d": 3},{"q": "新幹線とリニア中央新幹線に共通する役割として最も適切なものはどれですか？","c": ["貨物を大量に運ぶこと","大都市間の移動時間を短縮し、経済活動を活発にすること","地方の過疎化を防ぐこと","航空機の代わりになること"],"a": 1,"e": "新幹線もリニアも大都市間の高速移動を実現し、ビジネスや観光を活発にする役割があります。東海道新幹線は東京〜大阪を約2時間半、リニアは東京〜名古屋を約40分で結ぶ予定。移動時間の短縮は「日帰り圏」を広げ、経済圏を拡大します。","d": 2},{"q": "光ファイバーと海底ケーブルに共通する特徴として最も適切なものはどれですか？","c": ["無線で通信する","大量の情報を高速で送ることができる","電気を使わない","音声しか送れない"],"a": 1,"e": "光ファイバーは細いガラスの糸で光の信号を送る技術。海底ケーブルは光ファイバーを束ねて海底に敷設したもの。どちらも大量のデータを高速で送れます。日本と世界をつなぐ海底ケーブルは太平洋を横断し、インターネットの国際通信の99％を担っています。","d": 3},{"q": "メディアリテラシーとプライバシーの権利に共通する、情報社会で重要な考え方はどれですか？","c": ["情報をたくさん集めること","情報を正しく扱い、個人の権利を守ること","情報を制限すること","情報を公開すること"],"a": 1,"e": "メディアリテラシー＝情報を正しく読み取り判断する力。プライバシーの権利＝個人情報を無断で公開されない権利。どちらも「情報を正しく扱う」という考え方が共通。SNS時代には、自分が情報を受け取る側としても発信する側としても、この意識が重要です。","d": 3},{"q": "コンテナ船の大型化とETCの普及に共通する目的として最も適切なものはどれですか？","c": ["環境を守ること","輸送や交通の効率を高めること","安全性を高めること","雇用を増やすこと"],"a": 1,"e": "コンテナ船の大型化＝一度に大量の荷物を運べるようにして輸送効率を向上。ETCの普及＝料金所での停車をなくして交通の流れを効率化。どちらも「効率化」が共通目的。物流・交通の効率化は日本経済の競争力に直結する重要課題です。","d": 3},{"q": "テレビ・ラジオとインターネットの最大の違いとして最も適切なものはどれですか？","c": ["テレビは映像があるがインターネットにはない","インターネットは双方向で誰でも情報を発信できる","ラジオの方が情報量が多い","テレビは無料だがインターネットは有料"],"a": 1,"e": "テレビ・ラジオは放送局→視聴者への一方向通信（マスメディア）。インターネットは双方向で、誰でも情報を発信・受信できます（SNS・ブログ・動画投稿など）。この双方向性がインターネットの最大の特徴であり、フェイクニュースなどの問題も生んでいます。","d": 2},{"q": "訪日外国人の増加と交通網の整備の関係について正しいものはどれですか？","c": ["外国人が増えると交通網が衰退する","交通網の整備は外国人観光客の利便性を高め、地方への誘客にもつながる","外国人は交通機関を利用しない","交通網と観光は関係がない"],"a": 1,"e": "訪日外国人（インバウンド）は年間約3000万人超。新幹線・空港・高速道路の整備は外国人観光客の移動を便利にし、東京・大阪だけでなく地方への誘客にもつながります。北陸新幹線開業後の金沢、九州新幹線開業後の鹿児島など、新幹線効果で観光客が増えた例が多数あります。","d": 3},{"q": "1964年に東京オリンピックに合わせて開業した新幹線は何ですか？","c": ["山陽新幹線","東海道新幹線","東北新幹線","上越新幹線"],"a": 1,"e": "東海道新幹線は1964年10月1日に東京〜新大阪間で開業。東京オリンピック（10月10日開会）の9日前でした。当時の最高速度は時速210km。現在の「のぞみ」は時速285kmで東京〜新大阪を約2時間半で結びます。","d": 1},{"q": "荷物を箱型の容器に入れて効率よく運ぶしくみで使われる容器を何といいますか？","c": ["パレット","コンテナ","タンカー","カーゴ"],"a": 1,"e": "コンテナは規格化された箱型の容器で、船→トラック→鉄道と積みかえが簡単にできます。20フィート（約6m）と40フィート（約12m）の2種類が標準。コンテナ船の大型化が進み、一度に2万個以上のコンテナを運べる船もあります。","d": 1},{"q": "明治時代に郵便制度を確立した人物は誰ですか？","c": ["渋沢栄一","前島密","福沢諭吉","大隈重信"],"a": 1,"e": "前島密（まえじまひそか）は1871年に近代郵便制度を創設し「郵便の父」と呼ばれます。1円切手の肖像にもなっています。渋沢栄一は「日本資本主義の父」で新1万円札の肖像、福沢諭吉は慶應義塾の創設者で旧1万円札の肖像。","d": 1},{"q": "高速道路で停車せずに通行料金を支払うシステムの略称は何ですか？","c": ["GPS","ETC","ABS","ITS"],"a": 1,"e": "ETC＝Electronic Toll Collection System（自動料金収受システム）。車載器とICカードで自動的に料金を支払います。GPS＝全地球測位システム、ABS＝アンチロックブレーキシステム、ITS＝高度道路交通システム。ETCの利用率は約94％です。","d": 1},{"q": "インターネットなどの情報通信技術の略称は何ですか？","c": ["IT","ICT","IoT","AI"],"a": 1,"e": "ICT＝Information and Communication Technology（情報通信技術）。ITとの違いは「Communication（通信）」が含まれる点。IoT＝Internet of Things（モノのインターネット）、AI＝Artificial Intelligence（人工知能）。学校教育でもICT活用が進んでいます。","d": 1},{"q": "うそのニュースのことを何といいますか？","c": ["ゴシップ","フェイクニュース","デマ","プロパガンダ"],"a": 1,"e": "フェイクニュースは事実ではないうその情報で、SNSを通じて急速に拡散されます。2016年のアメリカ大統領選挙で大きな問題に。対策にはメディアリテラシー（情報を正しく判断する力）が重要。ゴシップは噂話、プロパガンダは政治的な宣伝の意味です。","d": 1},{"q": "リニア中央新幹線の最高速度は時速何kmですか？","c": ["300km","400km","505km","600km"],"a": 2,"e": "リニアモーターカーは超電導磁石の力で浮上して走行し、最高速度は時速505km（2015年に記録）。東京〜名古屋間を約40分、東京〜大阪間を約67分で結ぶ予定。従来の新幹線（最高時速320km）より大幅に速くなります。","d": 1},{"q": "個人情報の取り扱いに関するルールを定めた法律は何ですか？","c": ["情報公開法","個人情報保護法","通信傍受法","特定秘密保護法"],"a": 1,"e": "個人情報保護法（2003年制定）は、企業や団体が個人情報（氏名・住所・電話番号など）を適切に管理するルールを定めた法律です。本人の同意なく第三者に提供することを原則禁止。情報公開法は国の情報を国民に公開する法律で別物です。","d": 1}],"shakai8": [{"q": "日本の工場が海外に移転する理由として最も適切なものはどれですか？","c": ["日本の技術が低いから","人件費が安い国で生産し、コストをおさえるため","日本に原料がないから","外国の方が品質が高いから"],"a": 1,"e": "日本企業が海外に工場を移転する最大の理由は人件費の削減です。中国や東南アジアの人件費は日本の数分の1。また、現地で生産すれば輸送費も削減でき、現地の市場にも近くなります。しかし国内の工場が減る「産業の空洞化」が問題になっています。","d": 2},{"q": "名古屋港が日本一の貿易額をほこる理由として最も適切なものはどれですか？","c": ["人口が最も多いから","自動車の輸出が多い中京工業地帯に位置するから","外国に最も近いから","港の面積が最も大きいから"],"a": 1,"e": "名古屋港は中京工業地帯の中心に位置し、トヨタ自動車をはじめとする自動車・自動車部品の輸出が非常に多いです。自動車専用船が多数発着し、輸出額で日本一。自動車は日本の輸出品目の中でも金額が大きいため、貿易額全体を押し上げています。","d": 2},{"q": "円高になると輸出企業が不利になる理由として最も適切なものはどれですか？","c": ["原料の輸入価格が上がるから","日本製品の外国での価格が上がり売れにくくなるから","国内の物価が上がるから","為替手数料が増えるから"],"a": 1,"e": "円高（例：1ドル=100円→80円）になると、日本で1万円の製品は外国では100ドル→125ドルに値上がりします。外国の消費者にとって割高になり、売れにくくなります。逆に輸入品は安くなるため、輸入企業には有利。円高・円安は貿易に大きく影響します。","d": 2},{"q": "日本の食料自給率が約38％と低い理由として最も適切なものはどれですか？","c": ["日本の農業技術が低いから","食生活の変化で肉・小麦など輸入に頼る食品の消費が増えたから","日本の人口が少ないから","外国の食品の方がおいしいから"],"a": 1,"e": "戦後、日本の食生活は米中心から肉・パン・乳製品中心に変化（食の欧米化）。牛肉の飼料となるトウモロコシ、パンの原料の小麦はほぼ輸入に依存。米の自給率は約100％ですが、小麦は約15％、大豆は約6％。カロリーベースの食料自給率は約38％です。","d": 2},{"q": "フェアトレードが必要とされる理由として最も適切なものはどれですか？","c": ["先進国の製品が売れないから","発展途上国の生産者が不当に安い価格で買いたたかれているから","貿易量を増やすため","関税をなくすため"],"a": 1,"e": "フェアトレード（公正貿易）は、発展途上国の農産物や製品を適正な価格で取引する仕組みです。コーヒー・カカオ・バナナなどの生産者は、仲介業者に安く買いたたかれ貧困から抜け出せないことが多い。適正価格で買うことで生産者の生活向上と持続可能な生産を支援します。","d": 2},{"q": "日本がODA（政府開発援助）を行う理由として最も適切なものはどれですか？","c": ["外国に借金を返すため","発展途上国の経済発展を支援し、世界の安定に貢献するため","日本の製品を売るため","国連に命令されたから"],"a": 1,"e": "ODA（Official Development Assistance）は先進国が発展途上国の経済・社会の発展を支援する援助です。日本は世界有数のODA供与国。理由は①国際社会の安定と平和への貢献、②資源の安定確保、③日本企業の海外展開の基盤づくり。道路・学校・病院の建設などを支援しています。","d": 3},{"q": "日本が鉄鉱石をオーストラリアから多く輸入している理由として最も適切なものはどれですか？","c": ["オーストラリアが最も近いから","オーストラリアに豊富な鉄鉱石の鉱山があり、船で大量に運べるから","オーストラリアの鉄鉱石が最も安いから","他の国に鉄鉱石がないから"],"a": 1,"e": "オーストラリアは世界有数の鉄鉱石産出国で、西オーストラリア州に巨大な鉱山があります。日本との間は船で大量輸送が可能。日本の鉄鉱石輸入先：1位オーストラリア（約60％）、2位ブラジル（約30％）。石炭もオーストラリアが1位です。","d": 2},{"q": "貿易摩擦が起きる理由として最も適切なものはどれですか？","c": ["貿易量が少なすぎるから","一方の国の輸出が多すぎて相手国の産業が打撃を受けるから","関税がないから","通貨の価値が同じだから"],"a": 1,"e": "貿易摩擦は、ある国の輸出が多すぎて相手国の同じ産業が打撃を受けることで起きます。1980年代の日米貿易摩擦では、日本の自動車・半導体の大量輸出がアメリカの産業を圧迫。アメリカは日本に輸出自主規制や市場開放を要求しました。","d": 3},{"q": "日本の貿易について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 加工貿易とは原料を輸入し製品に加工して輸出する貿易である\nⅡ 現在の日本は原料の輸入より製品の輸入が多くなっている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。加工貿易は高度経済成長期の日本の貿易の特徴。しかし1980年代以降、工場の海外移転が進み、海外でつくった製品を輸入する「製品輸入」が増加。現在は輸入品目の中で製品の割合が原料を上回っています。","d": 2},{"q": "円高・円安について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 円高になると輸入品が安くなる\nⅡ 円安になると輸出企業に有利になる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。円高（1ドル=100円→80円）→外国製品が安く買える→輸入に有利。円安（1ドル=100円→120円）→日本製品が外国で安くなる→輸出に有利。覚え方：円高＝輸入有利・輸出不利、円安＝輸出有利・輸入不利。","d": 2},{"q": "日本の輸入について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 鉄鉱石の最大の輸入先はブラジルである\nⅡ 石炭の最大の輸入先はオーストラリアである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。鉄鉱石の最大の輸入先はオーストラリア（約60％）で、ブラジルは2位（約30％）。Ⅱは正しい。石炭もオーストラリアが1位。資源の輸入先：原油＝サウジアラビア、鉄鉱石＝オーストラリア、石炭＝オーストラリア、LNG＝オーストラリア。","d": 2},{"q": "日本の貿易相手国について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 輸出入総額で最大の貿易相手国は中国である\nⅡ 自動車の主要な輸出先はアメリカである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。中国は日本の最大の貿易相手国（輸出入総額）。衣類・食料品・電子機器などを多く輸入しています。アメリカは自動車・機械類の主要輸出先で、貿易相手国としては2位。3位以降は韓国・台湾・オーストラリアなど。","d": 2},{"q": "産業の空洞化について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 産業の空洞化とは国内の工場が海外に移転し国内産業が衰退することである\nⅡ 産業の空洞化が進むと国内の雇用が増える","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。円高や人件費の高さから工場が海外に移転する現象。Ⅱは誤り。工場が海外に出ると国内の雇用は「減少」します。工場閉鎖→失業者増加→地域経済の衰退という悪循環。1985年のプラザ合意後の急激な円高が空洞化を加速させました。","d": 2},{"q": "日本の港について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 名古屋港は自動車の輸出が多く貿易額日本一である\nⅡ 東京港は主に衣類や食料品の輸入が多い","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。名古屋港は中京工業地帯の自動車輸出で貿易額1位。東京港は首都圏の消費地に近く、衣類・食料品など生活関連品の輸入が多い。主な港の特徴：名古屋＝自動車輸出、東京＝生活品輸入、横浜＝機械輸出、千葉＝石油輸入。","d": 3},{"q": "日本の貿易について述べた文として正しくないものはどれですか？","c": ["日本の最大の貿易相手国は中国である","名古屋港は貿易額が日本一である","日本の食料自給率はカロリーベースで約70％である","半導体は「産業のコメ」といわれている"],"a": 2,"e": "日本の食料自給率はカロリーベースで約38％であり、約70％ではありません。先進国の中でも最低水準。米の自給率は約100％ですが、小麦（約15％）・大豆（約6％）・トウモロコシ（ほぼ0％）など、多くの食料を輸入に頼っています。","d": 2},{"q": "日本の輸入品について述べた文として正しくないものはどれですか？","c": ["原油の8割以上を中東から輸入している","鉄鉱石の最大の輸入先はオーストラリアである","衣類の最大の輸入先はアメリカである","石炭の最大の輸入先はオーストラリアである"],"a": 2,"e": "衣類の最大の輸入先は中国です（約60％）。アメリカではありません。ベトナム・バングラデシュも増加中。輸入先の覚え方：原油＝サウジアラビア（中東）、鉄鉱石・石炭・LNG＝オーストラリア、衣類＝中国。","d": 2},{"q": "円高・円安について述べた文として正しくないものはどれですか？","c": ["円高になると輸入品が安くなる","円安になると海外旅行が安くなる","円高になると輸出企業は不利になる","円安になると輸出企業は有利になる"],"a": 1,"e": "円安になると海外旅行は「高く」なります。円安（1ドル=100円→150円）では、同じドルの買い物に多くの円が必要。海外旅行が安くなるのは円高のとき。円高＝海外旅行が安い・輸入品が安い、円安＝海外旅行が高い・輸出に有利。","d": 2},{"q": "日本の貿易の変化について述べた文として正しくないものはどれですか？","c": ["高度経済成長期は加工貿易が中心だった","1980年代以降、製品輸入が増加した","産業の空洞化で国内の雇用が増えた","日米貿易摩擦は1980年代に深刻化した"],"a": 2,"e": "産業の空洞化で国内の雇用は「減少」します。工場が海外に移転すると、国内の工場が閉鎖され失業者が増えます。特に地方の工場町では深刻な影響。空洞化の原因：円高→海外生産のコストが相対的に安くなる→工場移転。","d": 3},{"q": "日本の空港について述べた文として正しくないものはどれですか？","c": ["成田国際空港は千葉県にある","羽田空港の正式名称は東京国際空港である","関西国際空港は大阪湾の人工島に建設された","中部国際空港は静岡県にある"],"a": 3,"e": "中部国際空港（セントレア）は愛知県常滑市にあります。静岡県ではありません。主な空港：成田（千葉・国際線中心）、羽田（東京・国内線＋国際線）、関西（大阪・人工島）、中部（愛知）、新千歳（北海道）、福岡、那覇。","d": 2},{"q": "日本の資源の輸入先として、オーストラリアが1位の資源を正しく組み合わせたものはどれですか？","c": ["原油・鉄鉱石・石炭","鉄鉱石・石炭・LNG","原油・石炭・LNG","鉄鉱石・原油・LNG"],"a": 1,"e": "オーストラリアが輸入先1位の資源：鉄鉱石（約60％）、石炭（約60％）、LNG（約40％）。原油の1位はサウジアラビア（中東）。オーストラリアは日本にとって最も重要な資源供給国の一つです。","d": 3},{"q": "1ドル=100円が1ドル=80円になったとき、日本で1万円の製品はアメリカでいくらになりますか？","c": ["80ドル→100ドルに値上がり","100ドル→125ドルに値上がり","100ドル→80ドルに値下がり","125ドル→100ドルに値下がり"],"a": 1,"e": "1ドル=100円のとき：1万円÷100＝100ドル。1ドル=80円（円高）のとき：1万円÷80＝125ドル。つまり円高になると日本製品は外国で値上がりし、売れにくくなります。これが「円高は輸出に不利」の理由です。","d": 3},{"q": "日本の貿易相手国を輸出入総額の多い順に並べたものとして正しいものはどれですか？","c": ["アメリカ→中国→韓国","中国→アメリカ→韓国","中国→韓国→アメリカ","アメリカ→韓国→中国"],"a": 1,"e": "日本の貿易相手国（輸出入総額）：1位中国、2位アメリカ、3位以降は韓国・台湾・オーストラリアなど。中国からは衣類・電子機器を多く輸入、アメリカへは自動車・機械を多く輸出。アジア全体で日本の貿易の約半分を占めています。","d": 2},{"q": "日本の主な輸出品目と輸入品目の組み合わせとして正しいものはどれですか？","c": ["輸出＝機械類・自動車、輸入＝原油・衣類","輸出＝原油・衣類、輸入＝機械類・自動車","輸出＝食料品・木材、輸入＝自動車・鉄鋼","輸出＝衣類・食料品、輸入＝機械類・原油"],"a": 0,"e": "日本の主な輸出品：機械類（1位）、自動車、電子部品、鉄鋼。主な輸入品：原油・石油製品、LNG、衣類、食料品、医薬品。「技術力の高い工業製品を輸出し、資源・消費財を輸入する」のが日本の貿易の基本パターンです。","d": 2},{"q": "ある企業は円高が進んだため、東南アジアに工場を移転しました。その結果、日本国内の工場が閉鎖され、地域の雇用が失われました。この一連の流れを表す言葉はどれですか？","c": ["加工貿易","貿易摩擦","産業の空洞化","逆輸入"],"a": 2,"e": "円高→海外生産のコストが相対的に安くなる→工場を海外に移転→国内工場閉鎖→雇用喪失。これが「産業の空洞化」です。さらに海外工場でつくった製品を日本に輸入する「逆輸入」も増加。空洞化は地方経済に特に大きな打撃を与えます。","d": 2},{"q": "日本はサウジアラビアから原油を輸入し、それを精製してガソリンや化学製品をつくっています。もし中東で紛争が起きた場合、日本経済にどのような影響がありますか？","c": ["影響はない","原油の供給が不安定になり、エネルギー価格が上昇する","食料自給率が下がる","円高が進む"],"a": 1,"e": "日本の原油輸入の8割以上が中東依存。中東で紛争が起きると①原油の供給が不安定に、②原油価格が上昇、③ガソリン・電気代・プラスチック製品など幅広い物価が上昇。1973年の石油危機（オイルショック）では物価が急騰し、高度経済成長が終わりました。","d": 3},{"q": "ある国では、コーヒー豆を1kg100円で仲介業者に売っていますが、日本のスーパーでは1kg1000円で売られています。この問題を解決するための取り組みはどれですか？","c": ["自由貿易","フェアトレード","ODA","逆輸入"],"a": 1,"e": "生産者が100円で売り、消費者が1000円で買う。差額の大部分は仲介業者の利益。フェアトレードは仲介を減らし、生産者に適正な価格を支払う仕組みです。コーヒー・カカオ・バナナなどが対象。フェアトレード認証マークのついた商品を選ぶことで消費者も参加できます。","d": 2},{"q": "日本の自動車メーカーがアメリカに工場をつくる理由として最も適切なものはどれですか？","c": ["アメリカの技術を学ぶため","現地生産で輸送費を削減し、貿易摩擦も避けるため","アメリカの方が人件費が安いから","日本に工場をつくる場所がないから"],"a": 1,"e": "日本の自動車メーカーがアメリカに工場をつくる理由：①現地生産で輸送費を削減、②「Made in USA」で現地消費者に受け入れられやすい、③日米貿易摩擦の回避（現地生産なら輸出にカウントされない）、④為替リスクの軽減。トヨタ・ホンダ・日産などが多数の工場を持っています。","d": 3},{"q": "日本の食料自給率を上げるために最も効果的な取り組みはどれですか？","c": ["外国からの輸入を禁止する","国産の農産物の消費を増やし、農業の生産性を高める","食料の消費量を減らす","工業製品の輸出を増やす"],"a": 1,"e": "食料自給率を上げるには①国産農産物の消費拡大（地産地消）、②農業の生産性向上（スマート農業・大規模化）、③耕作放棄地の活用、④食品ロスの削減が有効。輸入禁止は現実的でなく、消費量削減は経済に悪影響。「食べて応援」が合言葉です。","d": 3},{"q": "加工貿易と産業の空洞化の関係について正しく述べたものはどれですか？","c": ["加工貿易が増えると空洞化が進む","工場が海外に移転すると国内の加工貿易の力が弱まる","空洞化が進むと原料の輸入が増える","加工貿易と空洞化は関係がない"],"a": 1,"e": "加工貿易＝原料を輸入→国内で加工→製品を輸出。産業の空洞化＝工場が海外に移転する現象。工場が海外に出ると、国内で加工する力が弱まり、加工貿易の基盤が失われます。代わりに海外工場からの「製品輸入」や「逆輸入」が増加しています。","d": 3},{"q": "フェアトレードとODAに共通する目的として最も適切なものはどれですか？","c": ["日本の輸出を増やすこと","発展途上国の経済発展と人々の生活向上を支援すること","関税をなくすこと","貿易摩擦を解消すること"],"a": 1,"e": "フェアトレード＝適正価格での取引で生産者の生活を支援。ODA＝政府による経済・技術援助で途上国の発展を支援。どちらも「発展途上国の人々の生活向上」が共通目的。方法は異なりますが、持続可能な開発（SDGs）の実現に貢献しています。","d": 3},{"q": "円高と食料自給率の関係について正しいものはどれですか？","c": ["円高になると食料自給率が上がる","円高になると外国の食料品が安くなり、輸入が増えて自給率が下がりやすい","円高と食料自給率は関係がない","円高になると農業が発展する"],"a": 1,"e": "円高→外国の食料品が安くなる→輸入食品の消費が増える→国産農産物の需要が減る→食料自給率が下がりやすい。逆に円安になると輸入食品が高くなり、国産品の競争力が相対的に上がります。為替レートは農業にも大きく影響します。","d": 3},{"q": "コンテナ船と自動車専用船に共通する役割として最も適切なものはどれですか？","c": ["旅客を運ぶこと","大量の貨物を効率的に海上輸送すること","国内輸送を担うこと","環境を守ること"],"a": 1,"e": "コンテナ船＝規格化されたコンテナで様々な貨物を効率的に輸送。自動車専用船＝完成車を大量に輸送する専用船。どちらも「大量の貨物を効率的に海上輸送する」役割。日本は島国のため、貿易のほぼ100％が船舶による海上輸送です。","d": 2},{"q": "貿易摩擦と現地生産の関係について正しいものはどれですか？","c": ["現地生産が増えると貿易摩擦が激しくなる","現地生産は貿易摩擦を緩和する効果がある","現地生産と貿易摩擦は関係がない","貿易摩擦は現地生産では解決できない"],"a": 1,"e": "貿易摩擦の原因は一方的な輸出超過。現地生産（例：日本車をアメリカの工場でつくる）にすれば、輸出にカウントされず摩擦が緩和されます。さらに現地の雇用も生まれるため、相手国にもメリット。1980年代の日米摩擦後、日本企業の海外現地生産が急増しました。","d": 3},{"q": "原料を輸入し、製品に加工して輸出する貿易を何といいますか？","c": ["自由貿易","加工貿易","中継貿易","保護貿易"],"a": 1,"e": "加工貿易は日本の貿易の伝統的な特徴です。原料（鉄鉱石・原油など）を輸入→国内の工場で加工→製品（自動車・機械など）を輸出。高度経済成長期にこのパターンで急成長しました。現在は製品輸入も増え、貿易構造は変化しています。","d": 1},{"q": "円の価値が上がり、外国の通貨に対して円が高くなることを何といいますか？","c": ["円安","円高","インフレ","デフレ"],"a": 1,"e": "円高とは1ドル=100円→80円のように、少ない円で多くのドルが買える状態。「円の価値が高い」ということ。輸入品が安くなるメリットがある一方、輸出企業には不利。逆に円安は1ドル=100円→120円で、輸出に有利・輸入に不利。","d": 1},{"q": "日本が原油を最も多く輸入している国はどこですか？","c": ["イラン","カタール","サウジアラビア","アラブ首長国連邦"],"a": 2,"e": "サウジアラビアが日本の原油輸入先第1位（約40％）。2位UAE、3位クウェート。中東全体で8割以上を占めます。サウジアラビアは世界最大級の産油国で、国営石油会社サウジアラムコは世界最大の企業の一つです。","d": 1},{"q": "国内の工場が海外に移転し、国内の産業が衰退することを何といいますか？","c": ["産業革命","産業の空洞化","産業の高度化","産業の転換"],"a": 1,"e": "産業の空洞化は、円高や人件費の高さから工場が海外に移転し、国内の製造業が衰退する現象。雇用の減少・技術の流出・地域経済の衰退が問題。1985年のプラザ合意後の急激な円高をきっかけに加速しました。","d": 1},{"q": "日本で最も貿易額が多い港はどこですか？","c": ["横浜港","東京港","名古屋港","神戸港"],"a": 2,"e": "名古屋港は自動車の輸出を中心に貿易額日本一。中京工業地帯（トヨタ自動車など）の玄関口です。自動車専用船が多数発着。2位以降は東京港・横浜港・大阪港・神戸港など。","d": 1},{"q": "半導体は「産業の○○」といわれています。何ですか？","c": ["花","コメ","心臓","エンジン"],"a": 1,"e": "半導体は「産業のコメ」と呼ばれます。コメが日本人の食生活に欠かせないように、半導体はスマートフォン・自動車・家電・医療機器などあらゆる産業に不可欠だからです。世界的な半導体不足（2020〜2022年）では自動車の生産が大幅に減少しました。","d": 1},{"q": "発展途上国の製品を適正な価格で取引することを何といいますか？","c": ["自由貿易","フェアトレード","関税撤廃","ODA"],"a": 1,"e": "フェアトレード（Fair Trade＝公正貿易）は、発展途上国の生産者に適正な価格を支払い、持続可能な生産と生活向上を支援する取り組み。コーヒー・チョコレート・バナナ・綿製品などが対象。認証マーク付きの商品を選ぶことで消費者も参加できます。","d": 1},{"q": "日本の食料自給率はカロリーベースでおよそ何％ですか？","c": ["約20％","約38％","約55％","約70％"],"a": 1,"e": "日本の食料自給率はカロリーベースで約38％（2022年度）。先進国の中で最低水準。米は約100％ですが、小麦約15％、大豆約6％、トウモロコシほぼ0％。食の欧米化で肉・パン・乳製品の消費が増え、それらの原料を輸入に頼っています。","d": 1}],"shakai9": [{"q": "沖ノ鳥島が日本にとって重要な理由として最も適切なものはどれですか？","c": ["漁業がさかんだから","日本の排他的経済水域を守るために重要だから","観光地として人気だから","軍事基地があるから"],"a": 1,"e": "沖ノ鳥島は日本最南端の島で、満潮時にわずかに海面上に出る小さなサンゴ礁。この島があることで約40万km²（日本の国土面積とほぼ同じ）の排他的経済水域が確保されます。島が水没すると「岩」扱いになりEEZを主張できなくなるため、コンクリートで護岸工事が行われています。","d": 2},{"q": "日本で地震が多い理由として最も適切なものはどれですか？","c": ["島国だから","4つのプレートの境界に位置しているから","火山が多いから","海に囲まれているから"],"a": 1,"e": "日本列島は太平洋プレート・フィリピン海プレート・ユーラシアプレート・北アメリカプレートの4つのプレートがぶつかる場所に位置しています。プレートの沈み込みや衝突で地震が発生。世界の地震の約10％が日本周辺で起きています。","d": 2},{"q": "太平洋ベルトに人口が集中している理由として最も適切なものはどれですか？","c": ["気候が温暖だから","工業・商業がさかんで雇用が多いから","農業がさかんだから","自然災害が少ないから"],"a": 1,"e": "太平洋ベルト（関東〜九州の太平洋側）には四大工業地帯が集中し、工業・商業・サービス業の雇用が豊富。人口の約60％がこの地域に集中しています。高度経済成長期に地方から大量の労働者が流入し、現在の人口分布が形成されました。","d": 2},{"q": "日本の排他的経済水域が世界第6位と広い理由として最も適切なものはどれですか？","c": ["国土面積が大きいから","離島が多く、広い海域に点在しているから","人口が多いから","海軍が強いから"],"a": 1,"e": "日本の国土面積は世界第61位ですが、EEZは第6位（約447万km²）。理由は南鳥島・沖ノ鳥島・与那国島など、広い海域に離島が点在しているため。EEZは沿岸から200海里（約370km）なので、離れた島があるほどEEZが広がります。","d": 3},{"q": "フォッサマグナが日本列島の地形に重要な理由として最も適切なものはどれですか？","c": ["日本一長い川があるから","日本列島を東西に分ける大きな地質構造の境界だから","火山がないから","平野が広がっているから"],"a": 1,"e": "フォッサマグナ（ラテン語で「大きな溝」）は、日本列島を東北日本と西南日本に分ける大きな地質構造の境界です。糸魚川〜静岡構造線が西の境界。この溝は数百万年前に海だった場所が隆起してできたもので、地質・地形・気候の違いに影響しています。","d": 3},{"q": "ドーナツ化現象が起きる理由として最も適切なものはどれですか？","c": ["都市の中心部の地価が高く、住宅を郊外に求める人が増えるから","郊外の方が仕事が多いから","都市の中心部は危険だから","郊外の方が気候がよいから"],"a": 0,"e": "ドーナツ化現象は都市の中心部の人口が減り、郊外の人口が増える現象。原因は①中心部の地価・家賃が高い、②郊外に住宅地が開発される、③鉄道・道路の整備で通勤が可能に。ドーナツの穴のように中心が空洞化することから名付けられました。","d": 2},{"q": "日本の第三次産業で働く人が最も多い理由として最も適切なものはどれですか？","c": ["農業が衰退したから","経済の発展とともにサービス業・商業・情報産業の需要が増えたから","工業が海外に移転したから","政府が推進したから"],"a": 1,"e": "経済が発展すると、モノの生産（第一次・第二次産業）からサービスの提供（第三次産業）へ産業構造が移行します。現在、日本の就業者の約70％が第三次産業（商業・サービス業・情報通信・医療・教育など）。先進国に共通する傾向です。","d": 2},{"q": "北方領土の返還を日本がロシアに求め続けている理由として最も適切なものはどれですか？","c": ["資源が豊富だから","歴史的に日本固有の領土であり、第二次世界大戦後に不法に占拠されたから","観光地として重要だから","軍事的に重要だから"],"a": 1,"e": "北方領土（択捉島・国後島・色丹島・歯舞群島）は歴史的に日本固有の領土です。1945年8月、ソ連が日ソ中立条約を破って侵攻し占拠。日本は一度も外国の領土になったことがないと主張し、返還を求めています。日ロ間の平和条約はまだ締結されていません。","d": 3},{"q": "日本の領土について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 竹島は島根県に属し、韓国が領有権を主張している\nⅡ 尖閣諸島は沖縄県に属し、領土問題は存在しない","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。竹島は島根県隠岐の島町に属する日本固有の領土ですが、韓国が不法占拠しています。尖閣諸島は沖縄県石垣市に属する日本固有の領土で、日本政府の立場では「解決すべき領土問題は存在しない」としています（中国・台湾が領有権を主張）。","d": 2},{"q": "日本の人口について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 日本の人口は2008年ごろをピークに減少に転じた\nⅡ 日本の人口密度はおよそ340人/km²である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。日本の人口は約1億2808万人（2008年）をピークに減少中。人口密度は約340人/km²で世界的に見ても高い。ただし北海道（約66人/km²）と東京都（約6400人/km²）では約100倍の差があり、地域差が非常に大きいです。","d": 2},{"q": "日本の地形について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ フォッサマグナは日本列島を南北に分ける構造線である\nⅡ 日本列島は4つのプレートの境界に位置している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。フォッサマグナは日本列島を「東西」に分ける大きな地質構造の溝です（南北ではない）。糸魚川〜静岡構造線が西の境界。Ⅱは正しい。太平洋プレート・フィリピン海プレート・ユーラシアプレート・北アメリカプレートの4つ。","d": 3},{"q": "日本の産業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 第三次産業で働く人が最も多い\nⅡ 第一次産業で働く人の割合は増加している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。第三次産業（サービス業・商業など）で約70％の人が働いています。Ⅱは誤り。第一次産業（農林水産業）の割合は減少し続けており、現在は約3％。高度経済成長期に農村から都市への人口移動が進み、第一次産業の割合は大幅に低下しました。","d": 2},{"q": "日本の島について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 日本の4つの主な島で最も面積が大きいのは北海道である\nⅡ 日本の都道府県で面積が最も小さいのは香川県である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。4つの主な島で最も面積が大きいのは本州です（約23万km²）。北海道は2番目（約8万km²）。本州＞北海道＞九州＞四国の順。Ⅱは正しい。香川県は約1877km²で都道府県最小。最大は北海道（約8万km²）。","d": 2},{"q": "過疎と過密について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 過疎地域では若者の流出により高齢化率が高くなる\nⅡ 過密地域では交通渋滞やヒートアイランド現象が問題になる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。過疎の問題：若者流出→高齢化→病院・学校の閉鎖→公共交通の廃止。過密の問題：交通渋滞・住宅不足・ごみ問題・ヒートアイランド現象。過疎と過密は表裏一体で、根本原因は都市部への人口集中（一極集中）です。","d": 2},{"q": "日本の端の島について述べた文として正しくないものはどれですか？","c": ["最東端は南鳥島である","最西端は与那国島である","最南端は択捉島である","最北端は択捉島である"],"a": 2,"e": "最南端は沖ノ鳥島です。択捉島は最北端。日本の端：東＝南鳥島（東京都）、西＝与那国島（沖縄県）、南＝沖ノ鳥島（東京都）、北＝択捉島（北海道）。覚え方：「え（東）みなみ（南鳥島）、に（西）よな（与那国）、み（南）おき（沖ノ鳥島）、き（北）えと（択捉）」。","d": 2},{"q": "日本の地形について述べた文として正しくないものはどれですか？","c": ["日本列島は4つのプレートの境界にある","フォッサマグナは日本列島を東西に分ける","マントルは地球の中心部分である","プレートは地球の表面をおおう岩盤である"],"a": 2,"e": "地球の中心部分は「コア（核）」です。マントルは地殻とコアの間にある層。地球の構造：地殻（表面）→マントル（中間層）→コア（中心）。マントルの対流がプレートを動かし、地震や火山活動の原因になっています。","d": 2},{"q": "日本の人口について述べた文として正しくないものはどれですか？","c": ["日本の人口はおよそ1.2億人である","人口が最も多い都道府県は東京都である","三大都市圏に人口の約80％が集中している","国勢調査は5年ごとに行われる"],"a": 2,"e": "三大都市圏（東京・大阪・名古屋）に集中しているのは人口の約50％であり、80％ではありません。特に東京圏だけで約3700万人（全人口の約30％）。残りの約50％が地方に住んでいますが、地方の人口減少が加速しています。","d": 2},{"q": "日本の領土問題について述べた文として正しくないものはどれですか？","c": ["北方領土はロシアに返還を求めている","竹島は韓国が不法占拠している","尖閣諸島は中国が実効支配している","尖閣諸島は沖縄県に属している"],"a": 2,"e": "尖閣諸島は日本が実効支配しています（中国が実効支配しているのではない）。日本政府は「尖閣諸島は日本固有の領土であり、解決すべき領土問題は存在しない」という立場。中国・台湾が1970年代から領有権を主張していますが、日本が管理しています。","d": 3},{"q": "政令指定都市について述べた文として正しくないものはどれですか？","c": ["横浜市は政令指定都市である","川崎市は政令指定都市である","松山市は政令指定都市である","北九州市は政令指定都市である"],"a": 2,"e": "松山市（愛媛県）は政令指定都市ではありません。政令指定都市は人口50万人以上の大都市で、現在20市。代表例：横浜・大阪・名古屋・札幌・福岡・川崎・神戸・京都・さいたま・広島・仙台・千葉・北九州・堺・新潟・浜松・熊本・相模原・静岡・岡山。","d": 3},{"q": "日本の4つの主な島を面積の大きい順に並べたものとして正しいものはどれですか？","c": ["北海道→本州→九州→四国","本州→北海道→九州→四国","本州→北海道→四国→九州","北海道→本州→四国→九州"],"a": 1,"e": "面積の大きい順：本州（約23万km²）→北海道（約8万km²）→九州（約3.7万km²）→四国（約1.8万km²）。本州は日本の国土面積の約60％を占めます。北海道は都道府県で最大ですが、島としては本州の方が大きいです。","d": 2},{"q": "日本の人口ピラミッドの形の変化として正しいものはどれですか？","c": ["つぼ型→つりがね型→富士山型","富士山型→つりがね型→つぼ型","つりがね型→富士山型→つぼ型","富士山型→つぼ型→つりがね型"],"a": 1,"e": "人口ピラミッドの変化：富士山型（1950年代・多産多死）→つりがね型（1970〜80年代・少産少死）→つぼ型（現在・少子高齢化）。日本は典型的なつぼ型で、下（若年層）が細く上（高齢層）が太い形。2つのベビーブームの膨らみが特徴的です。","d": 3},{"q": "日本の標準時と世界の時差について、日本が正午のとき、イギリス（ロンドン）は何時ですか？","c": ["午前3時","午前6時","午後3時","午後9時"],"a": 0,"e": "日本の標準時子午線は東経135度、イギリスは経度0度（本初子午線）。経度15度で1時間の時差があるため、135÷15＝9時間の時差。日本の方が東にあるので9時間進んでいます。日本が正午→イギリスは午前3時。","d": 3},{"q": "日本の高齢化の段階を正しい順に並べたものはどれですか？","c": ["高齢社会→高齢化社会→超高齢社会","高齢化社会→超高齢社会→高齢社会","高齢化社会→高齢社会→超高齢社会","超高齢社会→高齢社会→高齢化社会"],"a": 2,"e": "高齢化の段階：高齢化社会（65歳以上が7％超・1970年）→高齢社会（14％超・1994年）→超高齢社会（21％超・2007年）。日本はわずか37年で高齢化社会→超高齢社会に到達。フランスは115年かかっており、日本の高齢化スピードは世界最速です。","d": 3},{"q": "ある島は満潮時にわずかに海面上に出るだけの小さなサンゴ礁ですが、日本政府はコンクリートで護岸工事を行っています。この島が水没すると失われるものは何ですか？","c": ["漁業権","約40万km²の排他的経済水域","観光収入","軍事基地"],"a": 1,"e": "沖ノ鳥島のことです。この島が水没すると「岩」扱いになり、周囲約40万km²（日本の国土面積とほぼ同じ）のEEZを主張できなくなります。EEZ内の海底資源（レアアース・メタンハイドレートなど）や漁業権も失われるため、護岸工事で島を守っています。","d": 3},{"q": "ある地域では、若者が都市部に流出し、残った住民の半数以上が65歳以上です。バスの路線も廃止され、最寄りの病院まで車で1時間かかります。この地域の問題を解決するための取り組みとして最も適切なものはどれですか？","c": ["高速道路を建設する","テレワークの推進や地方創生で若者の移住を促す","大型商業施設を建設する","工場を誘致する"],"a": 1,"e": "限界集落の問題です。解決策として①テレワーク・リモートワークの推進で都市に通勤しなくても働ける環境づくり、②地方創生政策（移住支援金・起業支援）、③ICTを活用した遠隔医療・オンライン教育、④地域おこし協力隊の活用などが進められています。","d": 3},{"q": "日本の国土面積は世界第61位ですが、排他的経済水域は世界第6位です。この違いが生まれる理由として最も適切なものはどれですか？","c": ["日本の海が深いから","南鳥島や沖ノ鳥島など離島が広い海域に点在しているから","日本の人口が多いから","日本の海軍が強いから"],"a": 1,"e": "EEZは沿岸から200海里（約370km）。日本は南鳥島（東京から約1800km南東）、沖ノ鳥島（約1700km南）、与那国島（約2000km南西）など、広い海域に離島が点在。各島から200海里のEEZが広がるため、国土面積の約12倍のEEZ（約447万km²）を持っています。","d": 3},{"q": "5年ごとに行われる国勢調査の結果、ある市の人口が50万人を超えました。この市が申請できる制度は何ですか？","c": ["特別区","政令指定都市","中核市","県庁所在地"],"a": 1,"e": "政令指定都市は人口50万人以上の大都市が指定を受ける制度。都道府県から多くの権限が移譲され、区（行政区）を設置できます。現在20市。中核市は人口20万人以上。国勢調査は5年ごとに行われ、人口・世帯数などを調査します。","d": 2},{"q": "日本の人口が2008年をピークに減少している原因として正しいものを2つ含む組み合わせはどれですか？\nア 少子化で出生数が減っている\nイ 外国への移住が急増している\nウ 高齢化で死亡数が増えている\nエ 自然災害で人口が減っている","c": ["アとイ","アとウ","イとエ","ウとエ"],"a": 1,"e": "正解はアとウ。①少子化で出生数が減少（年間約80万人→2023年は約76万人）、②高齢化で死亡数が増加（年間約157万人）。出生数＜死亡数の「自然減」が人口減少の主因。イは誤り（海外移住は少ない）、エは誤り（災害は一時的な影響）。","d": 3},{"q": "過疎と過密に共通する根本原因として最も適切なものはどれですか？","c": ["自然災害の増加","都市部への人口集中（一極集中）","外国人労働者の増加","インターネットの普及"],"a": 1,"e": "過疎（地方の人口減少）と過密（都市の人口過剰）は表裏一体の問題で、根本原因は「都市部への人口集中」です。特に東京一極集中が深刻。対策として地方創生政策が進められ、テレワークの普及で地方移住も注目されています。","d": 3},{"q": "領海と排他的経済水域に共通する点として最も適切なものはどれですか？","c": ["どちらも沿岸から200海里の範囲である","どちらも沿岸国が資源を管理する権利を持つ","どちらも外国船の航行が禁止されている","どちらも国連が管理している"],"a": 1,"e": "領海（12海里）もEEZ（200海里）も、沿岸国が水産資源や海底資源を管理する権利を持ちます。違いは範囲と権限の強さ。領海は主権が及ぶ（外国船の無害通航は認められる）。EEZは資源に関する権利のみで、外国船の航行は自由です。","d": 3},{"q": "プレートの動きと日本の自然災害の関係について正しいものはどれですか？","c": ["プレートの動きは地震だけを引き起こす","プレートの沈み込みが地震・津波・火山活動の原因になる","プレートの動きと火山は関係がない","日本のプレートは動いていない"],"a": 1,"e": "日本列島は4つのプレートの境界にあり、プレートの沈み込みが①地震（プレート境界型地震）、②津波（海底の地震で発生）、③火山活動（マグマの上昇）の原因。東日本大震災（2011年）は太平洋プレートの沈み込みで発生。日本の火山の多くもプレート境界に沿って分布しています。","d": 2},{"q": "少子化と高齢化が同時に進むことで起きる問題として最も深刻なものはどれですか？","c": ["学校が増えすぎる","現役世代の社会保障費の負担が増大する","食料が不足する","交通渋滞が悪化する"],"a": 1,"e": "少子高齢化の最大の問題は社会保障費の負担増。高齢者1人を支える現役世代：1965年＝約11人→2020年＝約2人→2050年予測＝約1.4人。年金・医療・介護の費用が増える一方、それを支える現役世代が減少。2023年度の社会保障費は約134兆円で国の歳出の約3分の1。","d": 3},{"q": "ベビーブームと人口ピラミッドの関係について正しいものはどれですか？","c": ["ベビーブームは人口ピラミッドに影響しない","ベビーブーム世代は人口ピラミッドで膨らみとして現れる","ベビーブームは人口を減少させる","ベビーブームは高齢化を防ぐ"],"a": 1,"e": "日本には2つのベビーブームがあります。第1次（1947〜1949年）と第2次（1971〜1974年）。これらの世代は人口が多く、人口ピラミッドで横に膨らんだ部分として現れます。第1次ベビーブーム世代は現在70代後半で、医療・介護の需要が急増しています。","d": 3},{"q": "日本の国土の面積はおよそ何万km²ですか？","c": ["約28万km²","約38万km²","約48万km²","約58万km²"],"a": 1,"e": "日本の国土面積はおよそ38万km²で世界第61位。ドイツ（約36万km²）とほぼ同じ。国土の約70％が山地で、平野は約30％。可住地面積（人が住める面積）は国土の約30％しかなく、そこに1.2億人が集中しています。","d": 1},{"q": "日本の標準時子午線は東経何度ですか？","c": ["130度","135度","140度","145度"],"a": 1,"e": "日本の標準時子午線は東経135度で、兵庫県明石市を通ります。イギリスのグリニッジ（経度0度）との時差は9時間（135÷15＝9）。日本の方が東にあるので9時間進んでいます。","d": 1},{"q": "日本の最南端の島はどこですか？","c": ["沖ノ鳥島","南鳥島","与那国島","択捉島"],"a": 0,"e": "沖ノ鳥島は日本最南端の島（東京都小笠原村）。満潮時にわずかに海面上に出る小さなサンゴ礁で、約40万km²のEEZを守るためにコンクリートで護岸工事が行われています。南鳥島は最東端、与那国島は最西端、択捉島は最北端。","d": 1},{"q": "沿岸から200海里までの範囲を何といいますか？","c": ["領海","排他的経済水域","公海","接続水域"],"a": 1,"e": "排他的経済水域（EEZ＝Exclusive Economic Zone）は沿岸から200海里（約370km）の範囲。沿岸国が水産資源や海底資源を管理する権利を持ちます。日本のEEZは約447万km²で世界第6位。領海は12海里（約22km）です。","d": 1},{"q": "竹島の領有権を主張している国はどこですか？","c": ["中国","ロシア","韓国","北朝鮮"],"a": 2,"e": "竹島は島根県隠岐の島町に属する日本固有の領土ですが、韓国が1954年から不法占拠しています。韓国は「独島（ドクト）」と呼んでいます。日本は国際司法裁判所への付託を提案していますが、韓国は応じていません。","d": 1},{"q": "日本の都道府県の数はいくつですか？","c": ["43","45","47","50"],"a": 2,"e": "日本には47の都道府県があります。内訳：1都（東京都）・1道（北海道）・2府（大阪府・京都府）・43県。都道府県制度は1871年の廃藩置県に始まり、1888年に現在の47都道府県の原型ができました。","d": 1},{"q": "世界で最も人口が多い国はどこですか？","c": ["中国","インド","アメリカ","インドネシア"],"a": 1,"e": "2023年にインドが中国を抜いて世界最多の人口（約14.3億人）になりました。2位中国（約14.2億人）、3位アメリカ（約3.4億人）、4位インドネシア（約2.7億人）。日本は約1.2億人で世界第12位。","d": 1},{"q": "北方領土の返還を求めている相手国はどこですか？","c": ["中国","韓国","ロシア","アメリカ"],"a": 2,"e": "北方領土（択捉島・国後島・色丹島・歯舞群島）はロシアが占拠しており、日本は返還を求めています。1945年にソ連が占拠して以来、日ロ間の平和条約は締結されていません。北方領土は日本固有の領土であり、不法に占拠されているというのが日本の立場です。","d": 1}],"rika5": [{"q": "ナズナが冬にロゼットの姿で過ごす理由として最も適切なものはどれですか？","c": ["日光を多く受けるため","地面に葉を広げて冷たい風を避け、地面の熱で温まるため","虫に食べられないため","水分を多く吸収するため"],"a": 1,"e": "ロゼットは葉を地面にへばりつくように広げた冬越しの姿です。利点は①冷たい風にあたりにくい、②地面からの放射熱で温まりやすい、③日光を効率よく受けられる。タンポポ・ナズナ・ハルジオンなどがロゼットで冬を越します。","d": 2},{"q": "氷がとけているとき温度が0℃のまま変わらない理由として最も適切なものはどれですか？","c": ["温度計が壊れているから","周りから吸収した熱がすべて氷をとかすことに使われるから","氷が熱を出しているから","水と氷の温度が打ち消し合うから"],"a": 1,"e": "氷がとけるとき、周りから吸収した熱は「固体→液体」の状態変化（融解）に使われ、温度上昇には使われません。これを「融解熱」といいます。同様に、水が沸騰しているとき（100℃）も、熱は「液体→気体」の変化に使われ温度は上がりません。","d": 2},{"q": "黒い色の物体が太陽の光で最も温まりやすい理由として最も適切なものはどれですか？","c": ["黒は熱を反射するから","黒は放射熱を最も吸収しやすいから","黒は光を通すから","黒は空気を温めるから"],"a": 1,"e": "黒い色は光（放射熱）を最も吸収しやすく、白い色は最も反射しやすい性質があります。だから夏に黒い服を着ると暑く、白い服は涼しい。実験では黒・赤・黄・白の順に温度が上がりやすいです。","d": 1},{"q": "高い山の上で水を沸騰させると100℃より低い温度で沸騰する理由は何ですか？","c": ["山の上は寒いから","気圧が低いと沸点が下がるから","水が少ないから","風が強いから"],"a": 1,"e": "気圧が低いと水の沸点（沸騰する温度）が下がります。標高が高いほど気圧が低くなるため、富士山の山頂（約3776m）では約87℃で沸騰します。逆に圧力鍋は気圧を高くして沸点を上げ、100℃以上で調理できるようにしています。","d": 2},{"q": "ビーカーの外側に水てきがつく理由として最も適切なものはどれですか？","c": ["ビーカーの中の水がしみ出したから","空気中の水蒸気がビーカーの冷たい表面で冷やされて水になったから","ビーカーが汗をかいたから","水が蒸発したから"],"a": 1,"e": "これは「凝縮（結露）」という現象です。空気中の水蒸気（気体）がビーカーの冷たい表面に触れて冷やされ、水（液体）に変わります。冬の窓ガラスの結露や、冷たいコップの外側に水滴がつくのも同じ原理です。","d": 2},{"q": "ツバメが春に日本にわたってくる理由として最も適切なものはどれですか？","c": ["日本の景色が好きだから","日本で昆虫が増え、ヒナのえさが豊富になるから","日本の気温が下がるから","日本に天敵がいないから"],"a": 1,"e": "ツバメは春〜夏に日本で繁殖する「夏鳥」です。春になると昆虫が増え、ヒナのえさが豊富になるため日本にわたってきます。秋になると東南アジアなど暖かい地域に渡ります。逆にハクチョウ・マガモは冬に日本に来る「冬鳥」です。","d": 2},{"q": "アサガオが夏〜秋に花を咲かせる理由として最も適切なものはどれですか？","c": ["気温が高いから","昼の長さが短くなる時期に花を咲かせる短日植物だから","雨が多いから","虫が多いから"],"a": 1,"e": "アサガオは「短日植物」で、昼の長さが短くなる（夜が長くなる）と花芽をつけます。夏至を過ぎて昼が短くなり始める夏〜秋に開花。短日植物：アサガオ・キク・イネ・コスモス。逆に長日植物（アブラナ・ホウレンソウ）は昼が長くなると開花します。","d": 2},{"q": "水を40℃まで熱したとき、ビーカーの底から出る小さなあわの正体は何ですか？その理由も含めて正しいものはどれですか？","c": ["水蒸気。水が沸騰し始めたから","水にとけていた空気。温度が上がるととけきれなくなるから","酸素。水が分解されたから","二酸化炭素。水と反応したから"],"a": 1,"e": "40℃程度で出る小さなあわは「水にとけていた空気」です。水の温度が上がると、とけていられる気体の量が減るため、あわとなって出てきます。100℃で出る大きなあわは「水蒸気」。この違いは頻出問題です。","d": 2},{"q": "水のすがたの変化について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 氷がとけているとき、温度は0℃のまま変わらない\nⅡ 水が沸騰しているとき、温度は100℃のまま変わらない","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。状態変化が起きているとき（氷→水、水→水蒸気）、熱は温度上昇ではなく状態変化に使われるため温度は一定。氷がとけきると温度が上がり始め、沸騰中も100℃で一定。グラフでは水平な部分として現れます。","d": 2},{"q": "植物の冬越しについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ イチョウは秋に葉が黄色に変わる\nⅡ イロハモミジは秋に葉が黄色に変わる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。イチョウは黄葉（黄色に変わる）します。Ⅱは誤り。イロハモミジは紅葉（赤く変わる）します。黄葉＝イチョウ。紅葉＝イロハモミジ・ツタ・ニシキギ。葉の色が変わるのは、気温が下がり葉緑素が分解されるためです。","d": 2},{"q": "動物の冬越しについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ ライチョウは冬の間も活動する\nⅡ カエルは冬眠して冬を越す","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。ライチョウは冬でも活動し、羽が白く変わって雪に溶け込みます。カエルは変温動物で体温を一定に保てないため、土の中で冬眠します。冬眠する動物：カエル・ヘビ・クマ・シマリス。冬も活動：ライチョウ・キツネ・ウサギ。","d": 2},{"q": "星の明るさについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 北極星は1等星である\nⅡ オリオン座のベテルギウスは1等星である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。北極星は2等星です。明るさは1等星より暗い。北極星は明るさではなく「ほぼ動かない」ことが重要（北の方角を示す）。Ⅱは正しい。ベテルギウスはオリオン座の左上にある赤い1等星。1等星は全天で21個あります。","d": 2},{"q": "水の加熱について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 40℃で出る小さなあわは水にとけていた空気である\nⅡ 100℃で出る大きなあわは水蒸気である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。水を熱すると①まず小さなあわ（とけていた空気）が出る、②100℃近くで大きなあわ（水蒸気）が激しく出る（沸騰）。空気のあわは温度が上がるととけきれなくなって出てくるもの。水蒸気のあわは水が気体に変わったものです。","d": 2},{"q": "渡り鳥について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ ツバメは冬に日本にわたってくる冬鳥である\nⅡ ハクチョウは冬に日本にわたってくる冬鳥である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。ツバメは春〜夏に日本にわたってくる「夏鳥」です。Ⅱは正しい。ハクチョウは秋〜冬に日本にわたってくる「冬鳥」。夏鳥＝ツバメ・カッコウ・ホトトギス。冬鳥＝ハクチョウ・マガモ・ツグミ。一年中いる鳥＝スズメ・カラス（留鳥）。","d": 2},{"q": "水のすがたの変化について述べた文として正しくないものはどれですか？","c": ["氷がとけることを融解という","水が水蒸気になることを蒸発という","水蒸気が水になることを凝固という","ビーカーの外側の水てきは凝縮でできる"],"a": 2,"e": "水蒸気が水になることは「凝縮（結露）」であり、「凝固」ではありません。凝固は液体が固体になること（水→氷）。状態変化の用語：融解（固→液）、蒸発・沸騰（液→気）、凝縮（気→液）、凝固（液→固）。","d": 2},{"q": "冬越しの方法について述べた文として正しくないものはどれですか？","c": ["カエルは土の中で冬眠する","クマは冬眠して冬を越す","ライチョウは冬眠して冬を越す","シマリスは冬眠して冬を越す"],"a": 2,"e": "ライチョウは冬眠しません。冬の間も活動し、羽が白く変わって雪景色に溶け込みます（保護色）。冬眠する動物：カエル・ヘビ（変温動物）、クマ・シマリス（恒温動物だが冬眠する）。鳥類は基本的に冬眠しません。","d": 2},{"q": "植物の開花について述べた文として正しくないものはどれですか？","c": ["アサガオは短日植物である","キクは短日植物である","ホウレンソウは短日植物である","イネは短日植物である"],"a": 2,"e": "ホウレンソウは「長日植物」です。昼の長さが長くなると花を咲かせます。短日植物（昼が短くなると開花）＝アサガオ・キク・イネ・コスモス。長日植物（昼が長くなると開花）＝アブラナ・ホウレンソウ・ダイコン。","d": 3},{"q": "星について述べた文として正しくないものはどれですか？","c": ["北極星は2等星である","おとめ座のスピカは1等星である","はくちょう座のデネブは1等星である","さそり座のアンタレスは2等星である"],"a": 3,"e": "さそり座のアンタレスは1等星です（2等星ではない）。赤く輝く星で「さそりの心臓」とも呼ばれます。主な1等星：ベテルギウス（オリオン座）、シリウス（おおいぬ座）、スピカ（おとめ座）、デネブ（はくちょう座）、アンタレス（さそり座）。","d": 2},{"q": "水と氷について述べた文として正しくないものはどれですか？","c": ["水350gと氷150gを合わせると全体の重さは500gである","氷がとけるとき周りから熱を吸収する","氷は水より体積が大きい","氷がとけると重さが軽くなる"],"a": 3,"e": "氷がとけても重さは変わりません（質量保存の法則）。水350g＋氷150g＝500gで、氷がすべてとけても500gのまま。変わるのは体積（氷→水で体積が減る）。氷は水より体積が約1.1倍大きいため、水に浮きます。","d": 2},{"q": "水を加熱したときの温度変化のグラフで、温度が一定になる部分が2か所あります。それぞれ何℃ですか？","c": ["0℃と50℃","0℃と100℃","50℃と100℃","20℃と80℃"],"a": 1,"e": "温度が一定になるのは①0℃（氷がとけている間）と②100℃（水が沸騰している間）。どちらも状態変化が起きており、熱は温度上昇ではなく状態変化に使われます。グラフでは水平な線として現れ、テストで頻出のポイントです。","d": 2},{"q": "放射熱の吸収しやすさを色別に並べたものとして正しいものはどれですか？","c": ["白→黄→赤→黒","黒→赤→黄→白","黒→白→赤→黄","赤→黒→白→黄"],"a": 1,"e": "放射熱の吸収しやすさ：黒＞赤＞黄＞白の順。黒が最も吸収しやすく、白が最も反射しやすい。だから夏は白い服が涼しく、冬は黒い服が暖かい。太陽熱温水器の集熱板が黒いのも同じ理由です。","d": 2},{"q": "モンシロチョウの成長の順番として正しいものはどれですか？","c": ["卵→幼虫→さなぎ→成虫","卵→さなぎ→幼虫→成虫","幼虫→卵→さなぎ→成虫","卵→幼虫→成虫→さなぎ"],"a": 0,"e": "モンシロチョウは完全変態：卵→幼虫→さなぎ→成虫の順。幼虫はアブラナ科の植物（キャベツ・ブロッコリーなど）を食べます。完全変態する昆虫：チョウ・カブトムシ・ハチ・アリ。不完全変態（さなぎにならない）：バッタ・トンボ・セミ。","d": 1},{"q": "冷たい水が入ったビーカーを暖かい部屋に置くと、ビーカーの外側に水てきがつきました。この水てきはどこから来たものですか？","c": ["ビーカーの中の水がしみ出した","部屋の空気中の水蒸気が冷やされて水になった","ビーカーのガラスから水が出た","部屋の湿度が下がった"],"a": 1,"e": "暖かい部屋の空気には水蒸気（気体の水）が含まれています。冷たいビーカーの表面に触れると、空気が冷やされて水蒸気が水（液体）に変わります（凝縮）。ビーカーの中の水がしみ出したのではありません。冬の窓の結露も同じ原理です。","d": 2},{"q": "富士山の山頂（約3776m）でお湯を沸かすと、約87℃で沸騰しました。このお湯でカップラーメンをつくると、平地でつくるときと比べてどうなりますか？","c": ["同じようにできる","麺がやわらかくなりすぎる","麺が十分にやわらかくならない","味が濃くなる"],"a": 2,"e": "沸点が87℃と低いため、100℃のお湯と比べて温度が足りず、麺が十分にやわらかくなりません。気圧が低い→沸点が下がる→調理温度が低い→食材に十分な熱が伝わらない。登山で圧力鍋が重宝されるのは、気圧を上げて沸点を高くできるからです。","d": 3},{"q": "モンシロチョウの成虫がアブラナの花に集まり、葉に卵を産みます。幼虫がアブラナの葉を食べる理由として最も適切なものはどれですか？","c": ["アブラナの葉が一番おいしいから","アブラナ科の植物が幼虫の食草（えさとなる植物）だから","アブラナの葉が大きいから","アブラナの近くに天敵がいないから"],"a": 1,"e": "モンシロチョウの幼虫はアブラナ科の植物（キャベツ・ブロッコリー・ダイコンなど）だけを食べます。成虫はアブラナ科の植物の葉に含まれる特定の化学物質を感知して産卵場所を選びます。昆虫と食草の関係は種ごとに決まっています。","d": 2},{"q": "水350gが入ったビーカーに氷150gを入れました。氷がすべてとけたあと、水の量は何gですか？","c": ["350g","500g","200g","450g"],"a": 1,"e": "水350g＋氷150g＝500g。氷がとけても質量は変わりません（質量保存の法則）。氷は水が固体になったものなので、とければそのまま水になります。体積は変わります（氷→水で体積が約10％減る）が、重さは同じです。","d": 1},{"q": "融解と凝縮に共通する点として最も適切なものはどれですか？","c": ["どちらも温度が上がる変化である","どちらも気体が関係する変化である","どちらも物質の状態が変わる変化（状態変化）である","どちらも固体が関係する変化である"],"a": 2,"e": "融解（固体→液体）と凝縮（気体→液体）はどちらも「状態変化」です。物質そのものは変わらず、状態（固体・液体・気体）だけが変わります。状態変化では温度が一定になる点がポイント。融解は0℃、沸騰は100℃で温度が一定。","d": 2},{"q": "ロゼットと冬眠に共通する目的として最も適切なものはどれですか？","c": ["えさを集めること","冬の寒さから身を守り、春まで生き延びること","繁殖すること","成長を早めること"],"a": 1,"e": "ロゼット（植物）＝地面に葉を広げて冷たい風を避ける。冬眠（動物）＝体温を下げてエネルギー消費を抑える。どちらも「冬の厳しい環境を乗り越えて春まで生き延びる」ための戦略です。生物はそれぞれの方法で冬を越します。","d": 2},{"q": "短日植物と長日植物の違いを正しく説明したものはどれですか？","c": ["短日植物は日が短い冬に咲き、長日植物は日が長い夏に咲く","短日植物は昼が短くなると花芽をつけ、長日植物は昼が長くなると花芽をつける","短日植物は背が低く、長日植物は背が高い","短日植物は夜に咲き、長日植物は昼に咲く"],"a": 1,"e": "短日植物は夜の長さが一定以上になると花芽をつけます（昼が短くなる＝夜が長くなる）。長日植物は昼の長さが一定以上になると花芽をつけます。短日植物＝アサガオ・キク・イネ。長日植物＝アブラナ・ホウレンソウ。開花は「日の長さ」で決まります。","d": 3},{"q": "夏鳥と冬鳥の違いを正しく説明したものはどれですか？","c": ["夏鳥は暖かい地域から来て日本で繁殖し、冬鳥は寒い地域から来て日本で冬を越す","夏鳥は大きく、冬鳥は小さい","夏鳥は昆虫を食べ、冬鳥は魚を食べる","夏鳥は日本で冬を越し、冬鳥は日本で繁殖する"],"a": 0,"e": "夏鳥＝春〜夏に南方から日本に来て繁殖し、秋に南方へ帰る（ツバメ・カッコウ）。冬鳥＝秋〜冬に北方から日本に来て冬を越し、春に北方へ帰る（ハクチョウ・マガモ）。どちらもえさが豊富な場所を求めて移動する「渡り鳥」です。","d": 2},{"q": "秋から冬にかけて葉が黄色に変わる植物はどれですか？","c": ["イロハモミジ","ツタ","イチョウ","ニシキギ"],"a": 2,"e": "イチョウは黄葉（黄色に変わる）する代表的な植物。他の3つ（イロハモミジ・ツタ・ニシキギ）は紅葉（赤く変わる）します。黄葉はカロテノイドという黄色い色素が目立つようになるため。紅葉はアントシアニンという赤い色素がつくられるためです。","d": 1},{"q": "冬の間も活動する動物はどれですか？","c": ["カエル","ライチョウ","クマ","シマリス"],"a": 1,"e": "ライチョウは冬でも活動します。高山に住み、冬は羽が白く変わって雪に溶け込む保護色になります。カエル・クマ・シマリスは冬眠します。ライチョウは国の特別天然記念物で、北アルプスなどの高山帯に生息しています。","d": 1},{"q": "氷がだんだんとけていくすがたの変化を何といいますか？","c": ["凝縮","融解","気化","昇華"],"a": 1,"e": "融解は固体が液体に変わること（氷→水）。凝縮は気体が液体に変わること（水蒸気→水）。気化は液体が気体に変わること（水→水蒸気）。昇華は固体が直接気体に変わること（ドライアイス→二酸化炭素）。","d": 1},{"q": "ナズナが冬に葉を地面にへばりつくように広げたようすを何といいますか？","c": ["ロゼット","つる","ほふく","マット"],"a": 0,"e": "ロゼットはバラの花（rose）に似た形から名付けられました。冬越しの姿で、地面に放射状に葉を広げます。ロゼットをつくる植物：ナズナ・タンポポ・ハルジオン・オオバコなど。春になると茎を伸ばして花を咲かせます。","d": 1}],"rika6": [{"q": "百葉箱を白くぬる理由として最も適切なものはどれですか？","c": ["汚れが目立つようにするため","太陽の熱（放射熱）を反射して箱の中の温度上昇を防ぐため","雨水をはじくため","遠くからでも見えるようにするため"],"a": 1,"e": "白い色は太陽の放射熱を最もよく反射します。黒い色は熱を吸収しやすいため、箱の中の温度が実際の気温より高くなってしまいます。百葉箱は正確な気温を測るための装置なので、外部の熱の影響を最小限にする工夫が必要です。","d": 2},{"q": "百葉箱の扉が北向きにつけられている理由として正しいものはどれですか？","c": ["北風を取り入れるため","扉を開けたとき直射日光が中に入らないようにするため","北極星の方角に合わせるため","雨が入りにくいため"],"a": 1,"e": "日本は北半球にあるため、太陽は南側を通ります。扉を北向きにすることで、温度計を読み取るとき扉を開けても直射日光が箱の中に入りません。直射日光が当たると温度計の示度が実際の気温より高くなってしまいます。","d": 2},{"q": "気温を地上1.2〜1.5mの高さで測る理由として最も適切なものはどれですか？","c": ["風が最も強い高さだから","人の目の高さで読みやすいから","地面の照り返しの影響を受けにくく、人が生活する高さに近いから","雲に最も近い高さだから"],"a": 2,"e": "地面に近すぎると地面からの照り返し（放射熱）の影響を受け、実際の気温より高くなります。1.2〜1.5mは地面の影響を受けにくく、かつ人が生活する高さに近いため、生活に役立つ気温が測れます。百葉箱もこの高さに温度計がくるよう設計されています。","d": 2},{"q": "百葉箱をしばふの上に設置する理由として正しいものはどれですか？","c": ["見た目がきれいだから","土やアスファルトに比べて地面からの照り返しが少ないから","しばふの水分で湿度が正確に測れるから","虫が寄りにくいから"],"a": 1,"e": "アスファルトやコンクリートは太陽の熱を吸収しやすく、地面からの照り返し（放射熱）が大きくなります。しばふは照り返しが少なく、地面付近の温度上昇が小さいため、より正確な気温が測れます。百葉箱の設置条件は入試頻出です。","d": 2},{"q": "風向が「北西の風」というとき、風はどの方向から吹いてきますか？その理由も含めて正しいものはどれですか？","c": ["南東から吹く。風向は風が吹いていく方向を示すから","北西から吹く。風向は風が吹いてくる方向を示すから","北西へ吹く。風向は風が向かう方向を示すから","南東から吹く。風は反対方向に名前がつくから"],"a": 1,"e": "風向は「風が吹いてくる方向」を表します。北西の風＝北西から南東に向かって吹く風です。風向は16方位で表し、風向計（矢羽根）の矢が向いている方向が風向です。天気図では風の吹いてくる方向に矢羽根がついています。","d": 2},{"q": "乾湿計で湿球温度計にぬれたガーゼを巻く理由として正しいものはどれですか？","c": ["温度計を保護するため","水の蒸発による温度低下を利用して湿度を求めるため","温度計の感度を上げるため","水温を測るため"],"a": 1,"e": "湿球温度計のガーゼから水が蒸発するとき、気化熱がうばわれて温度が下がります。空気が乾燥しているほど蒸発が盛んになり、乾球と湿球の温度差が大きくなります。この差から湿度表を使って湿度を求めます。湿度100％のとき乾球と湿球の示度は同じになります。","d": 2},{"q": "晴れた日に気温が午後2時ごろ最高になる理由として最も適切なものはどれですか？","c": ["午後2時に太陽が最も高くなるから","太陽の南中後も地面が熱をたくわえ続け、少し遅れて気温が最高になるから","午後2時に風が最も弱くなるから","午後の日差しが最も強いから"],"a": 1,"e": "太陽が最も高くなる（南中する）のは正午ごろですが、地面はその後もしばらく太陽の熱を吸収し続けます。地面の温度が最高になるのは午後1時ごろ、そこから空気があたためられて気温が最高になるのは午後2時ごろです。このように「時間のずれ」があるのがポイントです。","d": 2},{"q": "くもりの日は晴れの日に比べて1日の気温の変化が小さい理由として正しいものはどれですか？","c": ["くもりの日は風が強いから","雲が太陽の熱をさえぎり、夜は地面の熱が逃げるのを防ぐから","くもりの日は湿度が低いから","雲が気温を一定に保つ機能があるから"],"a": 1,"e": "雲には2つの効果があります。①昼間は太陽の光をさえぎって地面が温まりにくい、②夜間は地面から宇宙へ熱が逃げる（放射冷却）のを防ぐ。そのため昼と夜の気温差が小さくなります。晴れた日は放射冷却が強く、朝の冷え込みが厳しくなります。","d": 2},{"q": "百葉箱について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 百葉箱のよろい戸は風通しをよくして正確な気温を測るためにある\nⅡ 百葉箱は日当たりのよいコンクリートの上に設置する","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。よろい戸（ルーバー）は直射日光を防ぎつつ風通しをよくし、箱の中の空気が外気と同じ温度になるようにします。Ⅱは誤り。コンクリートは照り返しが大きいため不適切。しばふの上に設置するのが正しい条件です。","d": 2},{"q": "雲量と天気について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 雲量が2〜8のとき天気は「晴れ」である\nⅡ 雲量が0のとき天気は「快晴」である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。雲量と天気の関係：0〜1＝快晴、2〜8＝晴れ、9〜10＝くもり。雲量は空全体を10としたとき雲がおおっている割合です。雲量8でも「晴れ」になる点がよく出題されます。天気記号も合わせて覚えましょう。","d": 2},{"q": "風について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 風力は0〜12の13段階で表される\nⅡ 風力0は「煙がまっすぐ上がる」状態である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。風力はビューフォート風力階級で0〜12の13段階。風力0＝静穏（煙がまっすぐ上がる）、風力12＝台風並みの暴風。天気図では風力を矢羽根の数で表します。長い矢羽根1本＝風力2、短い矢羽根1本＝風力1、旗印1つ＝風力10に相当します。","d": 2},{"q": "気圧について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 高気圧の中心では上昇気流が発生し、雲ができやすい\nⅡ 低気圧の中心では上昇気流が発生し、天気がくずれやすい","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。高気圧の中心では下降気流が発生し、雲ができにくく天気がよくなります。Ⅱは正しい。低気圧の中心では上昇気流が発生し、空気が上昇して冷やされ雲ができ、雨が降りやすくなります。高気圧＝下降気流＝晴れ、低気圧＝上昇気流＝くもり・雨と覚えましょう。","d": 2},{"q": "湿度について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 気温が上がると飽和水蒸気量が増えるため、湿度は下がりやすい\nⅡ 露点とは空気中の水蒸気が水滴に変わり始める温度のことである","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。湿度(％)＝(実際の水蒸気量÷飽和水蒸気量)×100。気温が上がると飽和水蒸気量が増えるので、水蒸気量が同じなら湿度は下がります。露点は空気を冷やしていったとき湿度が100％になる温度で、水蒸気が凝結し始めます。","d": 2},{"q": "アメダスについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ アメダスは「地域気象観測システム」の略称である\nⅡ アメダスでは気温・降水量・風向風速・日照時間などを自動で観測している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。AMeDAS＝Automated Meteorological Data Acquisition System（地域気象観測システム）。全国約1300か所に設置され、気温・降水量・風向風速・日照時間を無人で自動観測しています。約21kmごとに1か所の密度で配置されています。","d": 2},{"q": "百葉箱の設置条件について述べた文として正しくないものはどれですか？","c": ["白くぬって太陽の熱を反射させる","よろい戸で風通しをよくする","扉を南向きにして日光を取り入れる","しばふの上に設置する"],"a": 2,"e": "百葉箱の扉は北向きが正しい。南向きにすると扉を開けたとき直射日光が中に入り、温度計の示度が正確でなくなります。百葉箱の4条件：①白くぬる、②よろい戸、③扉は北向き、④しばふの上。すべて正確な気温を測るための工夫です。","d": 2},{"q": "天気の記号について述べた文として正しくないものはどれですか？","c": ["快晴の記号は○（白丸）である","晴れの記号は○に縦線が入っている","くもりの記号は◎（二重丸）である","雨の記号は●（黒丸）である"],"a": 1,"e": "晴れの記号は○の中に縦線ではなく、○の右半分を黒くぬったもの（半黒丸）です。天気記号：快晴＝○、晴れ＝右半分黒の丸、くもり＝◎、雨＝●、雪＝中に縦線の丸。記号は天気図を読むときに必須なので正確に覚えましょう。","d": 2},{"q": "乾湿計の使い方について述べた文として正しくないものはどれですか？","c": ["乾球温度計で気温を読み取る","湿球温度計にはぬれたガーゼを巻く","乾球と湿球の温度差が大きいほど湿度が高い","湿度表を使って湿度を求める"],"a": 2,"e": "乾球と湿球の温度差が大きいほど湿度は「低い」が正しい。空気が乾燥しているとガーゼの水が盛んに蒸発し、湿球の温度が大きく下がるため差が大きくなります。逆に湿度100％のとき蒸発が起こらず、乾球と湿球の温度は同じになります。","d": 3},{"q": "気温の観測について述べた文として正しくないものはどれですか？","c": ["温度計は最小目盛りの10分の1まで読む","気温は地上1.2〜1.5mの高さで測る","温度計に直射日光を当てて測る","風通しのよい場所で測る"],"a": 2,"e": "温度計に直射日光を当てると、太陽の放射熱で温度計自体が温まり、実際の気温より高い値を示してしまいます。気温は「日かげ」で「風通しのよい」場所で測るのが正しい方法です。百葉箱はこれらの条件を満たすために設計されています。","d": 2},{"q": "気圧と天気について述べた文として正しくないものはどれですか？","c": ["気圧の単位はhPa（ヘクトパスカル）である","高気圧の中心付近は天気がよい","等圧線の間隔がせまいほど風が強い","低気圧の中心では下降気流が発生する"],"a": 3,"e": "低気圧の中心では「上昇気流」が発生します。周囲から空気が吹き込み上昇するため、雲ができて天気がくずれます。高気圧の中心では下降気流が発生し、雲ができにくく晴れます。等圧線の間隔がせまい＝気圧の差が大きい＝風が強い、も重要ポイントです。","d": 3},{"q": "ある日の雲量が7でした。この日の天気として正しいものはどれですか？","c": ["快晴","晴れ","くもり","雨"],"a": 1,"e": "雲量と天気の関係：0〜1＝快晴、2〜8＝晴れ、9〜10＝くもり。雲量7は「晴れ」に分類されます。空の7割が雲でおおわれていても「晴れ」になるのは意外に感じますが、気象観測のルールです。雲量8まで晴れ、9からくもりという境界を覚えましょう。","d": 2},{"q": "乾湿計で乾球が20℃、湿球が17℃を示しています。乾球と湿球の差は3℃です。この日の空気の状態として正しいものはどれですか？","c": ["湿度100％で非常にしめっている","湿度はやや低く、洗たく物が乾きやすい","乾球と湿球が同じなので湿度は0％","気温が低すぎて測定できない"],"a": 1,"e": "乾球と湿球の差が3℃あるということは、ガーゼの水がある程度蒸発している＝空気がやや乾燥していることを意味します。湿度表で乾球20℃・差3℃を調べると湿度は約72％。差が0℃なら湿度100％、差が大きいほど湿度が低くなります。","d": 3},{"q": "晴れた日の気温変化のグラフで、最高気温が出る時刻と最低気温が出る時刻の組み合わせとして正しいものはどれですか？","c": ["最高＝正午・最低＝午前0時","最高＝午後2時ごろ・最低＝日の出前","最高＝午後4時ごろ・最低＝午後8時ごろ","最高＝午前10時ごろ・最低＝午前6時ごろ"],"a": 1,"e": "晴れた日の気温変化：日の出前に最低→太陽が昇ると上昇→午後2時ごろ最高→日没後に低下→日の出前に最低。太陽の南中は正午ですが、地面が熱をたくわえるため気温の最高は約2時間遅れます。くもりの日はこの変化が小さくなります。","d": 2},{"q": "天気図で等圧線が4hPaごとに引かれています。ある地点の等圧線が1008hPaと1012hPaの間にあるとき、この地点の気圧の範囲として正しいものはどれですか？","c": ["1004〜1008hPa","1008〜1012hPa","1012〜1016hPa","1000〜1004hPa"],"a": 1,"e": "等圧線は通常4hPaごとに引かれ、20hPaごとに太い線になります。1008hPaと1012hPaの等圧線の間にある地点の気圧は1008〜1012hPaの範囲です。標準気圧は1013hPa（1気圧）。天気図の読み取りでは等圧線の間隔と数値に注目しましょう。","d": 3},{"q": "ある日、乾湿計の乾球と湿球の示度がまったく同じでした。このときの天気として最も考えられるものはどれですか？","c": ["快晴で乾燥している","雨が降っていて湿度が非常に高い","強風が吹いている","気温が0℃以下である"],"a": 1,"e": "乾球と湿球の示度が同じ＝湿球のガーゼから水が蒸発していない＝空気中の水蒸気量が飽和水蒸気量に達している＝湿度100％。湿度100％になるのは雨が降っているときや霧が出ているときです。快晴で乾燥していれば差が大きくなります。","d": 2},{"q": "晴れた冬の夜、地面の温度がどんどん下がっていきます。この現象の名前と、翌朝起こりやすい現象の組み合わせとして正しいものはどれですか？","c": ["放射冷却・霜（しも）がおりる","温暖前線・雨が降る","フェーン現象・気温が上がる","ヒートアイランド・気温が下がりにくい"],"a": 0,"e": "放射冷却＝晴れた夜に地面の熱が宇宙に逃げて地面付近の気温が大きく下がる現象。雲がないと熱が逃げやすいため、晴れた夜ほど冷え込みます。地面付近の気温が0℃以下になると、空気中の水蒸気が直接氷の結晶になり「霜」がおります。","d": 3},{"q": "山の上では気圧が低くなります。このことから、山の上でお菓子の袋がふくらむ理由として正しいものはどれですか？","c": ["山の上は気温が高いから","外の気圧が下がり、袋の中の空気が相対的に膨張するから","山の上は酸素が多いから","袋の中に水蒸気がたまるから"],"a": 1,"e": "気圧は空気の重さによる圧力で、高い場所ほど上にある空気が少ないため気圧が低くなります。袋の中の空気の圧力は変わらないのに、外の気圧が下がるため、袋の中の空気が外に向かって押す力が勝ってふくらみます。標高が100m上がるごとに気圧は約12hPa下がります。","d": 3},{"q": "ある日の午前9時に気温15℃・湿度80％でした。午後2時に気温が25℃に上がり、水蒸気量は変わりませんでした。湿度はどうなりますか？","c": ["湿度は上がる","湿度は変わらない","湿度は下がる","湿度は100％になる"],"a": 2,"e": "湿度(％)＝(水蒸気量÷飽和水蒸気量)×100。気温が上がると飽和水蒸気量が増えます。水蒸気量（分子）が同じで飽和水蒸気量（分母）が増えるので、湿度は下がります。これが晴れた日の昼間に湿度が低くなる理由です。気温と湿度は逆の動きをすることが多いです。","d": 3},{"q": "天気図で、ある地点の周囲の等圧線の間隔がとてもせまくなっています。この地点で予想される気象状況として正しいものはどれですか？","c": ["風がほとんどなく穏やかである","非常に強い風が吹いている","気温が急に上がる","湿度が極端に低い"],"a": 1,"e": "等圧線の間隔がせまい＝短い距離で気圧が大きく変化している＝気圧の傾きが急＝強い風が吹く。これは坂道と同じで、急な坂（等圧線がせまい）ほど水が速く流れる（風が強い）のと同じ原理です。台風の周辺では等圧線が非常にせまくなっています。","d": 2},{"q": "百葉箱の「白くぬる」「よろい戸」「北向きの扉」「しばふの上」という4つの条件に共通する目的は何ですか？","c": ["見た目を美しくすること","気温以外の熱の影響を排除して正確な気温を測ること","雨や風から温度計を守ること","だれでも簡単に温度を読めるようにすること"],"a": 1,"e": "4つの条件はすべて「正確な気温を測る」ための工夫です。白＝放射熱の反射、よろい戸＝風通し確保＋直射日光防止、北向き扉＝日光の侵入防止、しばふ＝照り返し防止。共通するのは「気温以外の熱の影響を取り除く」という考え方です。","d": 2},{"q": "高気圧と低気圧のしくみを比べたとき、「上昇気流→雲ができる→雨が降る」という流れが起こるのはどちらですか？また、その理由として正しいものはどれですか？","c": ["高気圧。空気が上昇して冷やされるから","低気圧。周囲から空気が集まり上昇するから","高気圧。下降気流で雲ができるから","低気圧。空気が外に吹き出すから"],"a": 1,"e": "低気圧の中心では周囲から空気が吹き込み（反時計回り）、行き場がなくなった空気が上昇します。上昇した空気は冷やされ、含まれていた水蒸気が凝結して雲になり、雨が降ります。高気圧は逆に下降気流→空気が温まる→雲ができにくい→晴れ、となります。","d": 3},{"q": "乾湿計の原理と洗たく物の乾きやすさには共通する考え方があります。その共通点として正しいものはどれですか？","c": ["どちらも気温だけで決まる","どちらも水の蒸発のしやすさ（湿度）が関係している","どちらも風の強さだけで決まる","どちらも気圧の変化が関係している"],"a": 1,"e": "乾湿計は湿球のガーゼからの水の蒸発量で湿度を測ります。洗たく物も空気中への水の蒸発で乾きます。どちらも「湿度が低い（空気が乾燥している）ほど水が蒸発しやすい」という共通の原理です。湿度が低い日は洗たく物がよく乾き、乾湿計の温度差も大きくなります。","d": 2},{"q": "アメダスの観測データと天気図を組み合わせて使うことの利点として最も適切なものはどれですか？","c": ["アメダスだけで天気予報ができるから","天気図の大きな気圧配置とアメダスの地域ごとの詳しいデータを合わせて正確な予報ができるから","アメダスは衛星写真を撮影できるから","天気図はアメダスのデータだけでつくられるから"],"a": 1,"e": "天気図は広い範囲の気圧配置や前線の位置を示し、大まかな天気の傾向がわかります。アメダスは全国約1300か所の地上データ（気温・降水量・風向風速・日照時間）を提供します。両方を組み合わせることで、広域の天気の流れと地域の詳細な気象状況を把握でき、より正確な天気予報が可能になります。","d": 3},{"q": "雲量が0〜1のときの天気を何といいますか？","c": ["晴れ","快晴","くもり","うす曇り"],"a": 1,"e": "雲量0〜1＝快晴、2〜8＝晴れ、9〜10＝くもり。快晴は空にほとんど雲がない状態です。天気記号では快晴＝○（白丸）、晴れ＝半黒丸、くもり＝◎（二重丸）。雲量は空全体を10としたとき雲がしめる割合で、目測で観測します。","d": 1},{"q": "気圧の単位として正しいものはどれですか？","c": ["℃","hPa","mm","m/s"],"a": 1,"e": "気圧の単位はhPa（ヘクトパスカル）です。標準気圧（1気圧）は1013hPa。℃は温度、mmは長さ（降水量にも使用）、m/sは風速の単位です。天気図の等圧線は通常4hPaごとに引かれ、20hPaごとに太い線になります。","d": 1},{"q": "風向を観測するために使う器具は何ですか？","c": ["乾湿計","風向計（風向風速計）","雨量計","気圧計"],"a": 1,"e": "風向計（風向風速計）は矢羽根の形をしており、矢が風上を向きます。矢の向いている方向が風向です。乾湿計＝湿度、雨量計＝降水量、気圧計＝気圧を測る器具。アメダスでは風向風速計が自動で風向と風速を観測しています。","d": 1}],"rika7": [{"q": "冬に日本海側で大雪が降り、太平洋側では晴れる理由として最も適切なものはどれですか？","c": ["太平洋側に暖流が流れているから","シベリア気団からの北西の季節風が日本海で水蒸気を吸収し、山脈にぶつかって日本海側に雪を降らせるから","太平洋側は気温が高いから","偏西風が太平洋側の雲を吹き飛ばすから"],"a": 1,"e": "冬の天気のしくみ：①シベリア気団から冷たく乾いた北西の季節風が吹く→②日本海の暖流（対馬海流）から大量の水蒸気を吸収→③日本列島の山脈にぶつかり日本海側に大雪→④山脈を越えた風は水分を失い太平洋側は乾燥した晴天。「西高東低」の気圧配置が特徴です。","d": 2},{"q": "梅雨が長く続く理由として最も適切なものはどれですか？","c": ["台風が多いから","オホーツク海気団と小笠原気団の勢力がつり合い、停滞前線が動かないから","偏西風が弱まるから","日本海側に高気圧があるから"],"a": 1,"e": "梅雨のしくみ：冷たく湿ったオホーツク海気団（北）と暖かく湿った小笠原気団（南）がぶつかり、その境目に梅雨前線（停滞前線）ができます。両方の勢力がつり合っているため前線が動かず、長期間雨が続きます。小笠原気団が強まると梅雨明けになります。","d": 2},{"q": "台風が日本付近で進路を北東に変える理由として最も適切なものはどれですか？","c": ["地球の自転の影響だけで曲がるから","日本付近で偏西風に流されて北東に進むから","太平洋高気圧が台風を押し返すから","日本列島の山脈にぶつかるから"],"a": 1,"e": "台風は熱帯の海上で発生し、最初は貿易風に乗って西〜北西に進みます。日本付近まで北上すると上空の偏西風（西→東に吹く風）に流されて進路を北東に変えます。これを「転向」と
