いいます。太平洋高気圧の縁に沿って進むため、高気圧の勢力で進路が変わります。","d": 2},{"q": "夏に南東の季節風が吹く理由として最も適切なものはどれですか？","c": ["偏西風の影響で南東から吹くから","太平洋上の小笠原気団（高気圧）から大陸の低気圧に向かって風が吹くから","台風の影響で南東から吹くから","日本海の海水温が高いから"],"a": 1,"e": "夏は太平洋上に小笠原気団（高気圧）が発達し、大陸は低気圧になります。高気圧→低気圧に向かって風が吹くため、南東の季節風が日本に吹き込みます。この風は暖かく湿っているため、蒸し暑い夏になります。冬は逆にシベリア気団から北西の季節風が吹きます。","d": 2},{"q": "フェーン現象で山を越えた風が高温になる理由として最も適切なものはどれですか？","c": ["山の上で太陽に近づくから","湿った空気が山を上るとき雨を降らせて水蒸気を失い、乾いた空気として山を下るとき温度が急上昇するから","地熱で温められるから","偏西風が温かいから"],"a": 1,"e": "フェーン現象のしくみ：①湿った空気が山を上る→100mにつき約0.5℃下がる（湿潤断熱減率）→②雲ができて雨を降らせる→③山頂を越えて乾いた空気が下る→100mにつき約1℃上がる（乾燥断熱減率）。上りより下りの温度変化が大きいため、ふもとでは元より高温になります。","d": 2},{"q": "海風が昼に海から陸に向かって吹く理由として最も適切なものはどれですか？","c": ["海の方が気温が高いから","陸の方が温まりやすく上昇気流が生じ、海から陸に向かって風が吹くから","月の引力の影響だから","偏西風の影響だから"],"a": 1,"e": "昼間は陸の方が海より温まりやすい（比熱が小さい）ため、陸上の空気が温められて上昇気流が発生→陸上が低気圧に→海上の高気圧から陸に向かって風が吹く＝海風。夜は逆に陸が冷えやすいため、陸から海に向かって陸風が吹きます。","d": 2},{"q": "線状降水帯が同じ場所に長時間大雨を降らせる理由として最も適切なものはどれですか？","c": ["台風が停滞するから","暖かく湿った空気が次々と流れ込み、積乱雲が同じ場所で繰り返し発生するから","前線が急速に移動するから","偏西風が強いから"],"a": 1,"e": "線状降水帯のしくみ：①暖かく湿った空気が継続的に流入→②積乱雲が次々と発生→③風上側で新しい雲ができ、風下側に流れる→④同じ場所に帯状に並ぶ（バックビルディング現象）。数時間にわたり同じ場所に大雨が降り、洪水や土砂災害の原因になります。","d": 2},{"q": "エルニーニョ現象が起きると日本が冷夏になりやすい理由として最も適切なものはどれですか？","c": ["日本海の海水温が下がるから","太平洋赤道域東部の海水温上昇で太平洋高気圧が弱まり、小笠原気団の勢力が弱くなるから","偏西風が南に蛇行するから","シベリア気団が強まるから"],"a": 1,"e": "エルニーニョ現象＝太平洋赤道域東部（ペルー沖）の海水温が平年より高くなる現象。これにより太平洋高気圧（小笠原気団）が弱まり、日本への暖かい空気の流入が減るため冷夏になりやすい。逆にラニーニャ現象では太平洋高気圧が強まり猛暑になりやすい。","d": 2},{"q": "気団について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ シベリア気団は冷たく乾いた気団である\nⅡ 小笠原気団は冷たく湿った気団である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。シベリア気団は大陸で発達するため冷たく乾いています（冬に影響）。Ⅱは誤り。小笠原気団は太平洋上で発達するため「暖かく湿った」気団です（夏に影響）。日本に影響する4つの気団：シベリア（冷・乾）、小笠原（暖・湿）、オホーツク海（冷・湿）、揚子江（暖・乾）。","d": 2},{"q": "前線について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 温暖前線が通過すると気温が上がる\nⅡ 寒冷前線が通過すると気温が上がる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。温暖前線は暖かい空気が冷たい空気の上にはい上がる前線で、通過後は暖気に覆われるため気温が上がります。Ⅱは誤り。寒冷前線は冷たい空気が暖かい空気の下にもぐり込む前線で、通過後は寒気に覆われるため気温が「下がり」ます。","d": 2},{"q": "台風について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 台風は熱帯低気圧のうち最大風速が17.2m/s以上のものである\nⅡ 台風の目の中は風が強く雨も激しい","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。台風の定義＝北西太平洋で発生した熱帯低気圧のうち、最大風速17.2m/s以上のもの。Ⅱは誤り。台風の目の中は下降気流があるため風が弱く、雲もなく晴れています。目の周囲（壁雲）が最も風雨が激しい部分です。","d": 2},{"q": "季節風について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 夏の季節風は北西から吹く\nⅡ 冬の季節風は北西から吹く","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。夏の季節風は「南東」から吹きます（小笠原気団→大陸）。Ⅱは正しい。冬の季節風は北西から吹きます（シベリア気団→太平洋）。季節風の覚え方：夏＝南東（海→陸）、冬＝北西（陸→海）。","d": 2},{"q": "天気の変化について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 日本の天気は偏西風の影響で西から東に変わる\nⅡ 偏西風は地表付近を吹く風である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。偏西風（上空の西風）が低気圧や高気圧を西から東に移動させるため、日本の天気は西から東に変わります。Ⅱは誤り。偏西風は上空約5000〜10000mを吹くジェット気流で、地表付近の風ではありません。天気予報で「西から天気が崩れる」というのは偏西風の影響です。","d": 2},{"q": "冬の天気について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 冬の気圧配置は「西高東低」である\nⅡ 冬の天気図では等圧線が南北に密に並ぶ","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。冬は大陸にシベリア高気圧、太平洋に低気圧が位置する「西高東低」の気圧配置。等圧線が南北に密に並ぶのが特徴で、等圧線の間隔が狭いほど風が強いことを示します。この気圧配置のとき北西の季節風が強く吹きます。","d": 2},{"q": "前線について述べた文として正しくないものはどれですか？","c": ["温暖前線では広い範囲に穏やかな雨が降る","寒冷前線では狭い範囲に激しい雨が降る","停滞前線は暖気と寒気の勢力がつり合ってできる","閉塞前線は温暖前線が寒冷前線に追いつかれてできる"],"a": 3,"e": "閉塞前線は「寒冷前線が温暖前線に追いつく」ことでできます（逆ではない）。寒冷前線の方が移動速度が速いため、温暖前線に追いつきます。前線の特徴：温暖前線＝広範囲・穏やかな雨・乱層雲、寒冷前線＝狭い範囲・激しい雨・積乱雲。","d": 2},{"q": "気団について述べた文として正しくないものはどれですか？","c": ["シベリア気団は冬に発達する","小笠原気団は夏に発達する","オホーツク海気団は暖かく乾いた気団である","揚子江気団は春と秋に影響する"],"a": 2,"e": "オホーツク海気団は「冷たく湿った」気団です（暖かく乾いた気団ではない）。梅雨の時期に影響し、冷たく湿った北東風（やませ）を吹かせて冷害の原因になることもあります。4つの気団の性質：シベリア＝冷乾、小笠原＝暖湿、オホーツク海＝冷湿、揚子江＝暖乾。","d": 2},{"q": "台風について述べた文として正しくないものはどれですか？","c": ["台風は赤道付近の熱帯の海上で発生する","台風のエネルギー源は海水の蒸発による水蒸気である","台風は温帯低気圧に変わることがある","台風は北半球では時計回りに風が吹き込む"],"a": 3,"e": "北半球の台風は「反時計回り」に風が吹き込みます（時計回りではない）。コリオリの力（地球の自転の影響）により、北半球では低気圧に反時計回り、高気圧から時計回りに風が吹きます。南半球では逆になります。","d": 2},{"q": "日本の天気の特徴について述べた文として正しくないものはどれですか？","c": ["春と秋は移動性高気圧と低気圧が交互に通過する","梅雨は停滞前線の影響で長雨が続く","夏は南高北低の気圧配置になる","冬は東高西低の気圧配置になる"],"a": 3,"e": "冬の気圧配置は「西高東低」であり、「東高西低」ではありません。西（大陸）にシベリア高気圧、東（太平洋）に低気圧が位置します。季節ごとの気圧配置：春秋＝移動性高気圧と低気圧が交互、夏＝南高北低、冬＝西高東低。","d": 3},{"q": "フェーン現象について述べた文として正しくないものはどれですか？","c": ["山を越えた風が高温になる現象である","日本海側で起きやすい","乾いた空気が山を下るとき100mにつき約1℃上がる","湿った空気が山を上るとき100mにつき約1℃下がる"],"a": 3,"e": "湿った空気が山を上るときは100mにつき約0.5℃下がります（約1℃ではない）。これは水蒸気が凝結するときに熱を放出するため、温度の下がり方が緩やかになるからです。乾いた空気が下るときは100mにつき約1℃上がるため、ふもとでは元より高温になります。","d": 3},{"q": "天気図で等圧線の間隔が狭い場所の特徴として正しいものはどれですか？","c": ["風が弱い","風が強い","気温が高い","雨が降っている"],"a": 1,"e": "等圧線の間隔が狭い＝気圧の差が大きい＝風が強い。等圧線は4hPaごとに引かれ、20hPaごとに太い線になります。冬の天気図では日本付近の等圧線が密に並び、強い北西の季節風が吹くことを示しています。","d": 2},{"q": "日本に影響する4つの気団を、冬に最も影響するものから夏に最も影響するものの順に並べたものとして正しいものはどれですか？","c": ["シベリア気団→揚子江気団→オホーツク海気団→小笠原気団","小笠原気団→オホーツク海気団→揚子江気団→シベリア気団","シベリア気団→オホーツク海気団→揚子江気団→小笠原気団","揚子江気団→シベリア気団→小笠原気団→オホーツク海気団"],"a": 0,"e": "季節と気団の対応：冬＝シベリア気団（冷・乾）→春秋＝揚子江気団（暖・乾）→梅雨＝オホーツク海気団（冷・湿）→夏＝小笠原気団（暖・湿）。シベリア気団が弱まると揚子江気団の影響で移動性高気圧が通過し、春の天気になります。","d": 2},{"q": "温暖前線と寒冷前線の雨の降り方の違いとして正しいものはどれですか？","c": ["温暖前線＝狭い範囲で激しい雨、寒冷前線＝広い範囲で穏やかな雨","温暖前線＝広い範囲で穏やかな雨、寒冷前線＝狭い範囲で激しい雨","どちらも広い範囲で穏やかな雨","どちらも狭い範囲で激しい雨"],"a": 1,"e": "温暖前線：暖気が寒気の上にゆるやかにはい上がる→広い範囲に乱層雲→穏やかな雨が長時間。寒冷前線：寒気が暖気の下にもぐり込む→狭い範囲に積乱雲→短時間の激しい雨（にわか雨・雷雨）。前線通過後の天気変化も重要です。","d": 3},{"q": "台風の進路を月別に見たとき、7月と9月の進路の違いとして正しいものはどれですか？","c": ["7月は西寄り、9月は東寄りの進路をとりやすい","7月も9月も同じ進路をとる","7月は東寄り、9月は西寄りの進路をとりやすい","7月は北上し、9月は南下する"],"a": 0,"e": "7月は太平洋高気圧が強く張り出しているため、台風は高気圧の縁に沿って西寄りの進路をとります。9月は太平洋高気圧が弱まるため、台風は東寄りの進路をとり日本に接近・上陸しやすくなります。台風の上陸が最も多いのは8〜9月です。","d": 3},{"q": "ある日の天気図で、日本の西に低気圧があります。明日の日本の天気はどうなると予想されますか？","c": ["晴れが続く","天気が崩れて雨になる可能性が高い","気温が大きく上がる","台風が接近する"],"a": 1,"e": "日本の天気は偏西風の影響で西から東に変わります。西に低気圧がある＝低気圧が東に移動して日本に近づく＝天気が崩れる可能性が高い。天気予報の基本：西の天気が翌日の自分の地域の天気になりやすい。","d": 2},{"q": "冬のある日、日本海側で大雪が降っています。このとき太平洋側の天気と、吹いている風の向きの組み合わせとして正しいものはどれですか？","c": ["太平洋側＝雨、風＝南東","太平洋側＝晴れ、風＝北西","太平洋側＝雪、風＝北東","太平洋側＝曇り、風＝南西"],"a": 1,"e": "冬の典型的な天気パターン：西高東低の気圧配置→北西の季節風→日本海で水蒸気を吸収→日本海側に大雪→山脈を越えた乾いた風が太平洋側に吹き下ろす→太平洋側は晴れて乾燥。「からっ風」は関東平野に吹く冬の乾いた北西風です。","d": 2},{"q": "梅雨明け後に猛暑になる理由を、気団の変化から説明したものとして正しいものはどれですか？","c": ["シベリア気団が強まるから","小笠原気団が勢力を強め、日本全体が暖かく湿った空気に覆われるから","オホーツク海気団が南下するから","揚子江気団が発達するから"],"a": 1,"e": "梅雨の間はオホーツク海気団と小笠原気団がつり合っています。梅雨明け＝小笠原気団が勢力を強めてオホーツク海気団を押し上げる→梅雨前線が北上して消滅→日本全体が小笠原気団（暖かく湿った空気）に覆われる→高温多湿の猛暑に。","d": 3},{"q": "山の谷間で、昼は谷風（谷から山頂へ）、夜は山風（山頂から谷へ）が吹きます。この風が吹く理由として正しいものはどれですか？","c": ["偏西風の影響","山の斜面が昼に温まりやすく夜に冷えやすいため、海風・陸風と同じ原理で風が吹く","台風の影響","気圧の変化"],"a": 1,"e": "谷風・山風は海風・陸風と同じ原理です。昼：山の斜面が日射で温まる→斜面上の空気が上昇→谷から山頂に向かう風（谷風）。夜：斜面が放射冷却で冷える→斜面上の空気が下降→山頂から谷に向かう風（山風）。温度差による局地的な風の循環です。","d": 3},{"q": "台風が日本に近づくと、台風の東側で特に風雨が激しくなります。その理由として正しいものはどれですか？","c": ["東側に山が多いから","台風自身の風に台風の移動速度が加わるため、東側（進行方向右側）の風が強くなるから","東側に海がある から","偏西風が東側を強めるから"],"a": 1,"e": "台風は反時計回りに風が吹き込みます。台風の東側（進行方向右側）では、台風自身の反時計回りの風と台風の移動方向が同じになるため、風速が加算されて強くなります。西側（左側）では風と移動方向が逆になるため相殺されて弱くなります。これを「危険半円」と「可航半円」といいます。","d": 3},{"q": "海風・陸風と季節風に共通する原理として最も適切なものはどれですか？","c": ["偏西風の影響","陸と海（または大陸と海洋）の温まりやすさの違いによる気圧差で風が生じる","地球の自転の影響","山脈の影響"],"a": 1,"e": "海風・陸風＝昼夜の陸と海の温度差で生じる局地的な風。季節風＝夏冬の大陸と海洋の温度差で生じる大規模な風。どちらも「温まりやすさの違い→気圧差→風」という同じ原理。スケールが違うだけで、高気圧（冷たい側）→低気圧（暖かい側）に風が吹く点は共通です。","d": 2},{"q": "温暖前線と寒冷前線が合体してできる閉塞前線と、梅雨前線（停滞前線）の違いとして最も適切なものはどれですか？","c": ["閉塞前線は温帯低気圧の発達末期にでき短時間で消える、梅雨前線は2つの気団のつり合いで長期間続く","閉塞前線は夏にでき、梅雨前線は冬にできる","どちらも同じしくみでできる","閉塞前線は雨を降らせないが、梅雨前線は雨を降らせる"],"a": 0,"e": "閉塞前線＝温帯低気圧が発達する過程で寒冷前線が温暖前線に追いつき合体→低気圧は衰弱に向かう→比較的短時間で消滅。梅雨前線（停滞前線）＝オホーツク海気団と小笠原気団の勢力がつり合い→前線がほとんど動かない→長期間（約1か月）雨が続く。","d": 3},{"q": "「やませ」と「からっ風」に共通する点と異なる点の説明として正しいものはどれですか？","c": ["どちらも冬の風で、やませは日本海側、からっ風は太平洋側に吹く","どちらも特定の気団の影響による地域特有の風だが、やませは冷害、からっ風は乾燥の被害をもたらす","どちらも夏の風である","どちらも同じ気団から吹く"],"a": 1,"e": "やませ＝オホーツク海気団から吹く冷たく湿った北東風。東北地方の太平洋側に吹き、冷害（米の不作）の原因。主に梅雨〜夏。からっ風＝シベリア気団の北西季節風が山脈を越えて関東平野に吹き下ろす乾いた風。冬に吹く。共通点は特定の気団による地域特有の風。","d": 3},{"q": "エルニーニョ現象とラニーニャ現象が日本の天気に正反対の影響を与える理由として最も適切なものはどれですか？","c": ["日本海の海水温が変わるから","太平洋赤道域の海水温変化が太平洋高気圧の強さに影響し、日本への暖気の流入量が変わるから","偏西風の向きが変わるから","台風の発生数が変わるから"],"a": 1,"e": "エルニーニョ＝ペルー沖の海水温上昇→太平洋高気圧が弱まる→日本は冷夏・暖冬。ラニーニャ＝ペルー沖の海水温低下→太平洋高気圧が強まる→日本は猛暑・厳冬。太平洋高気圧の強弱が日本の夏の暑さを左右するため、正反対の影響が出ます。","d": 3},{"q": "日本の天気が西から東に変わる原因となる風は何ですか？","c": ["季節風","貿易風","偏西風","海風"],"a": 2,"e": "偏西風は中緯度の上空を西から東に吹く風です。低気圧や高気圧を西から東に移動させるため、日本の天気は西から東に変わります。天気予報で「西から天気が崩れる」というのは偏西風の影響です。","d": 1},{"q": "梅雨前線をつくる2つの気団の組み合わせとして正しいものはどれですか？","c": ["シベリア気団と小笠原気団","オホーツク海気団と小笠原気団","揚子江気団とシベリア気団","オホーツク海気団と揚子江気団"],"a": 1,"e": "梅雨前線はオホーツク海気団（冷たく湿った気団）と小笠原気団（暖かく湿った気団）がぶつかってできる停滞前線です。6月〜7月にかけて日本付近に停滞し、長雨をもたらします。","d": 1},{"q": "冬の気圧配置を表す言葉として正しいものはどれですか？","c": ["南高北低","西高東低","東高西低","北高南低"],"a": 1,"e": "冬の気圧配置は「西高東低」。西（大陸）にシベリア高気圧、東（太平洋）に低気圧が位置します。この配置のとき北西の季節風が強く吹き、日本海側に雪、太平洋側に晴天をもたらします。天気図では等圧線が南北に密に並ぶのが特徴です。","d": 1}],"rika8": [{"q": "てこで、力点を支点から遠くすると小さな力で持ち上げられる理由として最も適切なものはどれですか？","c": ["棒が長くなるから","支点からの距離が大きいほど回転させる力（モーメント）が大きくなるから","作用点の重さが軽くなるから","棒の重さが変わるから"],"a": 1,"e": "てこの原理：回転させる力（モーメント）＝力×支点からの距離。力点を支点から遠くすると、同じ力でもモーメントが大きくなるため、小さな力で重いものを持ち上げられます。アルキメデスの「支点さえあれば地球も動かせる」という言葉はこの原理を表しています。","d": 2},{"q": "動滑車を使うと力が半分ですむ理由として最も適切なものはどれですか？","c": ["滑車が軽いから","荷物の重さを滑車と2本のロープで分担するから","ロープが伸びるから","摩擦がないから"],"a": 1,"e": "動滑車では荷物を支えるロープが2本になります。荷物の重さを2本のロープで分担するため、引く力は荷物の重さの半分ですみます。ただし、ロープを引く距離は2倍になります（仕事の原理：力×距離＝一定）。力は半分、距離は2倍でトータルの仕事量は同じです。","d": 2},{"q": "ドアノブが大きいほど軽い力でドアを開けられる理由として最も適切なものはどれですか？","c": ["ドアが軽くなるから","輪軸の原理で、大きい輪（ドアノブ）を回すと小さい軸に大きな力が伝わるから","ドアノブの摩擦が減るから","ドアの蝶番が動きやすくなるから"],"a": 1,"e": "ドアノブは輪軸の原理を利用しています。輪軸＝大きい輪と小さい軸が同じ中心で回転するしくみ。大きい輪（ドアノブ）に小さな力を加えると、小さい軸に大きな力が伝わります。ドアノブが大きいほど輪の半径が大きくなり、より小さな力で回せます。","d": 2},{"q": "定滑車を使っても力の大きさが変わらない理由として最も適切なものはどれですか？","c": ["ロープが1本だから","定滑車は固定されていて荷物を支えるロープが1本のままだから","滑車が重いから","ロープの長さが変わるから"],"a": 1,"e": "定滑車は天井などに固定された滑車で、荷物を支えるロープは1本のまま。力の大きさは変わりませんが、力の向きを変えることができます（下に引いて上に持ち上げる）。定滑車の利点は「力の向きを変える」こと。力を小さくするには動滑車が必要です。","d": 2},{"q": "はさみの刃の根元で切ると楽に切れる理由として最も適切なものはどれですか？","c": ["刃が厚いから","支点（ねじ）に近い作用点ほど大きな力が伝わるから","刃が鋭いから","手の力が強くなるから"],"a": 1,"e": "はさみはてこの原理を利用した道具です。支点＝ねじの部分、力点＝持ち手、作用点＝切る部分。作用点が支点に近いほど、てこの原理で大きな力が伝わります。だから厚紙や段ボールは刃の根元（支点に近い部分）で切ると楽に切れます。","d": 2},{"q": "棒の重心が真ん中にある（太さが一様な棒）とき、支点を真ん中に置くとつり合う理由として最も適切なものはどれですか？","c": ["棒の重さがゼロになるから","棒の重さが重心に集中していると考えられ、支点と重心が一致するとモーメントが0になるから","棒が軽いから","左右の長さが同じだから"],"a": 1,"e": "太さが一様な棒の重心は棒の真ん中にあります。重心とは「物体の重さが1点に集中していると考えられる点」。支点を重心に置くと、左右のモーメントが等しくなりつり合います。棒の重さを考える問題では、重心の位置が重要なポイントです。","d": 2},{"q": "ピンセットで力点が作用点より支点に近い理由として最も適切なものはどれですか？","c": ["力を大きくするため","指先の小さな動きを先端で大きな動きに変えて、細かいものをつまみやすくするため","軽くするため","壊れにくくするため"],"a": 1,"e": "ピンセットは力点が支点に近く、作用点が支点から遠い道具です。指先の小さな動きが先端で大きな動きに変換されるため、細かいものを正確につまめます。ただし、加える力より作用点の力は小さくなります。力を犠牲にして「動きの精密さ」を得ているのです。","d": 2},{"q": "くぎ抜きで長い柄を使うと楽にくぎが抜ける理由として最も適切なものはどれですか？","c": ["くぎが温まるから","力点が支点から遠くなり、小さな力で大きなモーメントを生み出せるから","くぎが細くなるから","柄が重いから"],"a": 1,"e": "くぎ抜きはてこの原理を利用した道具です。支点＝くぎ抜きの曲がった部分、力点＝柄の端、作用点＝くぎの頭。柄が長いほど力点が支点から遠くなり、小さな力で大きなモーメントを生み出せます。栓抜きも同じ原理で、柄が長いほど楽に開けられます。","d": 2},{"q": "てこについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ てこがつり合うとき、右回りのモーメント＝左回りのモーメントである\nⅡ モーメント＝力×支点からの距離で求められる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。てこのつり合いの条件：右回りのモーメント＝左回りのモーメント。モーメント＝力（重さ）×支点からの距離。例：支点の左30cmに60g、右に何gで釣り合う？→60×30＝右の重さ×距離。この計算がてこの問題の基本です。","d": 2},{"q": "滑車について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 定滑車は力の向きを変えることができる\nⅡ 動滑車は力の大きさを半分にできる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。定滑車＝固定されている→力の向きを変える（下に引いて上に上げる）→力の大きさは変わらない。動滑車＝荷物と一緒に動く→力の大きさが半分→引く距離は2倍。組み合わせ滑車では両方の利点を活かせます。","d": 2},{"q": "てこを使った道具について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ はさみは支点が力点と作用点の間にある\nⅡ ピンセットは支点が端にある","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。てこの3つの型：①支点が中間＝はさみ・シーソー・くぎ抜き、②力点が中間＝栓抜き・缶切り、③作用点が中間＝ピンセット・トング・箸。ピンセットは支点が端（つなぎ目）にあり、力点（指）が中間、作用点（先端）が反対の端です。","d": 2},{"q": "輪軸について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 輪軸は大きい輪に力を加えると小さい軸に大きな力が伝わる\nⅡ ドライバーは輪軸の原理を利用した道具である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。輪軸＝大きい輪と小さい軸が同じ中心で回転。大きい輪に小さな力→小さい軸に大きな力。ドライバーは持ち手（輪）が太く、先端（軸）が細い。持ち手が太いほど小さな力でネジを回せます。水道の蛇口やハンドルも輪軸の例です。","d": 2},{"q": "仕事の原理について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 動滑車を使うと力は半分になるが、引く距離は2倍になる\nⅡ 道具を使うと仕事の総量を減らすことができる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。動滑車：力＝半分、距離＝2倍→仕事量（力×距離）は同じ。Ⅱは誤り。仕事の原理＝道具を使っても仕事の総量は変わらない。てこ・滑車・斜面などの道具は力を小さくできますが、その分距離が長くなり、仕事の総量は同じです。","d": 2},{"q": "棒の重さについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 太さが一様な棒の重心は棒の真ん中にある\nⅡ 棒の重さを無視できない場合、重心に棒の全重量がかかると考える","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。太さが一様な棒の重心＝真ん中。棒の重さを考える問題では、棒の全重量が重心の位置にかかるおもりとして計算します。例：100cmの棒（200g）の重心は50cmの位置。支点が30cmの位置なら、重心までの距離20cmで200gのおもりとして計算。","d": 2},{"q": "てこを使った道具の分類として正しくないものはどれですか？","c": ["はさみ＝支点が中間","栓抜き＝力点が中間","ピンセット＝作用点が中間","くぎ抜き＝力点が中間"],"a": 3,"e": "くぎ抜きは「支点が中間」の道具です（力点が中間ではない）。支点＝曲がった部分、力点＝柄の端、作用点＝くぎの頭。てこの3つの型：①支点が中間＝はさみ・くぎ抜き・シーソー、②力点が中間＝栓抜き・缶切り、③作用点が中間＝ピンセット・トング。","d": 2},{"q": "滑車について述べた文として正しくないものはどれですか？","c": ["定滑車は力の向きを変える","動滑車は力を半分にする","定滑車と動滑車を組み合わせると力の向きを変えつつ力も小さくできる","動滑車を使うと引く距離も半分になる"],"a": 3,"e": "動滑車を使うと引く距離は「2倍」になります（半分ではない）。仕事の原理：力×距離＝一定。力が半分になる代わりに距離が2倍。例：100gの荷物を1m持ち上げる→動滑車なら50gの力で2m引く。仕事量＝100×1＝50×2＝100（同じ）。","d": 2},{"q": "てこのつり合いについて述べた文として正しくないものはどれですか？","c": ["支点からの距離が2倍になると、つり合うおもりの重さは半分になる","右回りのモーメントと左回りのモーメントが等しいときつり合う","支点に近いほど重いおもりが必要になる","モーメントは力×支点からの距離で求められる"],"a": 2,"e": "支点に「近い」ほど重いおもりが必要なのではなく、支点に「遠い」ほど軽いおもりでつり合います。つまり支点に近いほど重いおもりが必要→これは正しい表現に見えますが、問題文の意図は「支点に近いほど大きなモーメントが得られる」という誤解を問うもの。正確には：距離と重さは逆比の関係。距離が短い→重さが大きい必要がある。","d": 3},{"q": "輪軸について述べた文として正しくないものはどれですか？","c": ["ドアノブは輪軸の原理を利用している","ドライバーの持ち手が太いほど小さな力で回せる","水道の蛇口は輪軸の原理を利用している","輪軸では小さい輪に力を加えると大きな力が得られる"],"a": 3,"e": "輪軸では「大きい輪」に力を加えると小さい軸に大きな力が伝わります（小さい輪ではない）。大きい輪の半径÷小さい軸の半径＝力の倍率。例：輪の半径が軸の3倍なら、輪に10gの力→軸に30gの力。逆に軸に力を加えると、輪は大きく動くが力は小さくなります。","d": 2},{"q": "仕事の原理について述べた文として正しくないものはどれですか？","c": ["てこを使うと力は小さくなるが動かす距離は大きくなる","斜面を使うと力は小さくなるが動かす距離は大きくなる","動滑車を使うと力も距離も半分になる","道具を使っても仕事の総量は変わらない"],"a": 2,"e": "動滑車を使うと力は半分になりますが、距離は「2倍」になります（半分ではない）。仕事の原理＝道具を使っても仕事の総量（力×距離）は変わらない。力を小さくすれば距離が長くなり、距離を短くすれば力が大きくなります。","d": 3},{"q": "支点から左に20cmのところに60gのおもりをつるしました。右に30cmのところに何gのおもりをつるすとつり合いますか？","c": ["20g","30g","40g","90g"],"a": 2,"e": "てこのつり合い：左回りのモーメント＝右回りのモーメント。60g×20cm＝□g×30cm。1200＝□×30。□＝1200÷30＝40g。距離と重さは逆比の関係：距離が20:30＝2:3なら、重さは3:2＝60:40。","d": 2},{"q": "100gの荷物を動滑車1個で持ち上げるとき、ロープを引く力と引く距離の組み合わせとして正しいものはどれですか？（荷物を1m持ち上げる場合）","c": ["50gの力で2m引く","100gの力で1m引く","50gの力で1m引く","25gの力で4m引く"],"a": 0,"e": "動滑車1個：力＝荷物の重さの半分＝100÷2＝50g。距離＝持ち上げる高さの2倍＝1×2＝2m。仕事量の確認：50g×2m＝100g・m＝100g×1m（道具なしの場合と同じ）。仕事の原理が成り立っています。","d": 2},{"q": "支点から左に10cmのところに120g、左に30cmのところに40gのおもりをつるしました。右に20cmのところに何gのおもりをつるすとつり合いますか？","c": ["60g","80g","100g","120g"],"a": 3,"e": "左回りのモーメントの合計＝120×10＋40×30＝1200＋1200＝2400。右回りのモーメント＝□×20＝2400。□＝2400÷20＝120g。複数のおもりがある場合は、それぞれのモーメントを合計してからつり合いの式を立てます。","d": 3},{"q": "長さ80cmで重さ120gの太さが一様な棒があります。左端から20cmのところを支点にしたとき、左端に何gのおもりをつるすとつり合いますか？","c": ["60g","80g","120g","240g"],"a": 2,"e": "太さが一様な棒の重心＝真ん中＝左端から40cm。支点は左端から20cm。棒の重さによる右回りのモーメント＝120g×（40−20）cm＝120×20＝2400。左端のおもりによる左回りのモーメント＝□g×20cm＝2400。□＝2400÷20＝120g。","d": 3},{"q": "定滑車1個と動滑車1個を組み合わせて100gの荷物を持ち上げます。ロープを引く力は何gですか？","c": ["25g","50g","75g","100g"],"a": 1,"e": "組み合わせ滑車（定滑車1個＋動滑車1個）：動滑車で力が半分→定滑車で力の向きを変える。引く力＝100÷2＝50g。定滑車は力の大きさを変えないので、動滑車の効果だけが残ります。引く距離は2m（動滑車の効果で2倍）。","d": 2},{"q": "てこの左に40cmのところに30gのおもり、左に10cmのところに60gのおもりがあります。右側のどこに50gのおもりをつるすとつり合いますか？","c": ["右に18cm","右に24cm","右に30cm","右に36cm"],"a": 3,"e": "左回りのモーメント＝30×40＋60×10＝1200＋600＝1800。右回りのモーメント＝50×□＝1800。□＝1800÷50＝36cm。複数のおもりがある場合は、それぞれのモーメントを合計してからつり合いの式を立てます。","d": 2},{"q": "動滑車2個を使って200gの荷物を持ち上げるとき、ロープを引く力は何gですか？","c": ["25g","50g","100g","200g"],"a": 1,"e": "動滑車2個を直列に使う場合：1個目で力が半分（200÷2＝100g）、2個目でさらに半分（100÷2＝50g）。引く力＝50g。ただし引く距離は4倍（2×2＝4倍）になります。動滑車n個で力は1/2ⁿ、距離は2ⁿ倍。","d": 3},{"q": "はさみで厚紙を切るとき、刃の先端より根元で切る方が楽です。刃の長さが10cmで、先端で切るときに必要な力が500gだとすると、根元（支点から2cm）で切るときに必要な力は約何gですか？","c": ["約100g","約200g","約250g","約500g"],"a": 0,"e": "てこの原理で考えます。先端（支点から10cm）で500gの力が必要＝モーメント＝500×10＝5000。根元（支点から2cm）では：□×2＝5000ではなく、作用点のモーメントが同じなので、根元で切るのに必要な抵抗力＝5000÷2＝2500g…ではなく、力点の力で考えると：作用点が近いほど大きな力が伝わるので、力点の力は小さくてすみます。距離の比10:2＝5:1なので、力は1/5＝500÷5＝100g。","d": 3},{"q": "ドライバーの持ち手の直径が3cm（半径1.5cm）、先端の軸の直径が0.6cm（半径0.3cm）です。持ち手に10gの力を加えると、先端には何gの力が伝わりますか？","c": ["30g","50g","60g","100g"],"a": 1,"e": "輪軸の原理：輪の力×輪の半径＝軸の力×軸の半径。10g×1.5cm＝□g×0.3cm。15＝□×0.3。□＝15÷0.3＝50g。持ち手の半径が軸の半径の5倍なので、力も5倍になります。だから持ち手が太いドライバーほど楽にネジを回せるのです。","d": 3},{"q": "てこ・動滑車・斜面に共通する性質として最も適切なものはどれですか？","c": ["力の向きを変える","力を小さくできるが、動かす距離が長くなる（仕事の原理）","重さを軽くする","速さを変える"],"a": 1,"e": "てこ・動滑車・斜面はすべて「力を小さくする代わりに距離が長くなる」道具です。仕事の原理：道具を使っても仕事の総量（力×距離）は変わらない。てこ＝力点の距離が長い、動滑車＝引く距離が2倍、斜面＝坂道の距離が長い。","d": 2},{"q": "輪軸とてこに共通する原理として最も適切なものはどれですか？","c": ["力の向きを変える","支点からの距離が大きいほど小さな力で大きな力を生み出せる","摩擦を減らす","速さを上げる"],"a": 1,"e": "輪軸もてこも「支点（回転の中心）からの距離」がポイント。てこ＝力点が支点から遠いほど小さな力でOK。輪軸＝大きい輪（支点から遠い）に力を加えると小さい軸に大きな力。どちらも「距離×力＝一定」というモーメントの原理に基づいています。","d": 2},{"q": "シーソーで体重の軽い子が重い子とつり合うための方法として正しいものはどれですか？","c": ["軽い子が支点に近づく","軽い子が支点から遠くに座る","重い子が支点から遠くに座る","どちらも同じ位置に座る"],"a": 1,"e": "てこのつり合い：重さ×距離＝一定。軽い子は支点から遠くに座ることで、モーメント（重さ×距離）を大きくできます。例：30kgの子が2mの位置、60kgの子が1mの位置→30×2＝60×1＝60で釣り合い。距離と重さは逆比の関係です。","d": 2},{"q": "エレベーターには定滑車と動滑車が組み合わされています。この組み合わせの利点として最も適切なものはどれですか？","c": ["力の向きを変えつつ、力を小さくできる","速度を上げられる","音が静かになる","電気を使わなくてすむ"],"a": 0,"e": "エレベーターの滑車の組み合わせ：定滑車＝力の向きを変える（モーターで下に引く力を上に持ち上げる力に変換）、動滑車＝力を小さくする（モーターの負担を減らす）。両方を組み合わせることで、効率的に人や荷物を持ち上げられます。クレーンも同じ原理です。","d": 3},{"q": "てこの3つの点の名前として正しいものはどれですか？","c": ["支点・力点・作用点","支点・重点・力点","中心点・力点・作用点","支点・力点・重心"],"a": 0,"e": "てこの3つの点：支点（棒を支える点）、力点（力を加える点）、作用点（力がはたらく点）。この3つの位置関係で道具の種類が決まります。支点が中間＝はさみ、力点が中間＝栓抜き、作用点が中間＝ピンセット。","d": 1},{"q": "定滑車の特徴として正しいものはどれですか？","c": ["力を半分にする","力の向きを変える","距離を半分にする","重さを軽くする"],"a": 1,"e": "定滑車は天井などに固定された滑車で、力の向きを変えることができます。下に引く力を上に持ち上げる力に変換。力の大きさや引く距離は変わりません。「力の向きを変える」のが定滑車の唯一の利点です。","d": 1},{"q": "てこのつり合いの式として正しいものはどれですか？","c": ["左の重さ＝右の重さ","左の重さ×左の距離＝右の重さ×右の距離","左の距離＝右の距離","左の重さ÷左の距離＝右の重さ÷右の距離"],"a": 1,"e": "てこのつり合い：左の重さ×支点からの距離＝右の重さ×支点からの距離。これは「左回りのモーメント＝右回りのモーメント」と同じ意味です。例：左に30g×20cm＝600、右に□g×15cm＝600、□＝40g。","d": 1}],"rika9": [{"q": "根毛がたくさん生えている理由として最も適切なものはどれですか？","c": ["根を丈夫にするため","表面積を大きくして水や養分を効率よく吸収するため","土の中の虫を防ぐため","根を長くするため"],"a": 1,"e": "根毛は根の先端付近に生える細い毛のような突起です。根毛があることで根の表面積が大幅に増え、土の中の水や無機養分（肥料分）を効率よく吸収できます。根毛1本は非常に細いですが、数が膨大なため全体の吸収面積は非常に大きくなります。","d": 2},{"q": "気孔が葉の裏側に多い理由として最も適切なものはどれですか？","c": ["裏側の方が光が当たるから","表側に多いと直射日光で水分が蒸発しすぎるため、裏側に多くして蒸散を調節するから","裏側の方が二酸化炭素が多いから","表側には葉緑体がないから"],"a": 1,"e": "気孔は蒸散（水蒸気の放出）や気体の出入り口です。表側に多いと直射日光で水分が過剰に蒸発してしまうため、裏側に多く配置して蒸散量を調節しています。ただし、水面に浮かぶスイレンなどは表側に気孔があります（裏側が水に接しているため）。","d": 2},{"q": "道管が茎の内側、師管が茎の外側にある理由として最も適切なものはどれですか？","c": ["見た目をよくするため","道管は根からの水を通すため中心に近く丈夫に、師管は葉からの養分を運ぶため外側にある構造が効率的だから","偶然そうなっただけ","温度を調節するため"],"a": 1,"e": "道管は根から吸い上げた水や無機養分を上に運ぶ管で、茎の内側（中心寄り）にあります。師管は葉でつくられた有機養分（デンプンなど）を全体に運ぶ管で、茎の外側にあります。覚え方：「道管＝内側＝水」「師管＝外側＝養分」。双子葉植物では道管と師管の間に形成層があります。","d": 2},{"q": "植物が蒸散を行う理由として最も適切なものはどれですか？","c": ["酸素を出すため","根から水を吸い上げる力を生み出し、体温調節もするため","二酸化炭素を吸収するため","デンプンをつくるため"],"a": 1,"e": "蒸散の役割：①根から水を吸い上げる原動力になる（蒸散で葉から水が出る→道管内の水が引き上げられる）、②体温調節（水が蒸発するとき熱を奪う＝気化熱）、③無機養分の運搬を助ける。蒸散は主に気孔から行われ、孔辺細胞が気孔の開閉を調節します。","d": 2},{"q": "双子葉植物の茎に形成層がある理由として最も適切なものはどれですか？","c": ["水を貯めるため","形成層の細胞分裂で茎が太くなるため","光合成をするため","養分を運ぶため"],"a": 1,"e": "形成層は道管と師管の間にある細胞分裂が活発な層です。形成層が分裂することで、内側に新しい道管、外側に新しい師管がつくられ、茎が太くなります。単子葉植物には形成層がないため、茎は太くなりません。木の年輪は形成層の活動の跡です。","d": 2},{"q": "裸子植物の花粉が風で運ばれる理由として最も適切なものはどれですか？","c": ["花粉が重いから","裸子植物は花びらがなく虫を引きつけられないため、風に頼って受粉するから","裸子植物は水中に生えるから","花粉が少ないから"],"a": 1,"e": "裸子植物（マツ・スギ・イチョウなど）は花びらや蜜がなく、虫を引きつけることができません。そのため風によって花粉を運ぶ「風媒花」です。大量の花粉を飛ばして受粉の確率を高めます。スギ花粉症はこの大量の花粉が原因です。被子植物にも風媒花（イネ・トウモロコシ）があります。","d": 2},{"q": "葉が互生（交互につく）する理由として最も適切なものはどれですか？","c": ["茎を丈夫にするため","葉どうしが重ならないようにして、すべての葉に日光が当たるようにするため","虫に食べられにくくするため","水を集めやすくするため"],"a": 1,"e": "互生は葉が茎に交互につくつき方です。葉が重ならないように配置されることで、すべての葉に効率よく日光が当たり、光合成の効率が最大になります。葉のつき方：互生（サクラ・アサガオ）、対生（アジサイ・ミント）、輪生（オオバコ・ヒマワリの一部）。","d": 2},{"q": "植物の根の先端に根冠がある理由として最も適切なものはどれですか？","c": ["水を吸収するため","成長点を保護しながら土の中を進むため","養分を貯めるため","光を感じるため"],"a": 1,"e": "根冠は根の先端を覆うキャップ状の組織です。役割は①成長点（細胞分裂が活発な部分）を保護する、②土の中を進むとき摩擦から守る。根冠の細胞は常にすり減りますが、成長点から新しい細胞が供給されて補充されます。","d": 2},{"q": "双子葉植物と単子葉植物の根について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 双子葉植物の根は主根と側根からなる\nⅡ 単子葉植物の根はひげ根である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。双子葉植物＝主根（太い根）と側根（枝分かれした根）。単子葉植物＝ひげ根（細い根が多数）。双子葉と単子葉の違い：根（主根・側根 vs ひげ根）、茎（維管束が輪状 vs ばらばら）、葉（網状脈 vs 平行脈）。","d": 2},{"q": "茎の維管束について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 双子葉植物の維管束は輪のように並んでいる\nⅡ 単子葉植物の維管束はばらばらに散らばっている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。双子葉植物の維管束は茎の断面で輪状に規則正しく並び、形成層がある。単子葉植物の維管束は茎の断面でばらばらに散らばり、形成層がない。この違いは茎の断面を顕微鏡で観察するとはっきりわかります。","d": 2},{"q": "光合成と呼吸について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 光合成は昼だけ行われる\nⅡ 呼吸は昼も夜も行われる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。光合成は光が必要なので昼（光があるとき）だけ行われます。呼吸は生きている限り24時間行われます。昼は光合成＞呼吸なのでCO2を吸収しO2を放出。夜は呼吸のみなのでO2を吸収しCO2を放出。","d": 2},{"q": "被子植物と裸子植物について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 被子植物は胚珠が子房に包まれている\nⅡ 裸子植物は胚珠がむき出しになっている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。被子植物＝胚珠が子房に包まれている→受粉後、子房が果実に、胚珠が種子になる。裸子植物＝胚珠がむき出し（子房がない）→果実ができない。マツのまつかさ（松ぼっくり）の中に種子がむき出しで入っています。","d": 2},{"q": "葉のつくりについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 柵状組織は葉の表側にあり、細胞が規則正しく並んでいる\nⅡ 海綿状組織は葉の裏側にあり、細胞の間にすき間が多い","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。柵状組織＝葉の表側、細胞が柵のように縦に規則正しく並ぶ、葉緑体が多い→光合成が活発。海綿状組織＝葉の裏側、細胞の間にすき間が多い→気体の通り道になる。葉の断面：表皮→柵状組織→海綿状組織→表皮（気孔）。","d": 2},{"q": "蒸散について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 蒸散は主に気孔から行われる\nⅡ 気孔の開閉は孔辺細胞が行う","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。蒸散は葉の気孔から水蒸気が放出される現象。気孔の開閉は三日月形の孔辺細胞が担当。孔辺細胞が水を吸って膨らむと気孔が開き、水を失ってしぼむと気孔が閉じます。孔辺細胞には葉緑体があり、光が当たると気孔が開きます。","d": 2},{"q": "双子葉植物と単子葉植物の違いについて述べた文として正しくないものはどれですか？","c": ["双子葉植物の葉脈は網状脈である","単子葉植物の葉脈は平行脈である","双子葉植物の維管束はばらばらに散らばっている","単子葉植物の根はひげ根である"],"a": 2,"e": "双子葉植物の維管束は「輪状に並んでいる」のであり、「ばらばらに散らばっている」のは単子葉植物です。双子葉と単子葉の3つの違い：①根＝主根・側根 vs ひげ根、②茎＝維管束が輪状 vs ばらばら、③葉＝網状脈 vs 平行脈。","d": 2},{"q": "光合成について述べた文として正しくないものはどれですか？","c": ["光合成は葉緑体で行われる","光合成には光・水・二酸化炭素が必要である","光合成でデンプンと酸素がつくられる","光合成は夜も行われる"],"a": 3,"e": "光合成は光が必要なので「夜は行われません」。光合成の式：水＋二酸化炭素→（光エネルギー）→デンプン（有機物）＋酸素。場所は葉緑体。昼は光合成と呼吸の両方が行われますが、夜は呼吸のみです。","d": 2},{"q": "根のつくりについて述べた文として正しくないものはどれですか？","c": ["根毛は水や養分の吸収面積を大きくする","成長点は根の先端付近にある","根冠は成長点を保護する","根毛は根の全体に均一に生えている"],"a": 3,"e": "根毛は根の「全体」ではなく、根の先端付近の限られた範囲に生えています。根の先端から順に：根冠→成長点→根毛の生えている部分。古い部分の根毛は脱落し、先端付近で新しい根毛が生えます。根が伸びるにつれて吸収する範囲が広がります。","d": 2},{"q": "裸子植物について述べた文として正しくないものはどれですか？","c": ["マツは裸子植物である","イチョウは裸子植物である","スギは裸子植物である","チューリップは裸子植物である"],"a": 3,"e": "チューリップは被子植物（単子葉植物）です。裸子植物の代表例：マツ・スギ・ヒノキ・イチョウ・ソテツ。裸子植物の特徴：胚珠がむき出し、子房がない、果実ができない、多くが風媒花。被子植物は胚珠が子房に包まれ、果実ができます。","d": 2},{"q": "蒸散について述べた文として正しくないものはどれですか？","c": ["蒸散は根から水を吸い上げる力になる","蒸散は主に気孔から行われる","蒸散は植物の体温調節に役立つ","蒸散は根からも盛んに行われる"],"a": 3,"e": "蒸散は主に葉の気孔から行われ、根からはほとんど行われません。蒸散の役割：①根から水を吸い上げる原動力、②体温調節（気化熱）、③無機養分の運搬。蒸散量は気温・湿度・風・光の強さに影響されます。","d": 3},{"q": "葉の断面を表側から順に並べたものとして正しいものはどれですか？","c": ["表皮→海綿状組織→柵状組織→表皮","表皮→柵状組織→海綿状組織→表皮","柵状組織→表皮→海綿状組織→表皮","海綿状組織→柵状組織→表皮→表皮"],"a": 1,"e": "葉の断面（表側から）：表皮（クチクラ層）→柵状組織（細胞が縦に並ぶ、葉緑体多い）→海綿状組織（すき間が多い）→表皮（気孔がある）。柵状組織が表側にあるのは、光を効率よく受けて光合成するため。気孔は裏側の表皮に多い。","d": 2},{"q": "双子葉植物と単子葉植物の特徴の組み合わせとして正しいものはどれですか？","c": ["アサガオ＝単子葉植物、イネ＝双子葉植物","サクラ＝双子葉植物、ユリ＝単子葉植物","タンポポ＝単子葉植物、トウモロコシ＝双子葉植物","ヒマワリ＝単子葉植物、ススキ＝双子葉植物"],"a": 1,"e": "サクラ＝双子葉植物（網状脈・主根と側根）、ユリ＝単子葉植物（平行脈・ひげ根）。双子葉植物の例：サクラ・タンポポ・アサガオ・ヒマワリ・アブラナ。単子葉植物の例：イネ・ユリ・トウモロコシ・ススキ・チューリップ。","d": 2},{"q": "蒸散の実験で、葉の表にワセリンを塗った場合と裏に塗った場合で水の減り方が違いました。裏に塗った方が水の減りが少なかった理由として正しいものはどれですか？","c": ["裏側の方が葉が厚いから","裏側に気孔が多いため、ワセリンで気孔をふさぐと蒸散が大きく減るから","裏側の方が日光が当たるから","裏側にワセリンが多く塗れるから"],"a": 1,"e": "葉の裏側には気孔が多いため、裏にワセリンを塗ると多くの気孔がふさがれ、蒸散量が大きく減ります。蒸散の実験：何も塗らない＞表だけ塗る＞裏だけ塗る＞両面塗る、の順に水の減りが少なくなります。裏に塗った効果が大きい＝裏に気孔が多い証拠。","d": 3},{"q": "道管と師管の位置関係について、茎と根で共通する点として正しいものはどれですか？","c": ["道管が外側、師管が内側","道管が内側、師管が外側","道管と師管が交互に並ぶ","道管と師管が混ざっている"],"a": 1,"e": "茎でも根でも、道管は内側（中心寄り）、師管は外側にあります。覚え方：「道管＝内側＝水を上に運ぶ」「師管＝外側＝養分を運ぶ」。茎の断面で維管束を見ると、内側が道管、外側が師管、その間に形成層（双子葉植物のみ）があります。","d": 2},{"q": "植物の葉に日光を当てた後、ヨウ素液をかけると青紫色に変わりました。この実験からわかることとして正しいものはどれですか？","c": ["葉が呼吸をしていること","光合成によってデンプンがつくられたこと","葉から水が蒸発していること","葉が二酸化炭素を出していること"],"a": 1,"e": "ヨウ素液はデンプンに反応して青紫色に変わります（ヨウ素デンプン反応）。日光を当てた葉が青紫色になった＝光合成でデンプンがつくられた証拠。対照実験として、アルミホイルで覆った部分（光が当たらない）は青紫色にならず、光合成に光が必要なことがわかります。","d": 2},{"q": "植物を暗い部屋に1日置いてから光合成の実験をする理由として正しいものはどれですか？","c": ["植物を休ませるため","葉に残っているデンプンを呼吸で使い切り、実験前のデンプンをなくすため","根から水を吸わせるため","気孔を閉じさせるため"],"a": 1,"e": "暗い部屋に置く＝光合成ができない→呼吸だけが行われる→葉に蓄えられていたデンプンが呼吸で消費される→葉のデンプンがゼロになる。この状態で光を当てると、新たにつくられたデンプンだけを検出でき、「光合成でデンプンがつくられた」ことを正確に証明できます。","d": 3},{"q": "屈光性で植物の茎が光の方向に曲がるしくみとして正しいものはどれですか？","c": ["光が当たる側の細胞が大きくなるから","光が当たらない側の細胞が成長ホルモン（オーキシン）の影響で伸びるため、光の方向に曲がるから","根が光の方向に伸びるから","葉が光を反射するから"],"a": 1,"e": "屈光性のしくみ：茎の先端で感じた光の刺激→成長ホルモン（オーキシン）が光の当たらない側に移動→暗い側の細胞がより伸びる→結果として光の方向に曲がる。根は逆に光から遠ざかる方向に伸びます（負の屈光性）。","d": 3},{"q": "ある植物の茎の断面を顕微鏡で観察したところ、維管束が輪状に並んでいました。この植物の根と葉の特徴の組み合わせとして正しいものはどれですか？","c": ["ひげ根・平行脈","主根と側根・網状脈","ひげ根・網状脈","主根と側根・平行脈"],"a": 1,"e": "維管束が輪状に並ぶ＝双子葉植物。双子葉植物の特徴：根＝主根と側根、茎＝維管束が輪状・形成層あり、葉＝網状脈。3つの特徴はセットで覚えましょう。単子葉植物なら：ひげ根・維管束ばらばら・平行脈。","d": 2},{"q": "植物の根が下に伸び、茎が上に伸びる性質をそれぞれ何といいますか？","c": ["根＝正の屈光性、茎＝負の屈光性","根＝正の屈地性、茎＝負の屈地性","根＝負の屈地性、茎＝正の屈地性","根＝正の屈湿性、茎＝負の屈湿性"],"a": 1,"e": "屈地性＝重力に対する反応。根は重力の方向（下）に伸びる＝正の屈地性。茎は重力と反対の方向（上）に伸びる＝負の屈地性。屈光性＝光に対する反応（茎は光に向かう＝正の屈光性）。屈湿性＝水分に対する反応（根は水分の多い方に伸びる＝正の屈湿性）。","d": 2},{"q": "道管と師管に共通する役割として最も適切なものはどれですか？","c": ["光合成をする","植物の体内で物質を運搬する管である","気体を交換する","細胞分裂をする"],"a": 1,"e": "道管＝根から吸収した水と無機養分を上に運ぶ。師管＝葉でつくられた有機養分（デンプンなど）を全体に運ぶ。どちらも「物質を運搬する管」という共通の役割。道管と師管を合わせて「維管束」といい、植物の体全体に張り巡らされています。","d": 2},{"q": "光合成と呼吸の関係について正しく述べたものはどれですか？","c": ["光合成と呼吸は同じ反応である","光合成は有機物をつくり、呼吸は有機物を分解する、ほぼ逆の反応である","光合成は酸素を使い、呼吸は酸素をつくる","光合成と呼吸は同時に行われない"],"a": 1,"e": "光合成：水＋CO2→（光）→デンプン＋O2（有機物をつくる）。呼吸：デンプン＋O2→CO2＋水＋エネルギー（有機物を分解する）。ほぼ逆の反応です。昼は両方行われますが光合成＞呼吸なので見かけ上CO2を吸収しO2を放出。夜は呼吸のみ。","d": 2},{"q": "根毛と気孔に共通する「表面積を大きくする」という工夫の目的として最も適切なものはどれですか？","c": ["植物を大きくするため","物質の吸収や交換の効率を高めるため","敵から身を守るため","種子を遠くに飛ばすため"],"a": 1,"e": "根毛＝根の表面積を大きくして水や養分の吸収効率を高める。気孔＝葉の表面に多数あり、CO2の吸収・O2の放出・蒸散の効率を高める。どちらも「表面積を大きくして物質のやりとりを効率化する」という共通の工夫です。小腸の柔毛も同じ原理です。","d": 2},{"q": "被子植物が裸子植物より多様に進化できた理由として最も適切なものはどれですか？","c": ["裸子植物より背が高いから","子房が果実になることで種子を動物に運んでもらえ、花で虫を引きつけて効率よく受粉できるから","裸子植物より根が深いから","裸子植物より葉が大きいから"],"a": 1,"e": "被子植物の進化上の利点：①子房→果実になり、動物に食べられて種子が遠くに運ばれる（種子散布）、②花びら・蜜・香りで虫を引きつけ効率よく受粉（虫媒花）。裸子植物は風媒花で効率が低く、果実もできない。被子植物は現在の植物の約80％を占めます。","d": 3},{"q": "根から吸い上げた水が通る管は何ですか？","c": ["師管","道管","形成層","気孔"],"a": 1,"e": "道管は根から吸い上げた水や無機養分を茎や葉に運ぶ管です。師管は葉でつくられた有機養分を運ぶ管。覚え方：「道管＝水道の道＝水を運ぶ」「師管＝師匠の師＝養分（栄養）を運ぶ」。","d": 1},{"q": "気孔の開閉を調節する細胞は何ですか？","c": ["柵状組織","海綿状組織","孔辺細胞","表皮細胞"],"a": 2,"e": "孔辺細胞は気孔の両側にある三日月形の細胞です。孔辺細胞が水を吸って膨らむと気孔が開き、しぼむと閉じます。孔辺細胞には葉緑体があり、光が当たると気孔が開いて光合成に必要なCO2を取り込みます。","d": 1},{"q": "胚珠が子房に包まれている植物を何といいますか？","c": ["裸子植物","被子植物","シダ植物","コケ植物"],"a": 1,"e": "被子植物は胚珠が子房に包まれている植物です。「被」は「覆う」の意味。受粉後、子房が果実に、胚珠が種子になります。裸子植物は胚珠がむき出し（裸）で、子房がないため果実ができません。","d": 1}]}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function getHistory(){try{return JSON.parse(localStorage.getItem('quizV2History')||'{}')}catch{return{}}}
function saveScore(unit,s,total){const h=getHistory();if(!h[unit])h[unit]=[];h[unit].push({score:s,total:total,date:new Date().toLocaleDateString('ja-JP')});if(h[unit].length>20)h[unit]=h[unit].slice(-20);localStorage.setItem('quizV2History',JSON.stringify(h))}

function buildMenu(){
  const m=document.getElementById('menu');
  let html='<div class="subject-label">📘 社会</div>';
  ['shakai5','shakai6','shakai7','shakai8','shakai9'].forEach(k=>{
    const u=UNITS[k],h=getHistory(),scores=h[k]||[];
    const best=scores.length?Math.max(...scores.map(s=>Math.round(s.score/s.total*100)))+'%':'---';
    html+='<button class="unit-btn" onclick="showDiffFilter(\''+k+'\')" data-unit="'+k+'"><span class="icon">'+u.icon+'</span><span class="info"><span class="uname">'+u.name+'</span><span class="stats">最高: '+best+' | 挑戦: '+scores.length+'回</span></span></button>';
  });
  html+='<div class="subject-label rika">🔬 理科</div>';
  ['rika5','rika6','rika7','rika8','rika9'].forEach(k=>{
    const u=UNITS[k],h=getHistory(),scores=h[k]||[];
    const best=scores.length?Math.max(...scores.map(s=>Math.round(s.score/s.total*100)))+'%':'---';
    html+='<button class="unit-btn rika" onclick="showDiffFilter(\''+k+'\')" data-unit="'+k+'"><span class="icon">'+u.icon+'</span><span class="info"><span class="uname">'+u.name+'</span><span class="stats">最高: '+best+' | 挑戦: '+scores.length+'回</span></span></button>';
  });
  html+='<button class="all-btn" onclick="showDiffFilter(\'all\')">🎯 全単元ランダム（10問）</button>';
  m.innerHTML=html;
}

function showDiffFilter(unit){
  curUnit=unit;curDiff=0;
  const m=document.getElementById('menu');
  const unitName=unit==='all'?'全単元ランダム':UNITS[unit].icon+' '+UNITS[unit].name;
  m.innerHTML='<div style="text-align:center;margin:20px 0"><h2 style="color:#d63384;font-size:1.1em">'+unitName+'</h2><p style="color:#999;font-size:.85em;margin:8px 0">難易度をえらんでね</p><div class="diff-filter"><button class="diff-btn active" onclick="setDiff(0,this)">🎯 ぜんぶ</button><button class="diff-btn d1" onclick="setDiff(1,this)">⭐ 初級</button><button class="diff-btn d2" onclick="setDiff(2,this)">⭐⭐ 中級</button><button class="diff-btn d3" onclick="setDiff(3,this)">⭐⭐⭐ 上級</button></div><button class="all-btn" style="margin-top:16px;width:80%" onclick="startQuiz()">スタート！🚀</button><br><button class="back-btn" style="margin-top:8px" onclick="buildMenu()">← もどる</button></div>';
}

function setDiff(d,btn){curDiff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

function startQuiz(){
  let pool=[];
  if(curUnit==='all'){Object.values(Q).forEach(qs=>pool.push(...qs))}
  else{pool=[...Q[curUnit]]}
  if(curDiff>0)pool=pool.filter(q=>q.d===curDiff);
  if(pool.length===0){alert('この難易度の問題がありません');return}
  curQs=shuffle(pool).slice(0,10);
  curIdx=0;score=0;wrongs=[];answered=false;
  document.getElementById('menu').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  showQ();
}

function addEmojiToExplanation(text){
  const rules=[
    [/水俣病|イタイイタイ病|四日市ぜんそく|公害|鉱毒/,'🏭'],
    [/地球温暖化|CO2|温室効果|排出量/,'🌡️'],
    [/オゾン層|フロン/,'🛡️'],
    [/酸性雨/,'🌧️'],
    [/砂漠化|熱帯林/,'🌳'],
    [/SDGs|持続可能/,'🌍'],
    [/3R|リデュース|リユース|リサイクル|循環型/,'♻️'],
    [/人口|少子|高齢|過疎|過密|限界集落/,'👥'],
    [/漁業|漁獲|漁港|養殖|水産/,'🐟'],
    [/新幹線|鉄道|リニア/,'🚄'],
    [/自動車|トヨタ|豊田/,'🚗'],
    [/飛行機|空港|航空/,'✈️'],
    [/船|港|タンカー|コンテナ/,'🚢'],
    [/高速道路|ETC|モーダルシフト/,'🛣️'],
    [/工業|工場|コンビナート|製鉄/,'🏭'],
    [/石油|原油|ナフサ|エネルギー|石炭|天然ガス|LNG/,'⛽'],
    [/原子力|原発|ウラン|放射/,'☢️'],
    [/太陽光|風力|地熱|再生可能|水力発電/,'🔋'],
    [/発電|電力/,'⚡'],
    [/貿易|輸出|輸入|円高|円安/,'💱'],
    [/半導体/,'🔬'],
    [/インターネット|ICT|情報|メディア|デジタル/,'💻'],
    [/郵便|前島密|飛脚/,'📮'],
    [/テレビ|ラジオ|放送/,'📺'],
    [/電話|通信/,'📱'],
    [/プライバシー|個人情報/,'🔒'],
    [/フェイクニュース|ウイルス/,'⚠️'],
    [/地震|津波|災害/,'🌊'],
    [/環境|環境省|環境庁|環境基本法/,'🌿'],
    [/京都議定書|パリ協定/,'📜'],
    [/フードバンク|食品ロス/,'🍽️'],
    [/マイクロプラスチック|海洋汚染/,'🌊'],
    [/生物濃縮|食物連鎖/,'🔗'],
    [/めがね|鯖江/,'👓'],
    [/タオル|今治/,'🧣'],
    [/洋食器|燕/,'🍴'],
    [/刃物|関市/,'🔪'],
    [/漆器|輪島/,'🏺'],
    [/瀬戸内|塩田/,'🏖️'],
    [/黒潮|親潮|潮目|海流/,'🌊'],
    [/大陸棚|プランクトン/,'🦠'],
    [/中東|サウジ|UAE|カタール/,'🛢️'],
    [/オーストラリア|ブラジル/,'🌏'],
    [/アメリカ/,'🇺🇸'],
    [/中国/,'🇨🇳'],
    [/ヨーロッパ/,'🇪🇺'],
    [/宅配便/,'📦'],
    [/電子マネー/,'💳'],
    [/ヒートアイランド/,'🏙️'],
    [/田中正造/,'✊'],
    [/琵琶湖/,'💧'],
    [/年金|社会保障/,'💰'],
    [/エルニーニョ|ラニーニャ/,'🌤️'],
    [/都市圏|東京/,'🏙️'],
  ];
  let icons=new Set();
  for(const [pat,emoji] of rules){
    if(pat.test(text)){icons.add(emoji);if(icons.size>=3)break;}
  }
  const prefix=icons.size>0?[...icons].join('')+' ':'💡 ';
  return '<span style="font-size:1.3em;vertical-align:middle">'+prefix+'</span>'+text;
}

function showQ(){
  answered=false;
  const q=curQs[curIdx],t=curQs.length;
  document.getElementById('qNum').textContent=(curIdx+1)+' / '+t;
  document.getElementById('scoreDisp').textContent='⭕ '+score;
  document.getElementById('progFill').style.width=(curIdx/t*100)+'%';
  const tag=document.getElementById('unitTag');
  const uKey=Object.keys(Q).find(k=>Q[k].includes(q));
  if(uKey&&UNITS[uKey]){tag.textContent=UNITS[uKey].icon+' '+UNITS[uKey].name;tag.className='unit-tag '+(uKey.startsWith('rika')?'rika':'shakai')}
  const dt=document.getElementById('diffTag');
  dt.textContent=DIFF_NAMES[q.d];dt.className='diff-tag d'+q.d;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').style.display='none';
  document.getElementById('explanation').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  const cd=document.getElementById('choices');cd.innerHTML='';
  const idx=q.c.map((_,i)=>i);const si=shuffle(idx);
  si.forEach(oi=>{const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=q.c[oi];btn.onclick=()=>selectAns(btn,oi,q);cd.appendChild(btn)});
}

function selectAns(btn,sel,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(sel===q.a){
    btn.classList.add('correct');score++;
    fb.className='feedback correct-fb';fb.textContent=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===q.c[q.a])b.classList.add('show-correct')});
    wrongs.push(q);
    fb.className='feedback wrong-fb';fb.textContent=CHEER[Math.floor(Math.random()*CHEER.length)];
  }
  fb.style.display='block';
  document.getElementById('scoreDisp').textContent='⭕ '+score;
  const exp=document.getElementById('explanation');exp.innerHTML=addEmojiToExplanation(q.e);exp.style.display='block';
  const nb=document.getElementById('nextBtn');nb.style.display='block';
  nb.textContent=curIdx<curQs.length-1?'次の問題 →':'結果を見る 🎉';
}

function nextQ(){curIdx++;if(curIdx<curQs.length)showQ();else showResult()}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const t=curQs.length,pct=Math.round(score/t*100);
  document.getElementById('finalScore').textContent=score+' / '+t+'（'+pct+'%）';
  let msg='',stars='';
  if(pct===100){msg='🎉 パーフェクト！天才！';stars='🌟🌟🌟🌟🌟'}
  else if(pct>=80){msg='👏 すごい！よくできました！';stars='🌟🌟🌟🌟'}
  else if(pct>=60){msg='📚 いい調子！もう少しがんばろう！';stars='🌟🌟🌟'}
  else if(pct>=40){msg='💪 復習してもう一回チャレンジ！';stars='🌟🌟'}
  else{msg='🌱 基本からしっかり復習しよう！';stars='🌟'}
  document.getElementById('stars').textContent=stars;
  document.getElementById('resultMsg').textContent=msg;
  if(curUnit!=='__retry'&&curUnit!=='__review')saveScore(curUnit==='all'?'all':curUnit,score,t);
  const wl=document.getElementById('wrongList');wl.innerHTML='';
  if(wrongs.length>0){
    wrongs.forEach(q=>{const d=document.createElement('div');d.className='wrong-item';d.innerHTML='<div class="wq">❌ '+q.q+'</div><div class="wa">→ 正解: '+q.c[q.a]+'</div>';wl.appendChild(d)});
    document.getElementById('retryBtn').style.display='inline-block';
    document.getElementById('reviewBtn').style.display='inline-block';
  }else{
    document.getElementById('retryBtn').style.display='none';
    document.getElementById('reviewBtn').style.display='none';
  }
}

function retryWrong(){curQs=shuffle(wrongs);curIdx=0;score=0;wrongs=[];answered=false;curUnit='__retry';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';showQ()}

function reviewWrong(){curQs=[...wrongs];curIdx=0;score=0;wrongs=[];answered=false;curUnit='__review';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';showQ()}

function backToMenu(){document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='none';document.getElementById('historyScreen').style.display='none';document.getElementById('menu').style.display='grid';buildMenu()}

function showHistory(){
  document.getElementById('menu').style.display='none';document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='none';
  document.getElementById('historyScreen').style.display='block';
  const h=getHistory(),hl=document.getElementById('histList');let html='';
  const keys=['shakai5','shakai6','shakai7','shakai8','shakai9','rika5','rika6','rika7','rika8','rika9','all'];
  keys.forEach(k=>{
    const scores=h[k]||[];if(scores.length===0)return;
    const name=k==='all'?'🎯 全単元ランダム':UNITS[k]?UNITS[k].icon+' '+UNITS[k].name:k;
    html+='<div class="hist-card"><div class="hist-unit">'+name+'</div><div class="hist-scores">';
    scores.forEach(s=>{const p=Math.round(s.score/s.total*100);const cls=p>=80?'good':p>=50?'ok':'bad';html+='<span class="hist-score '+cls+'">'+s.date+' '+p+'%</span>'});
    html+='</div></div>';
  });
  if(!html)html='<p style="text-align:center;color:#999;margin:30px 0">まだきろくがないよ 🌱</p>';
  hl.innerHTML=html;
}

function clearHistory(){if(confirm('成績きろくをすべて消しますか？')){localStorage.removeItem('quizV2History');showHistory()}}

buildMenu();
</script>
