<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>組分け② テスト対策クイズ v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(135deg,#fff0f5,#f0f0ff,#f0fff0);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:12px}
h1{text-align:center;font-size:1.3em;margin:10px 0;color:#d63384}
.subtitle{text-align:center;font-size:.8em;color:#999;margin-bottom:12px}
.menu{display:grid;gap:10px}
.subject-label{font-size:1em;font-weight:bold;margin:8px 0 2px;padding-left:8px;border-left:4px solid #ff69b4}
.subject-label.rika{border-left-color:#9b59b6}
.unit-btn{padding:12px 14px;border:2px solid #ffc0cb;border-radius:14px;background:#fff;font-size:.92em;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:8px}
.unit-btn:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(255,105,180,.2)}
.unit-btn:active{transform:scale(.98)}
.unit-btn.rika{border-color:#d8b4fe}
.unit-btn .icon{font-size:1.3em}
.unit-btn .info{flex:1}
.unit-btn .uname{font-weight:bold;color:#333}
.unit-btn .stats{font-size:.75em;color:#999;margin-top:2px}
.all-btn{padding:12px;border:none;border-radius:14px;font-size:1em;cursor:pointer;background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff;font-weight:bold;margin-top:6px}
.diff-filter{display:flex;gap:6px;justify-content:center;margin:10px 0}
.diff-btn{padding:6px 14px;border-radius:20px;border:2px solid #eee;background:#fff;font-size:.85em;cursor:pointer;transition:all .15s}
.diff-btn.active{border-color:#ff69b4;background:#fff0f5;color:#d63384;font-weight:bold}
.diff-btn.d1{color:#4caf50}.diff-btn.d1.active{border-color:#4caf50;background:#e8f5e9}
.diff-btn.d2{color:#ff9800}.diff-btn.d2.active{border-color:#ff9800;background:#fff3e0}
.diff-btn.d3{color:#f44336}.diff-btn.d3.active{border-color:#f44336;background:#ffebee}
.quiz-screen{display:none}
.progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.85em;color:#999}
.progress-bar{height:6px;background:#f0e0f0;border-radius:3px;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff69b4,#9b59b6);border-radius:3px;transition:width .3s}
.unit-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72em;margin-bottom:8px}
.unit-tag.shakai{background:#fce4ec;color:#c2185b}
.unit-tag.rika{background:#f3e5f5;color:#7b1fa2}
.diff-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7em;margin-left:6px}
.diff-tag.d1{background:#e8f5e9;color:#2e7d32}
.diff-tag.d2{background:#fff3e0;color:#e65100}
.diff-tag.d3{background:#ffebee;color:#c62828}
.qcard{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(255,105,180,.12);margin-bottom:14px;border:1px solid #fce4ec}
.qtext{font-size:1em;line-height:1.7;margin-bottom:14px;color:#333}
.choices{display:grid;gap:8px}
.choice-btn{padding:12px 14px;border:2px solid #f0e0f0;border-radius:12px;background:#fff;font-size:.9em;cursor:pointer;text-align:left;transition:all .15s;line-height:1.5}
.choice-btn:hover{border-color:#ff69b4;background:#fff5f8}
.choice-btn.correct{border-color:#4caf50;background:#e8f5e9;color:#1b5e20}
.choice-btn.wrong{border-color:#f44336;background:#ffebee;color:#b71c1c}
.choice-btn.show-correct{border-color:#4caf50;background:#e8f5e9}
.choice-btn:disabled{cursor:default}
.feedback{display:none;margin-top:12px;padding:14px;border-radius:12px;font-size:.95em;line-height:1.6;text-align:center}
.feedback.correct-fb{background:#e8f5e9;border:1px solid #c8e6c9;color:#2e7d32}
.feedback.wrong-fb{background:#fff3e0;border:1px solid #ffe0b2;color:#e65100}
.explanation{display:none;margin-top:10px;padding:12px;background:#fffff0;border:1px solid #fff9c4;border-radius:10px;font-size:.85em;line-height:1.6;color:#795548}
.next-btn{display:none;width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff;font-size:1em;font-weight:bold;cursor:pointer;margin-top:10px}
.result-screen{display:none;text-align:center}
.result-card{background:#fff;border-radius:16px;padding:28px 18px;box-shadow:0 2px 12px rgba(255,105,180,.12);margin-bottom:14px;border:1px solid #fce4ec}
.score-big{font-size:2.8em;font-weight:bold;color:#d63384}
.score-label{font-size:.9em;color:#999;margin-bottom:12px}
.result-msg{font-size:1.1em;margin:12px 0}
.stars{font-size:2em;margin:8px 0}
.wrong-list{text-align:left;margin:12px 0}
.wrong-item{background:#fff5f5;border:1px solid #ffcdd2;border-radius:10px;padding:10px;margin-bottom:8px;font-size:.85em;line-height:1.5}
.wrong-item .wq{font-weight:bold;color:#c62828}
.wrong-item .wa{color:#2e7d32;margin-top:3px}
.retry-btn,.back-btn,.review-btn{padding:12px 20px;border:none;border-radius:12px;font-size:.95em;cursor:pointer;margin:4px}
.retry-btn{background:linear-gradient(135deg,#ff69b4,#9b59b6);color:#fff}
.review-btn{background:linear-gradient(135deg,#ff9800,#ff5722);color:#fff}
.back-btn{background:#f0e0f0;color:#9b59b6}
.history-btn{position:fixed;top:10px;right:10px;background:#fff;border:2px solid #fce4ec;border-radius:50%;width:36px;height:36px;font-size:1.1em;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.history-screen{display:none}
.hist-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #f0e0f0}
.hist-unit{font-weight:bold;color:#d63384;font-size:.95em}
.hist-scores{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.hist-score{padding:3px 8px;border-radius:8px;font-size:.75em}
.hist-score.good{background:#e8f5e9;color:#2e7d32}
.hist-score.ok{background:#fff3e0;color:#e65100}
.hist-score.bad{background:#ffebee;color:#c62828}
.clear-btn{padding:10px 20px;border:none;border-radius:12px;background:#ffcdd2;color:#c62828;font-size:.9em;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<button class="history-btn" onclick="showHistory()" title="成績">📊</button>
<h1>🌸 組分け② テスト対策クイズ 🌸</h1>
<p class="subtitle">478問から10問ランダム出題！</p>
<div id="menu" class="menu"></div>
<div id="quizScreen" class="quiz-screen">
  <div class="progress"><span id="qNum"></span><span id="scoreDisp"></span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="qcard">
    <span class="unit-tag" id="unitTag"></span><span class="diff-tag" id="diffTag"></span>
    <div class="qtext" id="qText"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">次の問題 →</button>
  </div>
</div>
<div id="resultScreen" class="result-screen">
  <div class="result-card">
    <div class="stars" id="stars"></div>
    <div class="score-big" id="finalScore"></div>
    <div class="score-label">正解率</div>
    <div class="result-msg" id="resultMsg"></div>
  </div>
  <div class="wrong-list" id="wrongList"></div>
  <button class="retry-btn" onclick="retryWrong()" id="retryBtn" style="display:none">🔄 間違えた問題をもう一度</button>
  <button class="review-btn" onclick="reviewWrong()" id="reviewBtn" style="display:none">📖 間違えた問題を復習</button>
  <button class="back-btn" onclick="backToMenu()">🏠 メニューに戻る</button>
</div>
<div id="historyScreen" class="history-screen">
  <h2 style="text-align:center;color:#d63384;margin:10px 0">📊 成績きろく</h2>
  <div id="histList"></div>
  <div style="text-align:center">
    <button class="back-btn" onclick="backToMenu()">🏠 メニューに戻る</button>
    <button class="clear-btn" onclick="clearHistory()">🗑️ きろくをリセット</button>
  </div>
</div>
</div>
<script>
const Q={"shakai5": [{"q": "遠洋漁業の漁獲量が1970年代から急激に減少した理由として最も適切なものはどれですか？","c": ["魚の消費量が減ったから","各国が200カイリの排他的経済水域を設定したから","漁船が老朽化したから","海水温が上昇したから"],"a": 1,"e": "1970年代に各国が排他的経済水域（EEZ）を設定し、外国の近海で自由に漁ができなくなりました。日本の遠洋漁業はピーク時（1973年）の約400万トンから大きく減少。沿岸から200海里（約370km）以内は、その国が水産資源を管理する権利を持ちます。","d": 2},{"q": "北九州市に官営製鉄所がつくられた理由として正しいものはどれですか？","c": ["石灰石の産地が近かったから","中国から鉄鉱石を輸入しやすかったから","筑豊炭田の石炭が利用できたから","太平洋ベルトの中心だったから"],"a": 2,"e": "1901年に八幡（現・北九州市）に官営製鉄所がつくられました。理由は①筑豊炭田の石炭が近くで手に入る、②中国から鉄鉱石を輸入しやすい港がある、の2つ。これが北九州工業地帯の始まりです。現在は鉄鋼業の比重は下がっています。","d": 3},{"q": "瀬戸内海沿いに石油化学コンビナートが多い理由として正しいものはどれですか？","c": ["石油が採れるから","波がおだやかで大型タンカーが入りやすいから","人口が少なく公害が問題にならないから","鉄道輸送に便利だから"],"a": 1,"e": "瀬戸内海は内海で波がおだやかなため、原油を運ぶ大型タンカーが安全に入港できます。また、使われなくなった塩田の跡地に工場を建てられたことも大きな理由です。瀬戸内工業地域は5つの県にまたがっています。","d": 2},{"q": "広島県でかきの養殖がさかんな理由として最も適切なものはどれですか？","c": ["暖流と寒流がぶつかるから","瀬戸内海の波がおだやかで栄養が豊富だから","大陸棚が広がっているから","干潟が多いから"],"a": 1,"e": "広島県はかきの養殖が日本一。瀬戸内海は波がおだやかで養殖いかだが安定し、太田川などから栄養分が流れ込むためプランクトンが豊富です。ほかに、三重県志摩半島の真珠、佐賀県有明海ののりも覚えておきましょう。","d": 2},{"q": "日本が原油の8割以上を中東から輸入している理由として正しいものはどれですか？","c": ["中東が最も近い産油地域だから","中東の原油は品質が最も高いから","中東に世界の石油埋蔵量の多くが集中しているから","中東からの輸送費が最も安いから"],"a": 2,"e": "中東地域（サウジアラビア、UAE、カタールなど）には世界の石油埋蔵量の約半分が集中しています。日本の原油輸入先1位はサウジアラビア。中東への依存度が高いため、政情不安が日本のエネルギーに直接影響します。","d": 2},{"q": "「森は海の恋人」運動で、漁業者が川の上流に植林する理由は何ですか？","c": ["木材を売って収入を得るため","森の栄養分が川を通じて海に届き、プランクトンが増えるから","洪水を防ぐため","観光客を呼ぶため"],"a": 1,"e": "宮城県気仙沼湾のかき養殖業者・畠山重篤さんが始めた運動です。森の落ち葉が分解されてできる栄養分（鉄分など）が川を通じて海に届き、植物プランクトンを増やします。これがかきなどの養殖に必要な餌になります。森と海はつながっているという考え方です。","d": 3},{"q": "中京工業地帯が日本一の工業生産額をあげている最大の理由は何ですか？","c": ["石油化学工業がさかんだから","自動車工業を中心とした機械工業の生産額が大きいから","鉄鋼業が発達しているから","食品工業の割合が高いから"],"a": 1,"e": "中京工業地帯は豊田市のトヨタ自動車を中心に、機械工業（特に輸送用機械）の割合が非常に高いのが特徴です。1990年代半ばに京浜工業地帯を抜いて日本一になりました。機械工業は日本全体の工業生産額の約45％をしめています。","d": 2},{"q": "日本の漁業で働く人が減り続けている理由として最も適切なものはどれですか？","c": ["魚の値段が上がりすぎたから","高齢化が進み、若い人が漁業につかないから","外国人労働者が増えたから","養殖業に転職する人が多いから"],"a": 1,"e": "漁業従事者は現在約12万人で、ピーク時の約3分の1に減少。平均年齢も60歳を超え、高齢化と後継者不足が深刻です。若い人が都市部に出て漁業につかないことが主な原因。水産物の消費量も減少傾向にあります。","d": 2},{"q": "日本の水産業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 沿岸漁業は大型船で数か月かけて遠くの海で行う漁業である\nⅡ 養殖業は魚や貝を人の手で育てて出荷する漁業である","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 2,"e": "Ⅰは誤り。大型船で遠くの海に行くのは「遠洋漁業」です。沿岸漁業は小型船で日帰りで行います。漁業の種類：沿岸漁業（日帰り・小型船）→沖合漁業（数日・中型船）→遠洋漁業（数か月・大型船）の順に規模が大きくなります。Ⅱは正しい。","d": 2},{"q": "太平洋ベルトについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 関東から九州にかけての太平洋側に工業地帯・地域が連なっている\nⅡ 日本の工場の約99％がこの地域に集中している","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。太平洋ベルトには京浜・中京・阪神・北九州の四大工業地帯が含まれます。Ⅱは誤り。「約99％」は中小工場が全工場数にしめる割合であり、太平洋ベルトへの集中率ではありません。ひっかけ問題でよく出るので注意。","d": 3},{"q": "エネルギーについて述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 原子力発電は発電時に二酸化炭素を出さない\nⅡ 1960年の日本では火力発電が発電量の中心だった","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。原子力発電は発電時にCO2を出しませんが、放射性廃棄物の処理が課題です。Ⅱは誤り。1960年は水力発電が中心でした。その後、高度経済成長期に「エネルギー革命」が起き、石炭→石油→火力発電中心に変わりました。","d": 3},{"q": "日本の工業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 機械工業は日本の工業生産額の約45％をしめている\nⅡ 中小工場は工場数の約99％だが、生産額は約50％にとどまる","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 0,"e": "Ⅰ・Ⅱともに正しい。中小工場の数字は頻出：工場数の約99％、働く人の約70％、生産額の約50％。大工場は数は少ないが1工場あたりの生産額が大きいということです。機械工業が約45％で最大、次いで化学工業、金属工業の順。","d": 3},{"q": "自動車工業について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 組立工場では関連工場から必要なときに必要な量の部品が届く\nⅡ 部品はすべて組立工場の中でつくられている","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。これを「ジャストインタイム方式（かんばん方式）」といい、トヨタが開発しました。在庫を最小限にして効率を上げるしくみです。Ⅱは誤り。自動車は約3万点の部品からなり、多くの関連工場（下請け工場）が部品をつくっています。","d": 2},{"q": "漁場について述べた次のⅠ・Ⅱの正誤の組み合わせとして正しいものはどれですか？\nⅠ 暖流と寒流がぶつかるところは良い漁場になる\nⅡ 大陸棚はプランクトンが少なく漁場には向かない","c": ["Ⅰ=正・Ⅱ=正","Ⅰ=正・Ⅱ=誤","Ⅰ=誤・Ⅱ=正","Ⅰ=誤・Ⅱ=誤"],"a": 1,"e": "Ⅰは正しい。暖流と寒流がぶつかる場所を「潮目（しおめ）」といい、プランクトンが多く好漁場になります。三陸沖（黒潮と親潮の潮目）が代表例。Ⅱは誤り。大陸棚は水深約200mまでの浅い海底で、日光が届きプランクトンが豊富。東シナ海の大陸棚が有名です。","d": 2},{"q": "日本の水産業について述べた文として正しくないものはどれですか？","c": ["銚子港は日本一の漁獲量をほこる","広島県はかきの養殖が日本一である","佐賀県は有明海に面し、真珠の養殖がさかんである","焼津港はかつお類の水揚げが多い"],"a": 2,"e": "佐賀県の有明海でさかんなのは「のり」の養殖です。真珠の養殖は三重県の志摩半島が有名。養殖の組み合わせ：広島県＝かき、三重県＝真珠、佐賀県＝のり、北海道＝さけ（ふ化放流）。漁港：銚子港（千葉）＝漁獲量1位、焼津港（静岡）＝かつお類。","d": 2},{"q": "日本のエネルギーについて述べた文として正しくないものはどれですか？","c": ["石炭の最大の輸入先はオーストラリアである","原油の8割以上を中東から輸入している","液化天然ガスの略称はLPGである","石灰石は日本で100％自給できる"],"a": 2,"e": "液化天然ガスの略称はLNG（Liquefied Natural Gas）です。LPGは液化石油ガス（Liquefied Petroleum Gas）の略で別物。資源の輸入先：原油＝サウジアラビア（中東）、石炭＝オーストラリア、鉄鉱石＝オーストラリア、天然ガス＝オーストラリア・マレーシア。","d": 2},{"q": "工業地帯・工業地域について述べた文として正しくないものはどれですか？","c": ["中京工業地帯は現在日本一の工業生産額である","京浜工業地帯は1990年代半ばまで日本一だった","北九州工業地帯は筑豊炭田の石炭を利用して発展した","阪神工業地帯は自動車工業を中心に発展した"],"a": 3,"e": "自動車工業を中心に発展したのは中京工業地帯です。阪神工業地帯の特徴は中小工場が多いこと。各工業地帯の特徴：京浜＝印刷・出版、中京＝自動車（機械）、阪神＝中小工場、北九州＝鉄鋼（現在は衰退）。","d": 3},{"q": "再生可能エネルギーについて述べた文として正しくないものはどれですか？","c": ["太陽光発電は天候に左右される","風力発電は風の強い場所に設置される","地熱発電は蒸気を利用して発電する","原子力発電はウランを使う再生可能エネルギーである"],"a": 3,"e": "原子力発電はウランという有限な資源を使うため、再生可能エネルギーではありません。再生可能エネルギー＝太陽光・風力・地熱・水力・バイオマスなど、自然の力で繰り返し利用できるもの。原子力は「非化石エネルギー」ではあるが「再生可能」ではない点に注意。","d": 2},{"q": "地場産業について述べた文として正しくないものはどれですか？","c": ["鯖江市はめがねわくの生産で有名である","燕市は洋食器の生産で有名である","今治市は自動車部品の生産で有名である","関市は刃物の生産で有名である"],"a": 2,"e": "今治市（愛媛県）はタオルの生産で有名です。地場産業の代表例：鯖江市（福井県）＝めがねわく（全国の90％以上）、燕市（新潟県）＝洋食器、関市（岐阜県）＝刃物、今治市（愛媛県）＝タオル、輪島市（石川県）＝漆器。","d": 2},{"q": "日本の工場について、中小工場がしめる割合を大きい順に並べるとどうなりますか？","c": ["工場数(99%)→働く人(70%)→生産額(50%)","生産額(50%)→働く人(70%)→工場数(99%)","働く人(70%)→工場数(99%)→生産額(50%)","工場数(99%)→生産額(50%)→働く人(70%)"],"a": 0,"e": "中小工場（従業員300人未満）の割合：工場数＝約99％、働く人＝約70％、生産額＝約50％。つまり数は圧倒的に多いが、1工場あたりの生産額は大工場に比べて小さい。この3つの数字はテストで頻出なので、99→70→50の順で覚えましょう。","d": 3},{"q": "漁業の種類別漁獲量の変化について、1980年代に最も漁獲量が多かった漁業と、2020年代に最も漁獲量が多い漁業の組み合わせとして正しいものはどれですか？","c": ["遠洋漁業→沿岸漁業","沖合漁業→沖合漁業","沖合漁業→養殖業","遠洋漁業→沖合漁業"],"a": 1,"e": "1980年代も現在も沖合漁業が最も多いですが、全体の漁獲量は約1200万トン→約400万トンに減少。遠洋漁業は1970年代の200カイリ水域設定で激減。養殖業は比較的安定しています。グラフの読み取り問題では、各漁業の増減の傾向を押さえましょう。","d": 3},{"q": "石油製品のうち、用途と製品の組み合わせとして正しいものはどれですか？","c": ["自動車の燃料→灯油","ストーブの燃料→ガソリン","プラスチックの原料→ナフサ","船の燃料→軽油"],"a": 2,"e": "原油を精製すると様々な製品ができます。ガソリン＝自動車の燃料、灯油＝ストーブの燃料、軽油＝トラック・バスの燃料、重油＝船・工場の燃料、ナフサ＝プラスチックなど化学製品の原料。原油からの精製順も覚えておくと良いです。","d": 2},{"q": "日本の発電方法の変化について正しいものはどれですか？","c": ["1960年は火力中心→現在も火力中心","1960年は水力中心→現在は火力中心","1960年は原子力中心→現在は火力中心","1960年は火力中心→現在は原子力中心"],"a": 1,"e": "1960年は水力発電が中心（ダムが多く建設された時代）。高度経済成長期に大量の電力が必要になり、火力発電が中心に。2011年の原発事故後は原子力の割合が激減し、火力への依存がさらに高まりました。現在は再生可能エネルギーの割合が徐々に増加中。","d": 2},{"q": "1990年代半ばまで工業生産額1位だった工業地帯と、現在1位の工業地帯の組み合わせとして正しいものはどれですか？","c": ["阪神→中京","京浜→中京","京浜→阪神","北九州→京浜"],"a": 1,"e": "京浜工業地帯（東京・神奈川）は長年日本一でしたが、1990年代半ばに中京工業地帯（愛知・三重）に抜かれました。中京は自動車産業の成長で躍進。北九州工業地帯は石炭産業の衰退で四大工業地帯から外されることもあります。","d": 2},{"q": "ある工場では原油を精製してナフサを取り出し、それを原料にして製品をつくっています。この工場でつくられる製品として最も適切なものはどれですか？","c": ["ガソリン","セメント","プラスチック","鉄鋼"],"a": 2,"e": "原油→精製→ナフサ→プラスチックという流れです。ナフサは石油化学工業の基礎原料で、プラスチック・合成繊維・合成ゴムなどの化学製品がつくられます。ガソリンも原油から精製されますが、ナフサとは別の成分。石油化学コンビナートでは、これらの工場がパイプで結ばれて効率的に生産しています。","d": 2},{"q": "ある県では、使われなくなった塩田のあと地に工場が建てられ、外国から船で運ばれてきた原料を加工しています。この県がある地域として最も適切なものはどれですか？","c": ["太平洋ベルトの関東地方","日本海側の東北地方","瀬戸内海沿岸","北海道の太平洋側"],"a": 2,"e": "ヒントは「塩田跡地」と「船での原料輸入」。瀬戸内海沿岸では、かつて塩田だった広い平地に石油化学コンビナートが建設されました。瀬戸内海は波がおだやかで大型タンカーが入りやすく、原料の海上輸送に適しています。岡山県倉敷市の水島コンビナートが代表例です。","d": 3},{"q": "高知県の漁師がかつおの一本づりをしています。この漁業の種類と、かつおが乗ってくる海流の組み合わせとして正しいものはどれですか？","c": ["沿岸漁業・黒潮","遠洋漁業・黒潮","沿岸漁業・親潮","沖合漁業・対馬海流"],"a": 0,"e": "かつおの一本づりは日帰りの小型船で行う沿岸漁業です。かつおは暖流の黒潮（日本海流）に乗って春〜夏に北上し、秋に南下します。北上するかつおを「初がつお」、南下するかつおを「戻りがつお」といいます。高知県は黒潮が近くを流れるため、かつお漁がさかんです。","d": 2},{"q": "ある都市はもと「挙母市」とよばれていましたが、ある企業の発展とともに名前が変わりました。この都市がある工業地帯と、その工業地帯の特徴の組み合わせとして正しいものはどれですか？","c": ["京浜工業地帯・印刷業がさかん","中京工業地帯・機械工業の割合が高い","阪神工業地帯・中小工場が多い","北関東工業地域・IC工場が多い"],"a": 1,"e": "挙母市（ころもし）→豊田市。トヨタ自動車の本社がある「企業城下町」です。中京工業地帯は機械工業（特に輸送用機械＝自動車）の割合が約70％と非常に高いのが特徴。企業城下町の例：豊田市＝トヨタ、日立市＝日立製作所、延岡市＝旭化成。","d": 3},{"q": "2011年の原子力発電所事故のあと、日本の発電方法はどのように変化しましたか？","c": ["原子力の割合が増え、火力が減った","原子力の割合が減り、火力と再生可能エネルギーが増えた","水力の割合が大きく増えた","変化はなかった"],"a": 1,"e": "2011年の福島第一原発事故後、全国の原発が順次停止。原子力の割合は事故前の約30％→ほぼ0％に激減しました。不足分を補うため火力発電（特にLNG）が急増し、CO2排出量も増加。同時に太陽光を中心とした再生可能エネルギーの導入が加速しました。","d": 2},{"q": "日本の漁業生産量は1980年代をピークに減少しています。その原因として正しいものを2つ含む組み合わせはどれですか？\nア 200カイリ水域の設定で遠洋漁業が制限された\nイ 日本人の魚の消費量が増えすぎた\nウ とりすぎによる水産資源の減少\nエ 養殖業が禁止された","c": ["アとイ","アとウ","イとエ","ウとエ"],"a": 1,"e": "正解はアとウ。①1970年代の200カイリ水域設定で遠洋漁業が大幅に制限、②とりすぎ（乱獲）で水産資源が減少。イは誤り（消費量はむしろ減少傾向）、エは誤り（養殖業は推進されている）。日本の漁業生産量はピーク時の約1200万トン→現在約400万トンに減少しています。","d": 3},{"q": "コンビナートとモーダルシフトに共通する目的として最も適切なものはどれですか？","c": ["雇用を増やすこと","輸送や生産の効率を高めること","環境を保護すること","外国との貿易を増やすこと"],"a": 1,"e": "コンビナート＝工場をパイプで結んで原料・製品を効率的にやりとりする仕組み。モーダルシフト＝トラック輸送から鉄道・船舶に切り替えて効率化する取り組み。どちらも「効率化」が共通目的です。モーダルシフトにはCO2削減の効果もありますが、主目的は効率化と人手不足対策です。","d": 3},{"q": "「加工貿易」と「産業の空洞化」の関係について正しく述べたものはどれですか？","c": ["加工貿易が増えると産業の空洞化が進む","工場が海外に移転すると国内の加工貿易の力が弱まる","産業の空洞化が進むと原料の輸入が増える","加工貿易と産業の空洞化は関係がない"],"a": 1,"e": "加工貿易＝原料を輸入→国内で加工→製品を輸出。産業の空洞化＝円高や人件費の高さから工場が海外に移転する現象。工場が海外に出ると、国内で加工する力が弱まり、加工貿易の基盤が失われます。1985年のプラザ合意後の急激な円高が空洞化を加速させました。","d": 3},{"q": "地熱発電と原子力発電に共通する発電のしくみは何ですか？","c": ["風の力で発電する","水の落差で発電する","蒸気でタービンを回して発電する","太陽の光で発電する"],"a": 2,"e": "地熱発電＝地下のマグマで熱せられた蒸気を利用。原子力発電＝ウランの核分裂の熱で水を蒸気にする。どちらも「蒸気でタービンを回す」点が共通。火力発電も同じ仕組みです。発電方法の分類：タービン式（火力・原子力・地熱）、直接変換式（太陽光）、回転式（風力・水力）。","d": 2},{"q": "排他的経済水域（200カイリ水域）の設定は、日本の漁業と資源の両方に影響を与えました。日本にとってプラスの影響はどれですか？","c": ["遠洋漁業の漁獲量が増えた","日本の近海の水産資源を守れるようになった","外国の漁船が自由に日本近海で漁ができるようになった","養殖業が不要になった"],"a": 1,"e": "200カイリ水域（約370km）の設定で、日本は自国の近海の水産資源を管理・保護できるようになりました。一方で、他国の近海での漁が制限され遠洋漁業は打撃を受けました。日本の排他的経済水域は世界第6位の広さ。海底のレアアースやメタンハイドレートなどの資源開発も期待されています。","d": 3},{"q": "高度経済成長期（1955〜1973年）に起きた変化として正しいものを2つ含む組み合わせはどれですか？\nア エネルギーの中心が石炭から石油に変わった\nイ 太平洋ベルトに工場が集中した\nウ 漁業の中心が養殖業に変わった\nエ 工業生産額が減少した","c": ["アとイ","アとウ","イとエ","ウとエ"],"a": 0,"e": "正解はアとイ。ア＝「エネルギー革命」と呼ばれ、石炭から石油への転換が進みました。イ＝太平洋ベルトに四大工業地帯が形成。ウは誤り（養殖業は増えたが中心にはなっていない）、エは誤り（工業生産額は急増した）。この時期にGNPが世界第2位になりました。","d": 3},{"q": "レアアースやメタンハイドレートなどの海底資源が注目されている理由として最も適切なものはどれですか？","c": ["日本の領海が広がったから","外国からの資源輸入に頼る日本にとって自国の資源確保が重要だから","海底資源は採掘コストが安いから","すでに大量に生産されているから"],"a": 1,"e": "日本はエネルギー資源の自給率がわずか約12％で、石油・天然ガス・石炭のほとんどを輸入に頼っています。南鳥島周辺のレアアース泥や、日本海側のメタンハイドレートなど、自国の排他的経済水域内の海底資源開発が期待されています。レアアースはスマートフォンや電気自動車に不可欠な希少金属です。","d": 3},{"q": "日本で最も漁獲量が多い漁港はどこですか？","c": ["焼津港","銚子港","釧路港","枕崎港"],"a": 1,"e": "銚子港（千葉県）は日本一の漁獲量を誇ります。利根川の河口に位置し、黒潮と親潮がぶつかる好漁場に近いことが理由です。主な漁港：銚子港（千葉）＝漁獲量1位、焼津港（静岡）＝かつお・まぐろ、釧路港（北海道）＝さんま、枕崎港（鹿児島）＝かつお節。","d": 1},{"q": "石油精製工場と石油化学工場がパイプで結ばれたしくみを何といいますか？","c": ["コンビナート","コンテナ","コンソーシアム","コングロマリット"],"a": 0,"e": "コンビナートはロシア語で「結合」の意味。石油精製→石油化学→プラスチック工場などがパイプラインで結ばれ、原料や製品を効率的にやりとりします。代表例：千葉県京葉工業地域、岡山県水島、三重県四日市。コンテナは輸送用の箱、コンソーシアムは企業連合の意味です。","d": 1},{"q": "2011年に事故が発生した原子力発電所がある県はどこですか？","c": ["新潟県","福島県","茨城県","静岡県"],"a": 1,"e": "2011年3月11日の東日本大震災による津波で、福島県の福島第一原子力発電所で事故が発生。大量の放射性物質が放出され、周辺住民が避難を余儀なくされました。この事故をきっかけに日本のエネルギー政策は大きく転換し、原発の安全基準が厳格化されました。","d": 1},{"q": "1955年〜1973年の日本経済が大きく発展した時期を何といいますか？","c": ["バブル経済","高度経済成長","明治維新","産業革命"],"a": 1,"e": "高度経済成長期（1955〜1973年）は日本のGNPが年平均10％以上成長した時期。三種の神器（白黒テレビ・洗濯機・冷蔵庫）や3C（カラーテレビ・クーラー・自動車）が普及。1968年にGNPが世界第2位に。1973年の石油危機（オイルショック）で終わりを迎えました。","d": 1},{"q": "セメントの原料となる、日本で100％自給できる資源は何ですか？","c": ["鉄鉱石","石灰石","石炭","原油"],"a": 1,"e": "石灰石は日本で唯一100％自給できる鉱産資源です。セメントの主原料で、山口県秋吉台や福岡県北九州市などが主な産地。日本の資源自給率：石灰石＝100％、天然ガス＝約3％、石炭＝約1％、原油＝ほぼ0％。鉄鉱石もほぼ全量を輸入しています。","d": 1},{"q": "福井県鯖江市で生産量日本一の製品は何ですか？","c": ["タオル","洋食器","めがねわく","刃物"],"a": 2,"e": "鯖江市（福井県）はめがねわくの生産が全国の90％以上をしめます。明治時代に農閑期の副業として始まりました。地場産業の代表例：鯖江市＝めがねわく、燕市（新潟県）＝洋食器、今治市（愛媛県）＝タオル、関市（岐阜県）＝刃物、輪島市（石川県）＝漆器。","d": 1}],"shakai6": [{"q": "四大公害病のうち、熊本県で発生した病気は何ですか？","c": ["イタイイタイ病","水俣病","四日市ぜんそく","新潟水俣病"],"a": 1,"e": "水俣病は熊本県水俣市で有機水銀が原因で発生しました。","d": 1},{"q": "新潟水俣病が発生した川の流域はどこですか？","c": ["神通川","渡良瀬川","阿賀野川","信濃川"],"a": 2,"e": "新潟水俣病は阿賀野川流域で発生しました。","d": 1},{"q": "イタイイタイ病の原因物質は何ですか？","c": ["有機水銀","カドミウム","二酸化イオウ","ダイオキシン"],"a": 1,"e": "イタイイタイ病は富山県神通川流域でカドミウムが原因です。","d": 1},{"q": "四日市ぜんそくの原因物質は何ですか？","c": ["有機水銀","カドミウム","二酸化イオウ","フロンガス"],"a": 2,"e": "四日市ぜんそくは石油化学コンビナートからの二酸化イオウが原因です。","d": 1},{"q": "イタイイタイ病が発生した川はどこですか？","c": ["阿賀野川","渡良瀬川","神通川","利根川"],"a": 2,"e": "神通川流域（富山県）でイタイイタイ病が発生しました。","d": 2},{"q": "日本の公害反対運動の原点といわれる事件は何ですか？","c": ["水俣病事件","足尾銅山鉱毒事件","四日市公害事件","新潟水俣病事件"],"a": 1,"e": "足尾銅山鉱毒事件が日本の公害反対運動の原点です。","d": 2},{"q": "足尾銅山鉱毒事件で公害反対運動の先頭に立った人物は誰ですか？","c": ["伊藤博文","田中正造","福沢諭吉","大隈重信"],"a": 1,"e": "田中正造が足尾銅山鉱毒事件で公害反対の運動をおこしました。","d": 1},{"q": "足尾銅山鉱毒事件で被害を受けた川はどこですか？","c": ["阿賀野川","神通川","渡良瀬川","利根川"],"a": 2,"e": "渡良瀬川流域（栃木県）で鉱毒被害が発生しました。","d": 2},{"q": "1993年に公害対策基本法にかわって定められた法律は何ですか？","c": ["環境保護法","環境基本法","公害防止法","自然保護法"],"a": 1,"e": "環境基本法は1993年に定められました。","d": 1},{"q": "2001年に環境庁が格上げされてできた省は何ですか？","c": ["国土交通省","環境省","厚生労働省","総務省"],"a": 1,"e": "環境庁は2001年に環境省に格上げされました。","d": 1},{"q": "都道府県や市町村が環境を守るために定めるきまりを何といいますか？","c": ["法律","政令","条例","規則"],"a": 2,"e": "条例は都道府県や市町村が定めるきまりです。","d": 2},{"q": "地球温暖化の原因となる二酸化炭素などの気体を何といいますか？","c": ["フロンガス","温室効果ガス","オゾン","酸性ガス"],"a": 1,"e": "温室効果ガスは地球温暖化の原因となります。","d": 1},{"q": "オゾン層の薄いところを何といいますか？","c": ["ブラックホール","オゾンホール","温暖化ホール","酸性ホール"],"a": 1,"e": "オゾンホールは1980年代に南極大陸上空で発見されました。","d": 1},{"q": "オゾン層を破壊している原因物質は何ですか？","c": ["二酸化炭素","メタン","フロンガス","窒素酸化物"],"a": 2,"e": "フロンガスがオゾン層を破壊しています。","d": 1},{"q": "オゾン層は大気の上空で何という気体と結びついてできますか？","c": ["窒素","水素","酸素","二酸化炭素"],"a": 2,"e": "オゾン層は酸素と結びついてできます。","d": 2},{"q": "熱帯林が「地球の○○」といわれるのは何ですか？","c": ["心臓","肺","腎臓","脳"],"a": 1,"e": "熱帯林は「緑の肺」といわれています。","d": 2},{"q": "森林や野原を焼き払って草木の灰を肥料にして畑をつくる農業を何といいますか？","c": ["水田農業","焼き畑農業","酪農","園芸農業"],"a": 1,"e": "焼き畑農業は熱帯林の減少の原因の一つです。","d": 2},{"q": "熱帯林の再生能力が失われて緑がもどらなくなることを何といいますか？","c": ["温暖化","砂漠化","酸性化","都市化"],"a": 1,"e": "砂漠化は熱帯林の再生能力が失われることです。","d": 1},{"q": "自動車の排気ガスなどから出される硫黄酸化物や窒素酸化物が原因でふる雨を何といいますか？","c": ["にわか雨","酸性雨","黄砂","スモッグ"],"a": 1,"e": "酸性雨は硫黄酸化物や窒素酸化物が原因です。","d": 1},{"q": "川や海のよごれをきれいにする微生物を何といいますか？","c": ["プランクトン","バクテリア","ウイルス","カビ"],"a": 1,"e": "バクテリアなどの微生物が汚染物質を分解します。","d": 2},{"q": "プランクトンと同じ大きさになったプラスチックのごみを何といいますか？","c": ["ナノプラスチック","マイクロプラスチック","メガプラスチック","ミニプラスチック"],"a": 1,"e": "マイクロプラスチックは海洋汚染の原因になっています。","d": 1},{"q": "ペルー沖の太平洋で海水温が上がる現象を何といいますか？","c": ["ラニーニャ現象","エルニーニョ現象","ヒートアイランド現象","フェーン現象"],"a": 1,"e": "エルニーニョ現象はスペイン語で「男の子」の意味です。","d": 2},{"q": "エルニーニョ現象の反対の現象を何といいますか？","c": ["ラニーニャ現象","フェーン現象","ヒートアイランド現象","モンスーン現象"],"a": 0,"e": "ラニーニャ現象はスペイン語で「女の子」の意味です。","d": 2},{"q": "体内のホルモンと似たはたらきをし、体の機能のバランスをくずす物質を何といいますか？","c": ["環境ホルモン","成長ホルモン","甲状腺ホルモン","副腎ホルモン"],"a": 0,"e": "環境ホルモンはダイオキシンやPCBなどのことです。","d": 2},{"q": "2015年に国際連合で示された持続可能な開発目標の略称は何ですか？","c": ["WHO","UNESCO","SDGs","NGO"],"a": 2,"e": "SDGsは17の課題と目標を示しています。","d": 1},{"q": "洗ってくりかえして使うことができるびんを何といいますか？","c": ["ペットボトル","リターナブルびん","ワンウェイびん","デポジットびん"],"a": 1,"e": "リターナブルびんは洗ってくりかえし使えます。","d": 2},{"q": "くりかえして使うことを何といいますか？","c": ["リデュース","リユース","リサイクル","リフューズ"],"a": 1,"e": "リユースはくりかえして使うことです。","d": 1},{"q": "容器代を上乗せして売り、返すときに容器代を払い戻すしくみを何といいますか？","c": ["リサイクル","デポジット","リユース","エコマーク"],"a": 1,"e": "デポジットは資源の節約につながるしくみです。","d": 2},{"q": "無駄な包装をことわったりして、ごみを減らす努力を何といいますか？","c": ["リユース","リサイクル","リデュース","リフューズ"],"a": 2,"e": "リデュースは「減らす」という意味です。","d": 1},{"q": "まだ食べられるのに捨てられている食品の問題を何といいますか？","c": ["フードマイレージ","食品ロス","フードバンク","食品偽装"],"a": 1,"e": "食品ロスを減らす取り組みが進められています。","d": 1},{"q": "商品にならない食料を会社から寄付してもらい、必要な人に届ける活動を何といいますか？","c": ["フードコート","フードバンク","フードマイレージ","フードチェーン"],"a": 1,"e": "フードバンクは食料を必要としている人々に届ける活動です。","d": 2},{"q": "プラスチックなどを低い温度で燃やしたときに発生する有害物質は何ですか？","c": ["フロンガス","ダイオキシン","PCB","アスベスト"],"a": 1,"e": "ダイオキシンは「人類がつくり出した最悪・最強の毒物」といわれます。","d": 2},{"q": "PCBの正式名称は何ですか？","c": ["ポリ塩化ビフェニル","ポリカーボネート","ポリエチレン","ポリプロピレン"],"a": 0,"e": "PCBはポリ塩化ビフェニルの略称です。","d": 3},{"q": "四大公害病の裁判を何といいますか？","c": ["環境裁判","四大公害裁判","公害訴訟","環境訴訟"],"a": 1,"e": "四大公害による裁判を四大公害裁判といいます。","d": 2},{"q": "水俣病の原因物質は何ですか？","c": ["カドミウム","有機水銀","二酸化イオウ","鉛"],"a": 1,"e": "水俣病は有機水銀が原因で発生しました。","d": 1},{"q": "公害を多いものから並べたとき、1番目に多い公害は何ですか？","c": ["水質汚濁","大気汚染","騒音","悪臭"],"a": 2,"e": "騒音が最も多い公害です。","d": 3},{"q": "滋賀県が琵琶湖の水質汚染に取り組んできたことから指定されたのは何ですか？","c": ["世界遺産都市","SDGs未来都市","環境モデル都市","エコタウン"],"a": 1,"e": "滋賀県はSDGs未来都市に指定されています。","d": 3},{"q": "滋賀県で琵琶湖の水質汚染の原因となったリンをふくむものの販売を禁止したのは何ですか？","c": ["農薬","合成洗剤","プラスチック","殺虫剤"],"a": 1,"e": "合成洗剤のリンが琵琶湖の水質汚染の原因でした。","d": 3},{"q": "エルニーニョ現象が発生すると、日本はどうなりやすいですか？","c": ["猛暑になる","暖冬や冷夏になる","大雪になる","台風が増える"],"a": 1,"e": "エルニーニョ現象では日本は暖冬や冷夏になりやすいです。","d": 2},{"q": "ラニ るのはどれですか？","c": ["ベガ","アルタイル","シリウス","デネブ"],"a": 2,"e": "冬の大三角はシリウス・ベテルギウス・プロキオンです。","d": 2},{"q": "オリオン座のベテルギウスは何色の星ですか？","c": ["白色","青白色","赤色","黄色"],"a": 2,"e": "ベテルギウスは赤色の1等星です。","d": 1},{"q": "さそり座のアンタレスは何色の星ですか？","c": ["白色","青白色","赤色","黄色"],"a": 2,"e": "アンタレスは赤色の1等星です。","d": 1},{"q": "北極星は何座にありますか？","c": ["おおぐま座","こぐま座","カシオペヤ座","はくちょう座"],"a": 1,"e": "北極星はこぐま座にあります。","d": 1},{"q": "北極星を見つけるのに使う星座はどれですか？","c": ["オリオン座とこと座","おおぐま座とカシオペヤ座","さそり座とわし座","はくちょう座とこと座"],"a": 1,"e": "おおぐま座（北斗七星）とカシオペヤ座から北極星を見つけます。","d": 1},{"q": "水1gの温度を1℃上げるのに必要な熱量は何カロリーですか？","c": ["0.5カロリー","1カロリー","2カロリー","10カロリー"],"a": 1,"e": "水1gを1℃上げるのに1カロリー必要です。","d": 1},{"q": "200gの水の温度が25℃から45℃に上がったとき、水が受け取った熱量は何カロリーですか？","c": ["2000カロリー","4000カロリー","6000カロリー","8000カロリー"],"a": 1,"e": "200g×(45-25)℃＝4000カロリーです。","d": 2},{"q": "氷は水と比べて体積はどうなりますか？","c": ["小さくなる","大きくなる","同じ","測定できない"],"a": 1,"e": "氷は水より体積が大きくなります（約1.1倍）。","d": 1},{"q": "カマキリの冬越しのすがたはどれですか？","c": ["成虫","卵","さなぎ","幼虫"],"a": 1,"e": "カマキリは卵で冬越しします。","d": 1},{"q": "バッタの冬越しのすがたはどれですか？","c": ["成虫","卵","さなぎ","幼虫"],"a": 1,"e": "バッタは卵で冬越しします。","d": 1},{"q": "ギンヤンマの冬越しのすがたはどれですか？","c": ["成虫","卵","さなぎ","幼虫"],"a": 3,"e": "ギンヤンマは幼虫（ヤゴ）で冬越しします。","d": 2},{"q": "ミツバチの冬越しのすがたはどれですか？","c": ["卵","幼虫","さなぎ","成虫"],"a": 3,"e": "ミツバチは成虫で冬越しします。","d": 2},{"q": "内びんの内側を鏡面仕上げにする理由は何ですか？","c": ["見た目をよくする","熱を反射させる","汚れを防ぐ","強度を上げる"],"a": 1,"e": "鏡面仕上げで中の液体からの熱を反射させます。","d": 2},{"q": "星の明るさの等級で、1等星は6等星の約何倍明るいですか？","c": ["6倍","10倍","100倍","1000倍"],"a": 2,"e": "1等星は6等星の約100倍明るいです。","d": 3},{"q": "地球の自転の向きはどちらですか？","c": ["東から西","西から東","北から南","南から北"],"a": 1,"e": "地球は西から東に自転しています。","d": 2},{"q": "星が1日に同じ位置に見える時刻の変化は約何分ですか？","c": ["約2分早くなる","約4分早くなる","約10分早くなる","約30分早くなる"],"a": 1,"e": "星は1日に約4分早く同じ位置に見えます。","d": 3}],"rika6": [{"q": "温度計の目盛りは最小目盛りの何分の1まで読みますか？","c": ["1/2","1/5","1/10","1/100"],"a": 2,"e": "温度計は最小目盛りの1/10まで読みます。","d": 1},{"q": "気温を測る高さは地上何mですか？","c": ["0.5～1.0m","1.2～1.5m","2.0～2.5m","3.0～3.5m"],"a": 1,"e": "地上1.2～1.5mの高さで気温を測ります。","d": 1},{"q": "1日に1回だけ気温を測るとき、何時ごろに測りますか？","c": ["午前6時","午前9時","正午","午後3時"],"a": 1,"e": "午前9時ごろが1日の平均気温に近いです。","d": 2},{"q": "正確な気温を測る装置を何といいますか？","c": ["温度計","百葉箱","気圧計","湿度計"],"a": 1,"e": "百葉箱の中で正確な気温を測ります。","d": 1},{"q": "百葉箱の外側と内側は何色で塗ってありますか？","c": ["黒","白","銀","緑"],"a": 1,"e": "白いペンキで塗って太陽熱の吸収を防ぎます。","d": 1},{"q": "百葉箱のまわりの土には何が植えられていますか？","c": ["花","芝","木","野菜"],"a": 1,"e": "芝が植えられて太陽の熱の反射を防ぎます。","d": 2},{"q": "百葉箱の扉はどの方角を向いていますか？","c": ["東","西","南","北"],"a": 3,"e": "北向きにして日光がさしこまないようにしています。","d": 2},{"q": "気温が最高になるのは何時ごろですか？","c": ["正午","13時ごろ","14時ごろ","15時ごろ"],"a": 2,"e": "気温は14時（午後2時）ごろに最高になります。","d": 1},{"q": "気温が最低になるのはいつですか？","c": ["真夜中","午前3時ごろ","日の出の直前","日の出の直後"],"a": 2,"e": "気温は日の出の直前に最低になります。","d": 1},{"q": "地温が最高になるのは何時ごろですか？","c": ["正午","13時ごろ","14時ごろ","15時ごろ"],"a": 1,"e": "地温は13時ごろに最高になります。気温より1時間早いです。","d": 2},{"q": "地温の変化と気温の変化では、どちらが大きいですか？","c": ["気温の変化","地温の変化","同じ","日によって違う"],"a": 1,"e": "土は空気よりあたたまりやすく冷めやすいので地温の変化が大きいです。","d": 2},{"q": "晴れた日と雨の日では、どちらが気温の変化が大きいですか？","c": ["晴れた日","雨の日","同じ","くもりの日"],"a": 0,"e": "晴れた日は最高気温と最低気温の差が大きくなります。","d": 1},{"q": "雲量が0～1のときの天気は何ですか？","c": ["晴れ","快晴","くもり","雨"],"a": 1,"e": "雲量0～1は快晴です。","d": 1},{"q": "雲量が9～10のときの天気は何ですか？","c": ["晴れ","快晴","くもり","雨"],"a": 2,"e": "雲量9～10はくもりです。","d": 1},{"q": "雲量が2～8のときの天気は何ですか？","c": ["快晴","晴れ","くもり","雨"],"a": 1,"e": "雲量2～8は晴れです。","d": 1},{"q": "雲は地上何kmくらいまでにできますか？","c": ["5km","10km","15km","20km"],"a": 1,"e": "雲ができるのは地上10kmくらいまでです。","d": 2},{"q": "積み重なって大きくなり、にわか雨を降らせる雲を何といいますか？","c": ["高層雲","巻積雲","積乱雲","層雲"],"a": 2,"e": "積乱雲（入道雲）はにわか雨を降らせます。","d": 1},{"q": "風が吹いてくる方向を何といいますか？","c": ["風速","風向","風力","気圧"],"a": 1,"e": "風向は風が吹いてくる方向です。","d": 1},{"q": "風向は観測時刻の前の何分間で最も多くさした方向ですか？","c": ["5分間","10分間","15分間","30分間"],"a": 1,"e": "風向は観測時刻前の10分間で決めます。","d": 2},{"q": "ある期間の風向を調べるために使う図を何といいますか？","c": ["天気図","風配図","気圧図","等圧線図"],"a": 1,"e": "風配図を使うとある月の風の向きがよくわかります。","d": 2},{"q": "風速の単位は何ですか？","c": ["km/時","m/秒","cm/秒","ノット"],"a": 1,"e": "風速はm/秒（メートル毎秒）で表します。","d": 1},{"q": "風力は何段階に分けて表しますか？","c":     html+='<button class="unit-btn rika" onclick="showDiffFilter(\''+k+'\')" data-unit="'+k+'"><span class="icon">'+u.icon+'</span><span class="info"><span class="uname">'+u.name+'</span><span class="stats">最高: '+best+' | 挑戦: '+scores.length+'回</span></span></button>';
  });
  html+='<button class="all-btn" onclick="showDiffFilter(\'all\')">🎯 全単元ランダム（10問）</button>';
  m.innerHTML=html;
}

function showDiffFilter(unit){
  curUnit=unit;curDiff=0;
  const m=document.getElementById('menu');
  const unitName=unit==='all'?'全単元ランダム':UNITS[unit].icon+' '+UNITS[unit].name;
  m.innerHTML='<div style="text-align:center;margin:20px 0"><h2 style="color:#d63384;font-size:1.1em">'+unitName+'</h2><p style="color:#999;font-size:.85em;margin:8px 0">難易度をえらんでね</p><div class="diff-filter"><button class="diff-btn active" onclick="setDiff(0,this)">🎯 ぜんぶ</button><button class="diff-btn d1" onclick="setDiff(1,this)">⭐ 初級</button><button class="diff-btn d2" onclick="setDiff(2,this)">⭐⭐ 中級</button><button class="diff-btn d3" onclick="setDiff(3,this)">⭐⭐⭐ 上級</button></div><button class="all-btn" style="margin-top:16px;width:80%" onclick="startQuiz()">スタート！🚀</button><br><button class="back-btn" style="margin-top:8px" onclick="buildMenu()">← もどる</button></div>';
}

function setDiff(d,btn){curDiff=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

function startQuiz(){
  let pool=[];
  if(curUnit==='all'){Object.values(Q).forEach(qs=>pool.push(...qs))}
  else{pool=[...Q[curUnit]]}
  if(curDiff>0)pool=pool.filter(q=>q.d===curDiff);
  if(pool.length===0){alert('この難易度の問題がありません');return}
  curQs=shuffle(pool).slice(0,10);
  curIdx=0;score=0;wrongs=[];answered=false;
  document.getElementById('menu').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  showQ();
}

function showQ(){
  answered=false;
  const q=curQs[curIdx],t=curQs.length;
  document.getElementById('qNum').textContent=(curIdx+1)+' / '+t;
  document.getElementById('scoreDisp').textContent='⭕ '+score;
  document.getElementById('progFill').style.width=(curIdx/t*100)+'%';
  const tag=document.getElementById('unitTag');
  const uKey=Object.keys(Q).find(k=>Q[k].includes(q));
  if(uKey&&UNITS[uKey]){tag.textContent=UNITS[uKey].icon+' '+UNITS[uKey].name;tag.className='unit-tag '+(uKey.startsWith('rika')?'rika':'shakai')}
  const dt=document.getElementById('diffTag');
  dt.textContent=DIFF_NAMES[q.d];dt.className='diff-tag d'+q.d;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').style.display='none';
  document.getElementById('explanation').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  const cd=document.getElementById('choices');cd.innerHTML='';
  const idx=q.c.map((_,i)=>i);const si=shuffle(idx);
  si.forEach(oi=>{const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=q.c[oi];btn.onclick=()=>selectAns(btn,oi,q);cd.appendChild(btn)});
}

function selectAns(btn,sel,q){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(sel===q.a){
    btn.classList.add('correct');score++;
    fb.className='feedback correct-fb';fb.textContent=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===q.c[q.a])b.classList.add('show-correct')});
    wrongs.push(q);
    fb.className='feedback wrong-fb';fb.textContent=CHEER[Math.floor(Math.random()*CHEER.length)];
  }
  fb.style.display='block';
  document.getElementById('scoreDisp').textContent='⭕ '+score;
  const exp=document.getElementById('explanation');exp.textContent='💡 '+q.e;exp.style.display='block';
  const nb=document.getElementById('nextBtn');nb.style.display='block';
  nb.textContent=curIdx<curQs.length-1?'次の問題 →':'結果を見る 🎉';
}

function nextQ(){curIdx++;if(curIdx<curQs.length)showQ();else showResult()}

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const t=curQs.length,pct=Math.round(score/t*100);
  document.getElementById('finalScore').textContent=score+' / '+t+'（'+pct+'%）';
  let msg='',stars='';
  if(pct===100){msg='🎉 パーフェクト！天才！';stars='🌟🌟🌟🌟🌟'}
  else if(pct>=80){msg='👏 すごい！よくできました！';stars='🌟🌟🌟🌟'}
  else if(pct>=60){msg='📚 いい調子！もう少しがんばろう！';stars='🌟🌟🌟'}
  else if(pct>=40){msg='💪 復習してもう一回チャレンジ！';stars='🌟🌟'}
  else{msg='🌱 基本からしっかり復習しよう！';stars='🌟'}
  document.getElementById('stars').textContent=stars;
  document.getElementById('resultMsg').textContent=msg;
  if(curUnit!=='__retry'&&curUnit!=='__review')saveScore(curUnit==='all'?'all':curUnit,score,t);
  const wl=document.getElementById('wrongList');wl.innerHTML='';
  if(wrongs.length>0){
    wrongs.forEach(q=>{const d=document.createElement('div');d.className='wrong-item';d.innerHTML='<div class="wq">❌ '+q.q+'</div><div class="wa">→ 正解: '+q.c[q.a]+'</div>';wl.appendChild(d)});
    document.getElementById('retryBtn').style.display='inline-block';
    document.getElementById('reviewBtn').style.display='inline-block';
  }else{
    document.getElementById('retryBtn').style.display='none';
    document.getElementById('reviewBtn').style.display='none';
  }
}

function retryWrong(){curQs=shuffle(wrongs);curIdx=0;score=0;wrongs=[];answered=false;curUnit='__retry';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';showQ()}

function reviewWrong(){curQs=[...wrongs];curIdx=0;score=0;wrongs=[];answered=false;curUnit='__review';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';showQ()}

function backToMenu(){document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='none';document.getElementById('historyScreen').style.display='none';document.getElementById('menu').style.display='grid';buildMenu()}

function showHistory(){
  document.getElementById('menu').style.display='none';document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='none';
  document.getElementById('historyScreen').style.display='block';
  const h=getHistory(),hl=document.getElementById('histList');let html='';
  const keys=['shakai5','shakai6','shakai7','shakai8','shakai9','rika5','rika6','rika7','rika8','rika9','all'];
  keys.forEach(k=>{
    const scores=h[k]||[];if(scores.length===0)return;
    const name=k==='all'?'🎯 全単元ランダム':UNITS[k]?UNITS[k].icon+' '+UNITS[k].name:k;
    html+='<div class="hist-card"><div class="hist-unit">'+name+'</div><div class="hist-scores">';
    scores.forEach(s=>{const p=Math.round(s.score/s.total*100);const cls=p>=80?'good':p>=50?'ok':'bad';html+='<span class="hist-score '+cls+'">'+s.date+' '+p+'%</span>'});
    html+='</div></div>';
  });
  if(!html)html='<p style="text-align:center;color:#999;margin:30px 0">まだきろくがないよ 🌱</p>';
  hl.innerHTML=html;
}

function clearHistory(){if(confirm('成績きろくをすべて消しますか？')){localStorage.removeItem('quizV2History');showHistory()}}

buildMenu();
</script>
